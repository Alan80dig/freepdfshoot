<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/freepdfshoot/manifest.json">
    <title>FreePDFShoot – Приватный скан документов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: system-ui, -apple-system, sans-serif; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 1; }
        .action-area { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding: 0 16px 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn-row { display: flex; gap: 8px; }
        .btn { display: block; flex: 1; padding: 14px; font-size: 0.85rem; font-weight: 600; border: none; border-radius: 14px; cursor: pointer; background: #2a6df4; color: #fff; text-align: center; }
        .btn.secondary { background: rgba(51,51,51,0.85); color: #ccc; }
        .btn.danger { background: rgba(180,40,40,0.85); }
        .btn.save { background: #4caf50; }
        .hints { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 0 4px; }
        .hint { display: flex; align-items: center; gap: 14px; width: 100%; max-width: 300px; padding: 12px 16px; background: rgba(255,255,255,0.06); border-radius: 14px; }
        .hint .icon { font-size: 2.4rem; min-width: 48px; text-align: center; }
        .hint .label { font-size: 1rem; color: #ccc; line-height: 1.3; }
        .legend { text-align: center; font-size: 0.85rem; color: #aaa; padding: 4px 4px 0; line-height: 1.5; }
    </style>
</head>
<body>
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" onchange="onSystemPhoto(event)">
<canvas id="canvas"></canvas>
<div class="action-area" id="actionArea"></div>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const actionArea = document.getElementById('actionArea');
    const cameraInput = document.getElementById('cameraInput');

    let currentStep = 'ready';
    let savedPages = [];
    let frozenImageData = null;
    let originalImage = null;
    let displayScale = 1;

    // Трансформации изображения
    let imgX = 0, imgY = 0;   // смещение изображения
    let imgZoom = 1;           // масштаб
    let imgRotation = 0;       // угол поворота

    // Для жестов
    let lastPinchDist = 0;
    let lastPinchMidX = 0, lastPinchMidY = 0;
    let lastPinchAngle = 0;
    let dragging = false;
    let dragStartX = 0, dragStartY = 0;
    let imgStartX = 0, imgStartY = 0;

    // Рамка (фиксированные пропорции А4: 1:√2)
    const FRAME_RATIO = Math.sqrt(2); // высота/ширина ≈ 1.414
    let frameW, frameH, frameX, frameY;

    let previewBlob = null;
    let previewImageData = null;

    updateUI();

    function handleAction() {
        if (currentStep === 'saving') return;
        switch (currentStep) {
            case 'ready': cameraInput.click(); break;
            case 'framing': cropAndPreview(); break;
            case 'preview': saveAfterPreview(); break;
            case 'saved': cameraInput.click(); break;
        }
    }

    function calcFrame() {
        const w = canvas.width, h = canvas.height;
        const maxW = w * 0.85, maxH = h * 0.85;
        if (maxW * FRAME_RATIO <= maxH) {
            frameW = maxW;
            frameH = maxW * FRAME_RATIO;
        } else {
            frameH = maxH;
            frameW = maxH / FRAME_RATIO;
        }
        frameX = (w - frameW) / 2;
        frameY = (h - frameH) / 2;
    }

    async function onSystemPhoto(event) {
        const file = event.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
            URL.revokeObjectURL(url);
            originalImage = img;
            const MAX_DIM = 1600;
            displayScale = 1;
            if (img.naturalWidth > MAX_DIM || img.naturalHeight > MAX_DIM) {
                displayScale = MAX_DIM / Math.max(img.naturalWidth, img.naturalHeight);
            }
            canvas.width = Math.round(img.naturalWidth * displayScale);
            canvas.height = Math.round(img.naturalHeight * displayScale);
            calcFrame();
            // Центрируем изображение
            imgX = (canvas.width - img.naturalWidth) / 2;
            imgY = (canvas.height - img.naturalHeight) / 2;
            imgZoom = 1;
            imgRotation = 0;
            frozenImageData = null;
            previewBlob = null;
            currentStep = 'framing';
            updateUI();
            bindFramingEvents();
            drawFramingScene();
        };
        img.src = url;
        cameraInput.value = '';
    }

    function resetToReady() {
        unbindFramingEvents();
        frozenImageData = null;
        previewBlob = null;
        previewImageData = null;
        if (originalImage) { originalImage.src = ''; originalImage = null; }
        currentStep = 'ready';
        updateUI();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function updateUI() {
        const n = savedPages.length;
        let html = '';
        switch (currentStep) {
            case 'ready':
                html = `
                    <div class="hints">
                        <div class="hint"><div class="icon">📸</div><div class="label">Сфоткайте документ</div></div>
                        <div class="hint"><div class="icon">✂️</div><div class="label">Совместите с рамкой</div></div>
                        <div class="hint"><div class="icon">📤</div><div class="label">Отправьте PDF</div></div>
                    </div>
                    <div class="legend">Двигайте изображение и совместите с рамкой</div>
                    <div class="btn-row"><button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять</button></div>`;
                if (n > 0) {
                    html += `<div class="btn-row">
                        <button class="btn secondary" onclick="shareAll()">📤 ${n}</button>
                        <button class="btn save" onclick="saveAll()">💾 ${n}</button>
                        <button class="btn danger" onclick="clearAllPages()">🗑</button>
                    </div>`;
                }
                break;
            case 'framing':
                html = `<div class="btn-row">
                    <button class="btn secondary" onclick="resetFrame()">↺</button>
                    <button class="btn danger" onclick="resetToReady()">↩</button>
                    <button class="btn" id="actionBtn" onclick="handleAction()">✂️</button>
                </div>`;
                break;
            case 'preview':
                html = `<div class="btn-row">
                    <button class="btn secondary" onclick="backToFraming()">↩ Назад</button>
                    <button class="btn save" id="actionBtn" onclick="handleAction()">✅ Дальше</button>
                </div>`;
                break;
            case 'saving':
                html = `<div class="btn-row"><button class="btn" disabled>⏳</button></div>`;
                break;
            case 'saved':
                html = `<div class="btn-row">
                    <button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять следующую</button>
                    <button class="btn danger" onclick="removeLastPage()">🗑</button>
                    <button class="btn save" onclick="saveAll()">💾 ${n}</button>
                    <button class="btn secondary" onclick="shareAll()">📤 ${n}</button>
                </div>`;
                break;
        }
        actionArea.innerHTML = html;
    }

    function bindFramingEvents() {
        canvas.style.touchAction = 'none';
        canvas.addEventListener('touchstart', onFramingTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onFramingTouchMove, { passive: false });
        canvas.addEventListener('touchend', onFramingTouchEnd);
    }
    function unbindFramingEvents() {
        canvas.style.touchAction = '';
        canvas.removeEventListener('touchstart', onFramingTouchStart);
        canvas.removeEventListener('touchmove', onFramingTouchMove);
        canvas.removeEventListener('touchend', onFramingTouchEnd);
    }

    function drawFramingScene() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Рисуем изображение с трансформациями
        ctx.save();
        ctx.translate(canvas.width/2 + imgX, canvas.height/2 + imgY);
        ctx.rotate(imgRotation);
        ctx.scale(imgZoom, imgZoom);
        ctx.translate(-canvas.width/2, -canvas.height/2);
        if (frozenImageData) {
            ctx.putImageData(frozenImageData, 0, 0);
        } else if (originalImage) {
            ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
            frozenImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }
        ctx.restore();

        // Затемнение снаружи рамки
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.clearRect(frameX, frameY, frameW, frameH);

        // Рамка
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 3;
        ctx.strokeRect(frameX, frameY, frameW, frameH);

        // Угловые акценты
        const cornerLen = 20;
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 4;
        [
            [frameX, frameY, 1, 1], [frameX+frameW, frameY, -1, 1],
            [frameX, frameY+frameH, 1, -1], [frameX+frameW, frameY+frameH, -1, -1]
        ].forEach(([cx, cy, dx, dy]) => {
            ctx.beginPath();
            ctx.moveTo(cx, cy + cornerLen*dy);
            ctx.lineTo(cx, cy);
            ctx.lineTo(cx + cornerLen*dx, cy);
            ctx.stroke();
        });
    }

    function onFramingTouchStart(e) {
        if (currentStep !== 'framing') return;
        e.preventDefault();
        if (e.touches.length === 1) {
            dragging = true;
            dragStartX = e.touches[0].clientX;
            dragStartY = e.touches[0].clientY;
            imgStartX = imgX;
            imgStartY = imgY;
        } else if (e.touches.length === 2) {
            dragging = false;
            const r = canvas.getBoundingClientRect();
            const x1 = (e.touches[0].clientX - r.left) * (canvas.width / r.width);
            const y1 = (e.touches[0].clientY - r.top) * (canvas.height / r.height);
            const x2 = (e.touches[1].clientX - r.left) * (canvas.width / r.width);
            const y2 = (e.touches[1].clientY - r.top) * (canvas.height / r.height);
            lastPinchDist = Math.hypot(x2 - x1, y2 - y1);
            lastPinchMidX = (x1 + x2) / 2;
            lastPinchMidY = (y1 + y2) / 2;
            lastPinchAngle = Math.atan2(y2 - y1, x2 - x1);
        }
    }

    function onFramingTouchMove(e) {
        if (currentStep !== 'framing') return;
        e.preventDefault();
        if (dragging && e.touches.length === 1) {
            const dx = e.touches[0].clientX - dragStartX;
            const dy = e.touches[0].clientY - dragStartY;
            imgX = imgStartX + dx * (canvas.width / canvas.clientWidth);
            imgY = imgStartY + dy * (canvas.height / canvas.clientHeight);
            drawFramingScene();
        } else if (e.touches.length === 2) {
            const r = canvas.getBoundingClientRect();
            const x1 = (e.touches[0].clientX - r.left) * (canvas.width / r.width);
            const y1 = (e.touches[0].clientY - r.top) * (canvas.height / r.height);
            const x2 = (e.touches[1].clientX - r.left) * (canvas.width / r.width);
            const y2 = (e.touches[1].clientY - r.top) * (canvas.height / r.height);
            const dist = Math.hypot(x2 - x1, y2 - y1);
            const midX = (x1 + x2) / 2;
            const midY = (y1 + y2) / 2;
            const angle = Math.atan2(y2 - y1, x2 - x1);

            if (lastPinchDist > 0) {
                const scale = dist / lastPinchDist;
                imgZoom = Math.max(0.5, Math.min(3, imgZoom * scale));
                imgX += (midX - lastPinchMidX);
                imgY += (midY - lastPinchMidY);
            }
            if (lastPinchAngle !== undefined) {
                imgRotation += angle - lastPinchAngle;
            }
            lastPinchDist = dist;
            lastPinchMidX = midX;
            lastPinchMidY = midY;
            lastPinchAngle = angle;
            drawFramingScene();
        }
    }

    function onFramingTouchEnd(e) {
        dragging = false;
        lastPinchDist = 0;
    }

    function resetFrame() {
        imgX = 0;
        imgY = 0;
        imgZoom = 1;
        imgRotation = 0;
        drawFramingScene();
    }

        function cropAndPreview() {
        if (currentStep !== 'framing') return;

        // Вырезаем область рамки напрямую из canvas
        const imgData = ctx.getImageData(frameX, frameY, frameW, frameH);
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = frameW;
        tmpCanvas.height = frameH;
        tmpCanvas.getContext('2d').putImageData(imgData, 0, 0);

        tmpCanvas.toBlob(blob => {
            if (!blob) return;
            previewBlob = blob;
            unbindFramingEvents();
            const img = new Image();
            img.onload = () => {
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                ctx.drawImage(img, 0, 0);
                previewImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                frozenImageData = previewImageData;
                currentStep = 'preview';
                updateUI();
                drawPreviewScene();
            };
            img.src = URL.createObjectURL(blob);
        }, 'image/jpeg', 0.92);
    }

    function drawPreviewScene() {
        if (!previewImageData) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.putImageData(previewImageData, 0, 0);
    }

    function backToFraming() {
        if (!originalImage) return;
        frozenImageData = null;
        previewBlob = null;
        previewImageData = null;
        calcFrame();
        currentStep = 'framing';
        updateUI();
        bindFramingEvents();
        drawFramingScene();
    }

    function saveAfterPreview() {
        if (!previewBlob) return;
        const url = URL.createObjectURL(previewBlob);
        savedPages.push({ url, blob: previewBlob });
        frozenImageData = null;
        previewBlob = null;
        previewImageData = null;
        if (originalImage) { originalImage.src = ''; originalImage = null; }
        originalImage = null;
        currentStep = 'saved';
        updateUI();
    }

    function removeLastPage() {
        if (!savedPages.length) return;
        const item = savedPages.pop();
        URL.revokeObjectURL(item.url);
        if (!savedPages.length) resetToReady();
        else updateUI();
    }

    function clearAllPages() {
        if (!confirm('Удалить все страницы?')) return;
        savedPages.forEach(item => URL.revokeObjectURL(item.url));
        savedPages = [];
        resetToReady();
    }

    async function saveAll() {
        if (savedPages.length === 0) return;
        try {
            const blobs = savedPages.map(p => p.blob);
            const blob = await generatePDFBlob(blobs);
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'FreePDFShoot.pdf';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } catch (err) { console.error(err); }
    }

    async function shareAll() {
        if (savedPages.length === 0) return;
        try {
            const blobs = savedPages.map(p => p.blob);
            const blob = await generatePDFBlob(blobs);
            const file = new File([blob], 'FreePDFShoot.pdf', { type: 'application/pdf' });
            if (navigator.share) {
                await navigator.share({ title: 'FreePDFShoot', text: 'Документ', files: [file] });
            } else {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'FreePDFShoot.pdf';
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        } catch (err) { if (err.name !== 'AbortError') console.error(err); }
    }

    async function generatePDFBlob(blobs) {
        const images = [];
        for (let i = 0; i < blobs.length; i++) {
            const buf = await blobs[i].arrayBuffer();
            images.push({ data: new Uint8Array(buf), dims: null });
        }
        for (let i = 0; i < images.length; i++) {
            images[i].dims = await getJPEGDimensionsFromBlob(blobs[i]);
        }
        const pageW = 595, pageH = 842;
        const parts = [], offsets = [];
        let objNum = 1;
        const imgObjNums = [], pageObjNums = [];
        function addText(str) { parts.push(new TextEncoder().encode(str)); }
        addText('%PDF-1.4\n');
        for (const img of images) {
            offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
            imgObjNums.push(objNum);
            addText(`${objNum} 0 obj\n<< /Type /XObject /Subtype /Image /Width ${img.dims.width} /Height ${img.dims.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter [/DCTDecode] /Length ${img.data.length} >>\nstream\n`);
            parts.push(img.data);
            addText('\nendstream\nendobj\n');
            objNum++;
        }
        const kids = [];
        for (let i = 0; i < images.length; i++) {
            const img = images[i];
            const scale = Math.min((pageW - 40) / img.dims.width, (pageH - 40) / img.dims.height);
            const w = img.dims.width * scale, h = img.dims.height * scale;
            const x = (pageW - w) / 2, y = (pageH - h) / 2;
            const cont = `q ${w} 0 0 ${h} ${x} ${pageH - y - h} cm /Im${imgObjNums[i]} Do Q`;
            offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
            pageObjNums.push(objNum);
            addText(`${objNum} 0 obj\n<< /Type /Page /Parent ${objNum + 2} 0 R /MediaBox [0 0 ${pageW} ${pageH}] /Contents ${objNum + 1} 0 R /Resources << /XObject << /Im${imgObjNums[i]} ${imgObjNums[i]} 0 R >> >> >>\nendobj\n`);
            objNum++;
            offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
            addText(`${objNum} 0 obj\n<< /Length ${cont.length} >>\nstream\n${cont}\nendstream\nendobj\n`);
            objNum++;
            kids.push(pageObjNums[i]);
        }
        const kidsStr = kids.map(k => `${k} 0 R`).join(' ');
        offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
        const pagesObjNum = objNum;
        addText(`${objNum} 0 obj\n<< /Type /Pages /Kids [${kidsStr}] /Count ${kids.length} >>\nendobj\n`);
        objNum++;
        offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
        const catalogObjNum = objNum;
        addText(`${objNum} 0 obj\n<< /Type /Catalog /Pages ${pagesObjNum} 0 R >>\nendobj\n`);
        objNum++;
        const xrefPos = parts.reduce((acc, p) => acc + p.length, 0);
        addText(`xref\n0 ${objNum}\n0000000000 65535 f \n`);
        for (const off of offsets) addText(`${String(off).padStart(10, '0')} 00000 n \n`);
        addText(`trailer\n<< /Size ${objNum} /Root ${catalogObjNum} 0 R >>\nstartxref\n${xrefPos}\n%%EOF`);
        const totalLength = parts.reduce((acc, p) => acc + p.length, 0);
        const result = new Uint8Array(totalLength);
        let offset = 0;
        for (const part of parts) { result.set(part, offset); offset += part.length; }
        return new Blob([result], { type: 'application/pdf' });
    }

    async function getJPEGDimensionsFromBlob(blob) {
        try {
            const img = await createImageBitmap(blob);
            const dims = { width: img.width, height: img.height };
            img.close();
            return dims;
        } catch(e) {
            return { width: 800, height: 600 };
        }
    }

    window.addEventListener('beforeunload', () => {
        savedPages.forEach(item => URL.revokeObjectURL(item.url));
        savedPages = [];
        if (originalImage) { originalImage.src = ''; originalImage = null; }
        frozenImageData = null;
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/freepdfshoot/manifest.json">
    <title>FreePDFShoot – Приватный скан документов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: system-ui, -apple-system, sans-serif; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 1; }
        .action-area { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding: 0 16px 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn-row { display: flex; gap: 8px; }
        .btn { display: block; flex: 1; padding: 14px; font-size: 0.85rem; font-weight: 600; border: none; border-radius: 14px; cursor: pointer; background: #2a6df4; color: #fff; text-align: center; }
        .btn.secondary { background: rgba(51,51,51,0.85); color: #ccc; }
        .btn.danger { background: rgba(180,40,40,0.85); }
        .btn.save { background: #4caf50; }
        .hints { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 0 4px; }
        .hint { display: flex; align-items: center; gap: 14px; width: 100%; max-width: 300px; padding: 12px 16px; background: rgba(255,255,255,0.06); border-radius: 14px; }
        .hint .icon { font-size: 2.4rem; min-width: 48px; text-align: center; }
        .hint .label { font-size: 1rem; color: #ccc; line-height: 1.3; }
        .legend { text-align: center; font-size: 0.85rem; color: #aaa; padding: 4px 4px 0; line-height: 1.5; }
    </style>
</head>
<body>
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" onchange="onSystemPhoto(event)">
<canvas id="canvas"></canvas>
<div class="action-area" id="actionArea"></div>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const actionArea = document.getElementById('actionArea');
    const cameraInput = document.getElementById('cameraInput');

    let currentStep = 'ready';
    let savedPages = [];
    let frozenImageData = null;
    let corners = null;
    let draggingCorner = -1;
    const HANDLE_SIZE = 44;
    const HANDLE_RADIUS = HANDLE_SIZE / 2;
    const HIT_TARGET = HANDLE_SIZE;
    const LOUPE_SIZE = 120;
    const LOUPE_ZOOM = 3;
    let originalImage = null;
    let displayScale = 1;
    let previewBlob = null;
    let previewImageData = null;
    let backupImageData = null;
    let backupCorners = null;
    let backupOriginalImage = null;

    // Zoom в предпросмотре
    let previewZoom = 1;
    let previewPanX = 0, previewPanY = 0;
    let previewPinchDist = 0;
    let previewPinchMidX = 0, previewPinchMidY = 0;
    let previewDragging = false;

    updateUI();

    function handleAction() {
        if (currentStep === 'saving') return;
        switch (currentStep) {
            case 'ready': cameraInput.click(); break;
            case 'framing': cropAndPreview(); break;
            case 'preview': saveAfterPreview(); break;
            case 'saved': cameraInput.click(); break;
        }
    }

    function normalizeOrientation(img) {
        if (img.naturalWidth <= img.naturalHeight) return img;
        const MAX_DIM = 1500;
        let scale = 1;
        if (Math.max(img.naturalWidth, img.naturalHeight) > MAX_DIM) {
            scale = MAX_DIM / Math.max(img.naturalWidth, img.naturalHeight);
        }
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = Math.round(img.naturalHeight * scale);
        tmpCanvas.height = Math.round(img.naturalWidth * scale);
        const tmpCtx = tmpCanvas.getContext('2d');
        tmpCtx.translate(tmpCanvas.width / 2, tmpCanvas.height / 2);
        tmpCtx.rotate(Math.PI / 2);
        tmpCtx.drawImage(img, -img.naturalWidth / 2, -img.naturalHeight / 2);
        const newImg = new Image();
        return new Promise(resolve => {
            newImg.onload = () => resolve(newImg);
            newImg.src = tmpCanvas.toDataURL('image/jpeg', 0.92);
        });
    }

    async function onSystemPhoto(event) {
        const file = event.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = async () => {
            URL.revokeObjectURL(url);
            originalImage = await normalizeOrientation(img);
            const MAX_DIM = 1000;
            displayScale = 1;
            if (originalImage.naturalWidth > MAX_DIM || originalImage.naturalHeight > MAX_DIM) {
                displayScale = MAX_DIM / Math.max(originalImage.naturalWidth, originalImage.naturalHeight);
            }
            canvas.width = Math.round(originalImage.naturalWidth * displayScale);
            canvas.height = Math.round(originalImage.naturalHeight * displayScale);
            ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
            frozenImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const mX = canvas.width * 0.2, mY = canvas.height * 0.2;
            corners = [
                {x:mX, y:mY}, {x:canvas.width - mX, y:mY},
                {x:canvas.width - mX, y:canvas.height - mY}, {x:mX, y:canvas.height - mY}
            ];
            draggingCorner = -1;
            previewBlob = null;
            currentStep = 'framing';
            updateUI();
            bindFramingEvents();
            drawFrozenScene();
        };
        img.src = url;
        cameraInput.value = '';
    }

    function resetToReady() {
        unbindPreviewEvents();
        unbindFramingEvents();
        frozenImageData = null;
        previewBlob = null;
        previewImageData = null;
        previewZoom = 1; previewPanX = 0; previewPanY = 0;
        if (originalImage) { originalImage.src = ''; originalImage = null; }
        corners = null;
        draggingCorner = -1;
        currentStep = 'ready';
        updateUI();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function updateUI() {
        const n = savedPages.length;
        let html = '';
        switch (currentStep) {
            case 'ready':
                html = `
                    <div class="hints">
                        <div class="hint"><div class="icon">📸</div><div class="label">Сфоткайте документ</div></div>
                        <div class="hint"><div class="icon">✂️</div><div class="label">Обрежьте лишнее</div></div>
                        <div class="hint"><div class="icon">📤</div><div class="label">Отправьте PDF</div></div>
                    </div>
                    <div class="legend">💡 Цвет рамки подскажет, насколько ровно стоят маркеры:<br>🟢 Ровно · 🟡 Почти · 🔴 Поправьте</div>
                    <div class="btn-row"><button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять</button></div>`;
                if (n > 0) {
                    html += `<div class="btn-row">
                        <button class="btn secondary" onclick="shareAll()">📤 ${n}</button>
                        <button class="btn save" onclick="saveAll()">💾 ${n}</button>
                        <button class="btn danger" onclick="clearAllPages()">🗑</button>
                    </div>`;
                }
                break;
            case 'framing':
                html = `<div class="btn-row">
                    <button class="btn secondary" onclick="resetCrop()">↺</button>
                    <button class="btn danger" onclick="resetToReady()">↩</button>
                    <button class="btn" id="actionBtn" onclick="handleAction()">✂️</button>
                </div>`;
                break;
            case 'preview':
                html = `<div class="btn-row">
                    <button class="btn secondary" onclick="backToFraming()">↩ Назад</button>
                    <button class="btn save" id="actionBtn" onclick="handleAction()">✅ Дальше</button>
                </div>`;
                break;
            case 'saving':
                html = `<div class="btn-row"><button class="btn" disabled>⏳</button></div>`;
                break;
            case 'saved':
                html = `<div class="btn-row">
                    <button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять следующую</button>
                    <button class="btn danger" onclick="removeLastPage()">🗑</button>
                    <button class="btn save" onclick="saveAll()">💾 ${n}</button>
                    <button class="btn secondary" onclick="shareAll()">📤 ${n}</button>
                </div>`;
                break;
        }
        actionArea.innerHTML = html;
    }

    function bindFramingEvents() {
        canvas.addEventListener('touchstart', onFramingTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onFramingTouchMove, { passive: false });
        canvas.addEventListener('touchend', onFramingTouchEnd);
    }
    function unbindFramingEvents() {
        canvas.removeEventListener('touchstart', onFramingTouchStart);
        canvas.removeEventListener('touchmove', onFramingTouchMove);
        canvas.removeEventListener('touchend', onFramingTouchEnd);
    }

     function bindPreviewEvents() {
        canvas.style.touchAction = 'none';
        canvas.addEventListener('touchstart', onPreviewTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onPreviewTouchMove, { passive: false });
        canvas.addEventListener('touchend', onPreviewTouchEnd);
        canvas.addEventListener('dblclick', onPreviewDoubleTap);
    }
    function unbindPreviewEvents() {
        canvas.style.touchAction = '';
        canvas.removeEventListener('touchstart', onPreviewTouchStart);
        canvas.removeEventListener('touchmove', onPreviewTouchMove);
        canvas.removeEventListener('touchend', onPreviewTouchEnd);
        canvas.removeEventListener('dblclick', onPreviewDoubleTap);
    }

    function getCornersQuality(c) {
        let perfect = 0, good = 0, bad = 0;
        for (let i = 0; i < 4; i++) {
            const prev = c[(i+3)%4], curr = c[i], next = c[(i+1)%4];
            const v1 = { x: prev.x - curr.x, y: prev.y - curr.y };
            const v2 = { x: next.x - curr.x, y: next.y - curr.y };
            const dot = v1.x*v2.x + v1.y*v2.y;
            const cross = v1.x*v2.y - v1.y*v2.x;
            const angle = Math.abs(Math.atan2(cross, dot) * 180 / Math.PI);
            if (angle > 88 && angle < 92) perfect++;
            else if (angle > 80 && angle < 100) good++;
            else bad++;
        }
        if (perfect === 4) return 'perfect';
        if (bad > 0) return 'bad';
        return 'good';
    }

    function getImageRect() {
        const r = canvas.getBoundingClientRect();
        const canvasRatio = canvas.width / canvas.height;
        const containerRatio = r.width / r.height;
        let drawWidth, drawHeight, offsetX, offsetY;
        if (canvasRatio > containerRatio) {
            drawWidth = r.width;
            drawHeight = r.width / canvasRatio;
            offsetX = 0;
            offsetY = (r.height - drawHeight) / 2;
        } else {
            drawHeight = r.height;
            drawWidth = r.height * canvasRatio;
            offsetX = (r.width - drawWidth) / 2;
            offsetY = 0;
        }
        return { drawWidth, drawHeight, offsetX, offsetY, rect: r };
    }

    function drawFrozenScene() {
        if (!frozenImageData) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.putImageData(frozenImageData, 0, 0);
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (!corners) return;
        const [TL, TR, BR, BL] = corners;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(TL.x, TL.y); ctx.lineTo(TR.x, TR.y);
        ctx.lineTo(BR.x, BR.y); ctx.lineTo(BL.x, BL.y);
        ctx.closePath(); ctx.clip();
        ctx.putImageData(frozenImageData, 0, 0);
        ctx.restore();
        const quality = getCornersQuality(corners);
        const col = quality === 'perfect' ? '#00ff88' : quality === 'good' ? '#ffdd57' : '#ff4444';
        ctx.strokeStyle = col; ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(TL.x, TL.y); ctx.lineTo(TR.x, TR.y);
        ctx.lineTo(BR.x, BR.y); ctx.lineTo(BL.x, BL.y);
        ctx.closePath(); ctx.stroke();
        [TL, TR, BR, BL].forEach((c, i) => {
            const isDragging = (i === draggingCorner);
            const r = isDragging ? HANDLE_RADIUS * 1.5 : HANDLE_RADIUS;
            ctx.fillStyle = col;
            ctx.beginPath();
            ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = isDragging ? 4 : 3;
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.font = `bold ${isDragging ? 14 : 12}px system-ui`;
            ctx.textAlign = 'center';
            ctx.fillText(i + 1, c.x, c.y + (isDragging ? 6 : 5));
        });

        if (draggingCorner >= 0 && corners) {
            const cx = corners[draggingCorner].x;
            const cy = corners[draggingCorner].y;
            const halfSrc = (LOUPE_SIZE / 2) / LOUPE_ZOOM;
            const loupeX = cx < canvas.width / 2 ? canvas.width - LOUPE_SIZE - 20 : 20;
            const loupeY = cy < canvas.height / 2 ? canvas.height - LOUPE_SIZE - 100 : 80;

            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(loupeX - 2, loupeY - 2, LOUPE_SIZE + 4, LOUPE_SIZE + 4);
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 2;
            ctx.strokeRect(loupeX - 2, loupeY - 2, LOUPE_SIZE + 4, LOUPE_SIZE + 4);

            const offscreen = document.createElement('canvas');
            offscreen.width = canvas.width;
            offscreen.height = canvas.height;
            offscreen.getContext('2d').putImageData(frozenImageData, 0, 0);
            ctx.save();
            ctx.beginPath();
            ctx.rect(loupeX, loupeY, LOUPE_SIZE, LOUPE_SIZE);
            ctx.clip();
            ctx.drawImage(offscreen, cx - halfSrc, cy - halfSrc, halfSrc * 2, halfSrc * 2, loupeX, loupeY, LOUPE_SIZE, LOUPE_SIZE);
            ctx.restore();

            const centerX = loupeX + LOUPE_SIZE / 2;
            const centerY = loupeY + LOUPE_SIZE / 2;
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 2;
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 4;
            ctx.beginPath();
            ctx.moveTo(centerX - 15, centerY);
            ctx.lineTo(centerX + 15, centerY);
            ctx.moveTo(centerX, centerY - 15);
            ctx.lineTo(centerX, centerY + 15);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
    }

    function onFramingTouchStart(e) {
        if (currentStep !== 'framing') return;
        e.preventDefault();
        const t = e.touches[0];
        const img = getImageRect();
        const scaleX = canvas.width / img.drawWidth;
        const scaleY = canvas.height / img.drawHeight;
        const sx = (t.clientX - img.rect.left - img.offsetX) * scaleX;
        const sy = (t.clientY - img.rect.top - img.offsetY) * scaleY;
        if (!corners) return;
        let bestIdx = -1;
        let bestDist = Infinity;
        for (let i = 0; i < corners.length; i++) {
            const dx = sx - corners[i].x;
            const dy = sy - corners[i].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < HIT_TARGET && dist < bestDist) {
                bestDist = dist;
                bestIdx = i;
            }
        }
        if (bestIdx >= 0) {
            draggingCorner = bestIdx;
            drawFrozenScene();
        }
    }

    function onFramingTouchMove(e) {
        if (draggingCorner < 0 || !corners) return;
        e.preventDefault();
        const t = e.touches[0];
        const img = getImageRect();
        const scaleX = canvas.width / img.drawWidth;
        const scaleY = canvas.height / img.drawHeight;
        const sx = (t.clientX - img.rect.left - img.offsetX) * scaleX;
        const sy = (t.clientY - img.rect.top - img.offsetY) * scaleY;
        corners[draggingCorner].x = Math.max(0, Math.min(canvas.width, sx));
        corners[draggingCorner].y = Math.max(0, Math.min(canvas.height, sy));
        drawFrozenScene();
    }

    function onFramingTouchEnd(e) {
        if (draggingCorner >= 0) {
            draggingCorner = -1;
            drawFrozenScene();
        }
    }

    // ── Zoom в предпросмотре ──
    function onPreviewTouchStart(e) {
        if (currentStep !== 'preview') return;
        e.preventDefault();
        if (e.touches.length === 2) {
            const r = canvas.getBoundingClientRect();
            const x1 = (e.touches[0].clientX - r.left) * (canvas.width / r.width);
            const y1 = (e.touches[0].clientY - r.top) * (canvas.height / r.height);
            const x2 = (e.touches[1].clientX - r.left) * (canvas.width / r.width);
            const y2 = (e.touches[1].clientY - r.top) * (canvas.height / r.height);
            previewPinchDist = Math.hypot(x2 - x1, y2 - y1);
            previewPinchMidX = (x1 + x2) / 2;
            previewPinchMidY = (y1 + y2) / 2;
            return;
        }
        if (e.touches.length === 1) {
            const r = canvas.getBoundingClientRect();
            previewPinchMidX = (e.touches[0].clientX - r.left) * (canvas.width / r.width);
            previewPinchMidY = (e.touches[0].clientY - r.top) * (canvas.height / r.height);
            previewDragging = true;
        }
    }

    function onPreviewTouchMove(e) {
        if (currentStep !== 'preview') return;
        e.preventDefault();
        if (e.touches.length === 2) {
            const r = canvas.getBoundingClientRect();
            const x1 = (e.touches[0].clientX - r.left) * (canvas.width / r.width);
            const y1 = (e.touches[0].clientY - r.top) * (canvas.height / r.height);
            const x2 = (e.touches[1].clientX - r.left) * (canvas.width / r.width);
            const y2 = (e.touches[1].clientY - r.top) * (canvas.height / r.height);
            const dist = Math.hypot(x2 - x1, y2 - y1);
            const midX = (x1 + x2) / 2;
            const midY = (y1 + y2) / 2;
            if (previewPinchDist > 0) {
                const scale = dist / previewPinchDist;
                const newZoom = Math.max(1, Math.min(5, previewZoom * scale));
                previewPanX = (previewPanX + midX) * (newZoom / previewZoom) - midX;
                previewPanY = (previewPanY + midY) * (newZoom / previewZoom) - midY;
                previewZoom = newZoom;
            }
            previewPinchDist = dist;
            previewPinchMidX = midX;
            previewPinchMidY = midY;
            drawPreviewScene();
            return;
        }
        if (previewDragging && e.touches.length === 1 && previewZoom > 1) {
            const r = canvas.getBoundingClientRect();
            const sx = (e.touches[0].clientX - r.left) * (canvas.width / r.width);
            const sy = (e.touches[0].clientY - r.top) * (canvas.height / r.height);
            if (previewPinchMidX) {
                previewPanX += sx - previewPinchMidX;
                previewPanY += sy - previewPinchMidY;
            }
            previewPinchMidX = sx;
            previewPinchMidY = sy;
            const maxPan = canvas.width * (previewZoom - 1) / 2;
            previewPanX = Math.max(-maxPan, Math.min(maxPan, previewPanX));
            previewPanY = Math.max(-maxPan, Math.min(maxPan, previewPanY));
            drawPreviewScene();
        }
    }

    function onPreviewTouchEnd(e) {
        if (e.touches.length < 2) {
            previewPinchDist = 0;
            previewPinchMidX = 0;
            previewPinchMidY = 0;
        }
        previewDragging = false;
    }

    function onPreviewDoubleTap(e) {
        if (currentStep !== 'preview') return;
        e.preventDefault();
        previewZoom = 1;
        previewPanX = 0;
        previewPanY = 0;
        drawPreviewScene();
    }

    function resetCrop() {
        const mX = canvas.width * 0.2, mY = canvas.height * 0.2;
        corners = [
            {x:mX, y:mY}, {x:canvas.width - mX, y:mY},
            {x:canvas.width - mX, y:canvas.height - mY}, {x:mX, y:canvas.height - mY}
        ];
        drawFrozenScene();
    }

    function enhanceContrast(cvs, amount) {
        const ctx = cvs.getContext('2d');
        const imgData = ctx.getImageData(0, 0, cvs.width, cvs.height);
        const data = imgData.data;
        let min = 255, max = 0;
        for (let i = 0; i < data.length; i += 4) {
            const gray = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
            if (gray < min) min = gray;
            if (gray > max) max = gray;
        }
        if (max - min < 10) return cvs;
        const expand = (max - min) * (amount / 100);
        const newMin = Math.max(0, min - expand);
        const newMax = Math.min(255, max + expand);
        const range = newMax - newMin || 1;
        for (let i = 0; i < data.length; i += 4) {
            data[i] = (data[i] - newMin) * 255 / range;
            data[i+1] = (data[i+1] - newMin) * 255 / range;
            data[i+2] = (data[i+2] - newMin) * 255 / range;
        }
        ctx.putImageData(imgData, 0, 0);
        return cvs;
    }

    function scaleToOutput(cvs) {
        const MAX_OUTPUT = 1600;
        const w = cvs.width, h = cvs.height;
        if (Math.max(w, h) <= MAX_OUTPUT) return cvs;
        const scale = MAX_OUTPUT / Math.max(w, h);
        const out = document.createElement('canvas');
        out.width = Math.round(w * scale);
        out.height = Math.round(h * scale);
        out.getContext('2d').drawImage(cvs, 0, 0, out.width, out.height);
        return out;
    }

    function cropAndPreview() {
        if (currentStep !== 'framing') return;
        if (backupOriginalImage) { backupOriginalImage.src = ''; backupOriginalImage = null; }
        const [TL, TR, BR, BL] = corners;
        const inset = HANDLE_RADIUS;
        const minX = Math.max(0, Math.min(TL.x, BL.x) + inset);
        const maxX = Math.min(canvas.width, Math.max(TR.x, BR.x) - inset);
        const minY = Math.max(0, Math.min(TL.y, TR.y) + inset);
        const maxY = Math.min(canvas.height, Math.max(BL.y, BR.y) - inset);
        const cropW = maxX - minX, cropH = maxY - minY;
        if (cropW < 10 || cropH < 10) return;
        const invScale = 1 / displayScale;
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = Math.round(cropW * invScale);
        tmpCanvas.height = Math.round(cropH * invScale);
        const tmpCtx = tmpCanvas.getContext('2d');
        tmpCtx.drawImage(originalImage, minX * invScale, minY * invScale, tmpCanvas.width, tmpCanvas.height, 0, 0, tmpCanvas.width, tmpCanvas.height);
        enhanceContrast(tmpCanvas, 30);
        const finalCanvas = scaleToOutput(tmpCanvas);
        finalCanvas.toBlob(blob => {
            if (!blob) return;
            previewBlob = blob;
            backupImageData = frozenImageData;
            backupCorners = corners.map(c => ({x:c.x, y:c.y}));
            backupOriginalImage = originalImage;
            const img = new Image();
            img.onload = () => {
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                ctx.drawImage(img, 0, 0);
                previewImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                frozenImageData = previewImageData;
                corners = null;
                previewZoom = 1; previewPanX = 0; previewPanY = 0;
                unbindFramingEvents();
                currentStep = 'preview';
                updateUI();
                bindPreviewEvents();
                drawPreviewScene();
            };
            img.src = URL.createObjectURL(blob);
        }, 'image/jpeg', 0.92);
    }

    function drawPreviewScene() {
        if (!previewImageData) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(canvas.width/2 + previewPanX, canvas.height/2 + previewPanY);
        ctx.scale(previewZoom, previewZoom);
        ctx.translate(-canvas.width/2, -canvas.height/2);
        ctx.putImageData(previewImageData, 0, 0);
        ctx.restore();
    }

    function backToFraming() {
        if (!backupImageData || !backupCorners || !backupOriginalImage) return;
        unbindPreviewEvents();
        frozenImageData = backupImageData;
        corners = backupCorners;
        originalImage = backupOriginalImage;
        canvas.width = frozenImageData.width;
        canvas.height = frozenImageData.height;
        previewBlob = null;
        previewImageData = null;
        previewZoom = 1; previewPanX = 0; previewPanY = 0;
        backupImageData = null;
        backupCorners = null;
        backupOriginalImage = null;
        currentStep = 'framing';
        updateUI();
        bindFramingEvents();
        drawFrozenScene();
    }

    function saveAfterPreview() {
        if (!previewBlob) return;
        unbindPreviewEvents();
        const url = URL.createObjectURL(previewBlob);
        savedPages.push({ url, blob: previewBlob });
        frozenImageData = null;
        previewBlob = null;
        previewImageData = null;
        previewZoom = 1; previewPanX = 0; previewPanY = 0;
        backupImageData = null;
        backupCorners = null;
        if (backupOriginalImage) { backupOriginalImage.src = ''; backupOriginalImage = null; }
        if (originalImage) { originalImage.src = ''; originalImage = null; }
        originalImage = null;
        corners = null;
        currentStep = 'saved';
        updateUI();
    }

    function removeLastPage() {
        if (!savedPages.length) return;
        const item = savedPages.pop();
        URL.revokeObjectURL(item.url);
        if (!savedPages.length) resetToReady();
        else updateUI();
    }

    function clearAllPages() {
        if (!confirm('Удалить все страницы?')) return;
        savedPages.forEach(item => URL.revokeObjectURL(item.url));
        savedPages = [];
        resetToReady();
    }

    async function saveAll() {
        if (savedPages.length === 0) return;
        try {
            const blobs = savedPages.map(p => p.blob);
            const blob = await generatePDFBlob(blobs);
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'FreePDFShoot.pdf';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } catch (err) { console.error(err); }
    }

    async function shareAll() {
        if (savedPages.length === 0) return;
        try {
            const blobs = savedPages.map(p => p.blob);
            const blob = await generatePDFBlob(blobs);
            const file = new File([blob], 'FreePDFShoot.pdf', { type: 'application/pdf' });
            if (navigator.share) {
                await navigator.share({ title: 'FreePDFShoot', text: 'Документ', files: [file] });
            } else {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'FreePDFShoot.pdf';
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        } catch (err) { if (err.name !== 'AbortError') console.error(err); }
    }

    async function generatePDFBlob(blobs) {
        const images = [];
        for (let i = 0; i < blobs.length; i++) {
            const buf = await blobs[i].arrayBuffer();
            images.push({ data: new Uint8Array(buf), dims: null });
        }
        for (let i = 0; i < images.length; i++) {
            images[i].dims = await getJPEGDimensionsFromBlob(blobs[i]);
        }
        const pageW = 595, pageH = 842;
        const parts = [], offsets = [];
        let objNum = 1;
        const imgObjNums = [], pageObjNums = [];
        function addText(str) { parts.push(new TextEncoder().encode(str)); }
        addText('%PDF-1.4\n');
        for (const img of images) {
            offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
            imgObjNums.push(objNum);
            addText(`${objNum} 0 obj\n<< /Type /XObject /Subtype /Image /Width ${img.dims.width} /Height ${img.dims.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter [/DCTDecode] /Length ${img.data.length} >>\nstream\n`);
            parts.push(img.data);
            addText('\nendstream\nendobj\n');
            objNum++;
        }
        const kids = [];
        for (let i = 0; i < images.length; i++) {
            const img = images[i];
            const scale = Math.min((pageW - 40) / img.dims.width, (pageH - 40) / img.dims.height);
            const w = img.dims.width * scale, h = img.dims.height * scale;
            const x = (pageW - w) / 2, y = (pageH - h) / 2;
            const cont = `q ${w} 0 0 ${h} ${x} ${pageH - y - h} cm /Im${imgObjNums[i]} Do Q`;
            offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
            pageObjNums.push(objNum);
            addText(`${objNum} 0 obj\n<< /Type /Page /Parent ${objNum + 2} 0 R /MediaBox [0 0 ${pageW} ${pageH}] /Contents ${objNum + 1} 0 R /Resources << /XObject << /Im${imgObjNums[i]} ${imgObjNums[i]} 0 R >> >> >>\nendobj\n`);
            objNum++;
            offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
            addText(`${objNum} 0 obj\n<< /Length ${cont.length} >>\nstream\n${cont}\nendstream\nendobj\n`);
            objNum++;
            kids.push(pageObjNums[i]);
        }
        const kidsStr = kids.map(k => `${k} 0 R`).join(' ');
        offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
        const pagesObjNum = objNum;
        addText(`${objNum} 0 obj\n<< /Type /Pages /Kids [${kidsStr}] /Count ${kids.length} >>\nendobj\n`);
        objNum++;
        offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
        const catalogObjNum = objNum;
        addText(`${objNum} 0 obj\n<< /Type /Catalog /Pages ${pagesObjNum} 0 R >>\nendobj\n`);
        objNum++;
        const xrefPos = parts.reduce((acc, p) => acc + p.length, 0);
        addText(`xref\n0 ${objNum}\n0000000000 65535 f \n`);
        for (const off of offsets) addText(`${String(off).padStart(10, '0')} 00000 n \n`);
        addText(`trailer\n<< /Size ${objNum} /Root ${catalogObjNum} 0 R >>\nstartxref\n${xrefPos}\n%%EOF`);
        const totalLength = parts.reduce((acc, p) => acc + p.length, 0);
        const result = new Uint8Array(totalLength);
        let offset = 0;
        for (const part of parts) { result.set(part, offset); offset += part.length; }
        return new Blob([result], { type: 'application/pdf' });
    }

    async function getJPEGDimensionsFromBlob(blob) {
        try {
            const img = await createImageBitmap(blob);
            const dims = { width: img.width, height: img.height };
            img.close();
            return dims;
        } catch(e) {
            return { width: 800, height: 600 };
        }
    }

    window.addEventListener('beforeunload', () => {
        savedPages.forEach(item => URL.revokeObjectURL(item.url));
        savedPages = [];
        if (originalImage) { originalImage.src = ''; originalImage = null; }
        frozenImageData = null;
    });
</script>

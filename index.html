<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Глаз прораба</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        .viewfinder { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1; }
        .viewfinder video, .viewfinder canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .viewfinder canvas { z-index: 2; }
        .ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; }
        .ui-overlay > * { pointer-events: auto; }
        .header { position: absolute; top: 12px; left: 0; right: 0; text-align: center; z-index: 11; }
        .header h1 { font-size: 1.2rem; font-weight: 600; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.7); margin: 0; }
        .header .sub { font-size: 0.7rem; color: rgba(255,255,255,0.7); text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
        .lux-indicator { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); color: #ffd966; font-size: 0.7rem; padding: 5px 12px; border-radius: 20px; z-index: 12; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.15); }
        .step-indicator { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 13; }
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: 0.3s; }
        .step-dot.active { background: #2a6df4; box-shadow: 0 0 8px #2a6df4; }
        .step-dot.done { background: #4caf50; }
        .status-bar { text-align: center; padding: 0 20px 8px; font-size: 0.85rem; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); min-height: 24px; transition: color 0.3s; }
        .status-bar.ready { color: #4caf50; font-weight: 500; }
        .status-bar.error { color: #ff6b6b; font-weight: 500; }
        .action-area { padding: 0 16px 20px; display: flex; gap: 8px; }
        .btn { display: block; flex: 1; padding: 14px; font-size: 1rem; font-weight: 600; border: none; border-radius: 14px; cursor: pointer; background: #2a6df4; color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.3); transition: 0.2s; text-align: center; }
        .btn:active { opacity: 0.85; }
        .btn:disabled { background: rgba(58,58,58,0.8); color: #999; cursor: not-allowed; }
        .btn.secondary { background: rgba(51,51,51,0.85); color: #ccc; flex: 0.5; }
        .results { padding: 12px 16px; display: none; background: rgba(20,20,20,0.9); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.1); border-radius: 16px 16px 0 0; margin: 0 8px; }
        .results.visible { display: block; }
        .results .row { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 6px 0; color: #ccc; }
        .results .row span:last-child { font-weight: 600; color: #fff; font-size: 1rem; }
        .results .tip { margin-top: 8px; font-size: 0.85rem; color: #ddd; background: rgba(255,255,255,0.06); padding: 10px; border-radius: 8px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="viewfinder" id="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<div class="ui-overlay">
    <div class="header">
        <h1>Глаз прораба</h1>
        <div class="sub">Стерео-калибровка • Один шаг</div>
    </div>
    <div class="step-indicator" id="stepDots">
        <div class="step-dot active" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
    </div>
    <div class="lux-indicator" id="luxDisplay">-- lx</div>
    <div class="status-bar" id="status">Нажмите «Включить камеру»</div>
    <div class="action-area" id="actionArea">
        <button class="btn" id="actionBtn" onclick="handleAction()">Включить камеру</button>
    </div>
    <div class="results" id="results">
        <div class="row"><span>Ширина объекта:</span><span id="resWidth">—</span></div>
        <div class="row"><span>Высота объекта:</span><span id="resHeight">—</span></div>
        <div class="row"><span>Площадь:</span><span id="resArea">—</span></div>
        <div class="row"><span>Освещённость:</span><span id="resLux">—</span></div>
        <div class="row"><span>Ближайший RAL:</span><span id="resRAL">—</span></div>
        <div class="tip" id="resTip"></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('status');
    const actionArea = document.getElementById('actionArea');
    const resultsDiv = document.getElementById('results');
    const luxDisplay = document.getElementById('luxDisplay');
    const dot1 = document.getElementById('dot1');
    const dot2 = document.getElementById('dot2');

    let stream, currentStep = 'idle', currentLux = null, ambientSensor = null;
    let F_px = null;
    const COIN_DIAMETER_MM = 25;
    const D1_MM = 100; // 10 см
    const D2_MM = 200; // 20 см
    
    // ── ПЕРЕМЕННЫЕ КАЛИБРОВКИ ──
let calibrationState = 'idle'; // 'idle' | 'step1_near' | 'step2_far' | 'done'
let liveFrameId = null;
let captureTimer = 0;
const CAPTURE_THRESHOLD = 20;
let P1_px = null, P2_px = null;
let currentCircleColor = '#ff4444';
let currentCircleRadius = 1;
let currentCircleLabel = '';

// ── ЗАПУСК КАЛИБРОВКИ ──
function startLiveCalibration() {
    if (liveFrameId) cancelAnimationFrame(liveFrameId);
    
    currentStep = 'calibrating';
    calibrationState = 'step1_near';
    captureTimer = 0;
    P1_px = null; P2_px = null;
    
    // Начальные параметры круга
    currentCircleRadius = canvas.width * 0.22; // Большой для 10 см
    currentCircleColor = '#ff4444';
    currentCircleLabel = '~10 см';
    
    statusDiv.textContent = '🔴 Поднесите монету на 10 см к камере';
    statusDiv.className = 'status-bar';
    actionArea.innerHTML = ''; // убираем кнопки, всё по таймингу
    dot1.className = 'step-dot active'; 
    dot2.className = 'step-dot';
    
    liveLoop();
}

// ── ЦИКЛ ЖИВОЙ КАЛИБРОВКИ ──
function liveLoop() {
    if (currentStep !== 'calibrating') return;
    
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const w = canvas.width, h = canvas.height;
    const cx = w / 2, cy = h / 2;
    const r = currentCircleRadius;
    
    // Проверяем, заполнила ли монета круг
    const coinFills = checkCoinInCircle(imageData, w, h, cx, cy, r);
    
    // Затемнение фона
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, w, h);
    ctx.arc(cx, cy, r, 0, Math.PI * 2, true);
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fill();
    ctx.restore();
    
    // Логика захвата и отрисовки круга
    if (coinFills) {
        captureTimer++;
        drawProgressCircle(cx, cy, r, currentCircleColor, captureTimer / CAPTURE_THRESHOLD, currentCircleLabel);
        
        if (captureTimer >= CAPTURE_THRESHOLD) {
            // Захват завершён
            if (calibrationState === 'step1_near') {
                P1_px = r * 2;
                // Переход ко второму кругу
                calibrationState = 'step2_far';
                captureTimer = 0;
                currentCircleRadius = r / 2; // Меньше в 2 раза
                currentCircleColor = '#ff8800';
                currentCircleLabel = '~20 см';
                
                statusDiv.textContent = '🟠 Отведите монету на 20 см';
                dot1.className = 'step-dot done'; 
                dot2.className = 'step-dot active';
                
                // Небольшая пауза, чтобы пользователь сориентировался
                setTimeout(() => {
                    if (currentStep === 'calibrating') liveLoop();
                }, 800);
                return;
                
            } else if (calibrationState === 'step2_far') {
                P2_px = r * 2;
                // Калибровка завершена!
                F_px = (P1_px * P2_px * (200 - 100)) / (25 * (P1_px - P2_px));
                localStorage.setItem('camera_F_px', F_px);
                
                if (liveFrameId) { cancelAnimationFrame(liveFrameId); liveFrameId = null; }
                currentStep = 'calibrated';
                
                statusDiv.textContent = '✅ Калибровка завершена! Наведите на объект.';
                statusDiv.className = 'status-bar ready';
                actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять объект</button>`;
                return;
            }
        }
    } else {
        captureTimer = Math.max(0, captureTimer - 1);
        drawEmptyCircle(cx, cy, r, currentCircleColor, currentCircleLabel);
    }
    
    liveFrameId = requestAnimationFrame(liveLoop);
}
    async function startCamera() {
        statusDiv.textContent = 'Запрашиваю камеру...';
        const configs = [
            { video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } },
            { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } },
            { video: { facingMode: 'environment' } },
            { video: true }
        ];
        for (let c of configs) {
            try {
                stream = await navigator.mediaDevices.getUserMedia(c);
                video.srcObject = stream;
                await video.play();
                canvas.width = video.videoWidth || canvas.clientWidth;
                canvas.height = video.videoHeight || canvas.clientHeight;
                
                // Проверяем localStorage
                const savedFpx = localStorage.getItem('camera_F_px');
                if (savedFpx) {
                    F_px = parseFloat(savedFpx);
                    statusDiv.textContent = 'Камера откалибрована. Наведите на объект.';
                    statusDiv.className = 'status-bar ready';
                    actionArea.innerHTML = `
                        <button class="btn secondary" onclick="resetCalibration()">Сбросить калибровку</button>
                        <button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять объект</button>
                    `;
                    currentStep = 'calibrated';
                    dot1.className = 'step-dot done';
                    dot2.className = 'step-dot active';
                } else {
                    statusDiv.textContent = 'Нажмите «Калибровать».';
                    statusDiv.className = 'status-bar ready';
                    actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">🎯 Калибровать</button>`;
                    currentStep = 'ready';
                    dot1.className = 'step-dot active'; dot2.className = 'step-dot';
                }
                startAmbientSensor();
                return;
            } catch (err) { if (err.name === 'NotAllowedError') break; }
        }
        statusDiv.textContent = 'Ошибка доступа к камере.';
        statusDiv.className = 'status-bar error';
        actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">Попробовать снова</button>`;
    }

    function resetCalibration() {
        localStorage.removeItem('camera_F_px');
        F_px = null;
        leftCaptured = false;
        rightCaptured = false;
        P1 = null; P2 = null;
        if (liveFrameId) { cancelAnimationFrame(liveFrameId); liveFrameId = null; }
        currentStep = 'ready';
        statusDiv.textContent = 'Калибровка сброшена. Нажмите «Калибровать».';
        statusDiv.className = 'status-bar ready';
        actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">🎯 Калибровать</button>`;
        dot1.className = 'step-dot active'; dot2.className = 'step-dot';
    }

    function startAmbientSensor() {
        if ('AmbientLightSensor' in window) {
            try {
                ambientSensor = new AmbientLightSensor();
                ambientSensor.onreading = () => { currentLux = Math.round(ambientSensor.illuminance); luxDisplay.textContent = currentLux + ' lx'; };
                ambientSensor.onerror = () => { luxDisplay.textContent = '-- lx'; };
                ambientSensor.start();
            } catch (e) { luxDisplay.textContent = '-- lx'; }
        } else { luxDisplay.textContent = '-- lx'; }
    }

    // ── КАЛИБРОВКА: ДВА КРУГА ──
    function startLiveCalibration() {
        if (liveFrameId) { cancelAnimationFrame(liveFrameId); liveFrameId = null; }
        
        currentStep = 'calibrating';
        leftCaptured = false;
        rightCaptured = false;
        captureCountLeft = 0;
        captureCountRight = 0;
        P1 = null; P2 = null;
        
        statusDiv.textContent = '🎯 Поднесите монету к красному (10 см) и оранжевому (20 см).';
        statusDiv.className = 'status-bar';
        actionArea.innerHTML = ``;
        dot1.className = 'step-dot active'; dot2.className = 'step-dot';
        
        liveLoop();
    }

    function liveLoop() {
        if (currentStep !== 'calibrating') return;
        
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const w = canvas.width, h = canvas.height;
        
        // Левый круг: ближний (10 см), больше
        const leftR = w * 0.22;
        const leftCx = w * 0.3;
        const leftCy = h * 0.5;
        
        // Правый круг: дальний (20 см), меньше ровно в 2 раза по диаметру
        const rightR = leftR / 2;
        const rightCx = w * 0.7;
        const rightCy = h * 0.5;
        
        // Проверка левого круга
        const leftFills = checkCoinInCircle(imageData, w, h, leftCx, leftCy, leftR);
        // Проверка правого круга
        const rightFills = checkCoinInCircle(imageData, w, h, rightCx, rightCy, rightR);
        
        // Затемнение вне кругов
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, w, h);
        ctx.arc(leftCx, leftCy, leftR, 0, Math.PI*2, true);
        ctx.arc(rightCx, rightCy, rightR, 0, Math.PI*2, true);
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fill();
        ctx.restore();
        
        // Рисуем левый круг
        if (leftCaptured) {
            drawCapturedCircle(leftCx, leftCy, leftR, '#4caf50', '✓ 10 см');
        } else if (leftFills) {
            captureCountLeft++;
            if (captureCountLeft >= CAPTURE_THRESHOLD) {
                leftCaptured = true;
                P1 = leftR * 2;
            }
            drawProgressCircle(leftCx, leftCy, leftR, '#ff4444', captureCountLeft / CAPTURE_THRESHOLD, '10 см');
        } else {
            captureCountLeft = Math.max(0, captureCountLeft - 1);
            drawEmptyCircle(leftCx, leftCy, leftR, '#ff4444', '10 см');
        }
        
        // Рисуем правый круг
        if (rightCaptured) {
            drawCapturedCircle(rightCx, rightCy, rightR, '#4caf50', '✓ 20 см');
        } else if (rightFills) {
            captureCountRight++;
            if (captureCountRight >= CAPTURE_THRESHOLD) {
                rightCaptured = true;
                P2 = rightR * 2;
            }
            drawProgressCircle(rightCx, rightCy, rightR, '#ff8800', captureCountRight / CAPTURE_THRESHOLD, '20 см');
        } else {
            captureCountRight = Math.max(0, captureCountRight - 1);
            drawEmptyCircle(rightCx, rightCy, rightR, '#ff8800', '20 см');
        }
        
        // Статус
        if (leftCaptured && rightCaptured) {
            statusDiv.textContent = '✅ Оба захвачены!';
            statusDiv.className = 'status-bar ready';
        } else if (leftCaptured) {
            statusDiv.textContent = '✅ Ближний захвачен. Поднесите к оранжевому.';
            statusDiv.className = 'status-bar ready';
        } else if (rightCaptured) {
            statusDiv.textContent = '✅ Дальний захвачен. Поднесите к красному.';
            statusDiv.className = 'status-bar ready';
        } else {
            statusDiv.textContent = '🎯 Поднесите монету к красному и оранжевому.';
            statusDiv.className = 'status-bar';
        }
        
        // Авто-переход
        if (leftCaptured && rightCaptured) {
            F_px = (P1 * P2 * (D2_MM - D1_MM)) / (COIN_DIAMETER_MM * (P1 - P2));
            localStorage.setItem('camera_F_px', F_px);
            
            if (liveFrameId) { cancelAnimationFrame(liveFrameId); liveFrameId = null; }
            currentStep = 'calibrated';
            
            statusDiv.textContent = '✅ Калибровка завершена! Наведите на объект.';
            statusDiv.className = 'status-bar ready';
            actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять объект</button>`;
            dot1.className = 'step-dot done'; dot2.className = 'step-dot active';
            return;
        }
        
        liveFrameId = requestAnimationFrame(liveLoop);
    }

    function checkCoinInCircle(imageData, w, h, cx, cy, r) {
        let innerSum = 0, innerCount = 0;
        let hueSum = 0;
        
        for (let y = 0; y < h; y += 3) {
            for (let x = 0; x < w; x += 3) {
                const dist = Math.hypot(x - cx, y - cy);
                if (dist < r * 0.75) {
                    const idx = (y * w + x) * 4;
                    const red = imageData.data[idx];
                    const green = imageData.data[idx + 1];
                    const blue = imageData.data[idx + 2];
                    const bright = (red + green + blue) / 3;
                    innerSum += bright;
                    
                    const maxC = Math.max(red, green, blue);
                    const minC = Math.min(red, green, blue);
                    if (maxC > minC) {
                        let h = 0;
                        if (maxC === red) h = ((green - blue) / (maxC - minC)) % 6;
                        else if (maxC === green) h = (blue - red) / (maxC - minC) + 2;
                        else h = (red - green) / (maxC - minC) + 4;
                        h = h * 60;
                        if (h < 0) h += 360;
                        hueSum += h;
                    }
                    innerCount++;
                }
            }
        }
        
        const innerBright = innerSum / Math.max(innerCount, 1);
        const innerHue = hueSum / Math.max(innerCount, 1);
        
        return innerBright > 110 && innerHue > 35 && innerHue < 75;
    }

    function drawEmptyCircle(cx, cy, r, color, label) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 4;
        ctx.setLineDash([8, 4]);
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.stroke();
        ctx.setLineDash([]);
        
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(label, cx, cy - r - 12);
    }

    function drawProgressCircle(cx, cy, r, color, progress, label) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.lineWidth = 5;
        ctx.stroke();
        
        ctx.beginPath();
        ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + Math.PI*2*progress);
        ctx.strokeStyle = color;
        ctx.lineWidth = 5;
        ctx.shadowColor = color;
        ctx.shadowBlur = 14;
        ctx.stroke();
        ctx.shadowBlur = 0;
        
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(label, cx, cy - r - 12);
    }

    function drawCapturedCircle(cx, cy, r, color, label) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.strokeStyle = color;
        ctx.lineWidth = 5;
        ctx.shadowColor = color;
        ctx.shadowBlur = 16;
        ctx.stroke();
        ctx.shadowBlur = 0;
        
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(label, cx, cy - r - 12);
    }

    // ── СТОП-КАДР ──
    function freezeFrame() {
        if (liveFrameId) { cancelAnimationFrame(liveFrameId); liveFrameId = null; }
        
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        frozenImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        const fw = canvas.width * 0.6, fh = canvas.height * 0.5;
        frame = { x: (canvas.width - fw) / 2, y: (canvas.height - fh) / 2, w: fw, h: fh };
        
        currentStep = 'measuring';
        statusDiv.textContent = '🔵 Растяните синюю рамку по объекту.';
        statusDiv.className = 'status-bar ready';
        actionArea.innerHTML = `
            <button class="btn secondary" onclick="resetFrame()">↺ Сброс</button>
            <button class="btn" id="actionBtn" onclick="handleAction()">✓ Измерить</button>
        `;
        dot2.className = 'step-dot active';
        
        canvas.addEventListener('touchstart', onTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onTouchMove, { passive: false });
        canvas.addEventListener('touchend', onTouchEnd);
        drawFrozenScene();
    }

    function drawFrozenScene() {
        if (!frozenImageData) return;
        ctx.putImageData(frozenImageData, 0, 0);
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (frame) {
            const { x, y, w, h } = frame;
            ctx.save();
            ctx.beginPath();
            ctx.rect(x, y, w, h);
            ctx.clip();
            ctx.putImageData(frozenImageData, 0, 0);
            ctx.restore();
            
            ctx.strokeStyle = '#2a6df4';
            ctx.lineWidth = 4;
            ctx.strokeRect(x, y, w, h);
            
            [[x, y], [x+w, y], [x, y+h], [x+w, y+h]].forEach(([cx, cy]) => {
                ctx.fillStyle = '#2a6df4';
                ctx.beginPath();
                ctx.arc(cx, cy, HANDLE_SIZE/2, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
            });
            
            if (F_px && P1) {
                // Масштаб через P1 (монета на 10 см)
                const scale = P1 / COIN_DIAMETER_MM;
                const wCm = (w / scale / 10).toFixed(1);
                const hCm = (h / scale / 10).toFixed(1);
                const areaM2 = ((w / scale / 1000) * (h / scale / 1000)).toFixed(3);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 28px system-ui';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(0,0,0,0.9)';
                ctx.shadowBlur = 12;
                ctx.fillText(`${wCm} см`, x + w/2, y - 16);
                ctx.save();
                ctx.translate(x - 30, y + h/2);
                ctx.rotate(-Math.PI/2);
                ctx.fillText(`${hCm} см`, 0, 0);
                ctx.restore();
                
                const areaText = `${areaM2} м²`;
                const tw = ctx.measureText(areaText).width + 24;
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(x + w/2 - tw/2, y + h/2 - 16, tw, 32);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 22px system-ui';
                ctx.fillText(areaText, x + w/2, y + h/2 + 8);
                ctx.shadowBlur = 0;
            }
        }
    }

    // ── TOUCH ──
    function onTouchStart(e) {
        if (currentStep !== 'measuring') return;
        e.preventDefault(); e.stopPropagation();
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const sx = (touch.clientX - rect.left) * (canvas.width / rect.width);
        const sy = (touch.clientY - rect.top) * (canvas.height / rect.height);
        
        if (!frame) return;
        const hs = HANDLE_SIZE;
        const handles = [
            { cx: frame.x, cy: frame.y, id: 'frame_tl' },
            { cx: frame.x + frame.w, cy: frame.y, id: 'frame_tr' },
            { cx: frame.x, cy: frame.y + frame.h, id: 'frame_bl' },
            { cx: frame.x + frame.w, cy: frame.y + frame.h, id: 'frame_br' }
        ];
        for (let h of handles) {
            if (Math.hypot(sx - h.cx, sy - h.cy) < hs * 1.3) {
                dragging = h.id;
                dragStart = { x: sx, y: sy };
                frameStart = { ...frame };
                return;
            }
        }
        if (sx > frame.x && sx < frame.x + frame.w && sy > frame.y && sy < frame.y + frame.h) {
            dragging = 'frame_move';
            dragStart = { x: sx, y: sy };
            frameStart = { ...frame };
        }
    }

    function onTouchMove(e) {
        if (!dragging || !frame) return;
        e.preventDefault(); e.stopPropagation();
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const cx = (touch.clientX - rect.left) * (canvas.width / rect.width);
        const cy = (touch.clientY - rect.top) * (canvas.height / rect.height);
        const dx = cx - dragStart.x, dy = cy - dragStart.y, MIN = 40;
        
        if (dragging === 'frame_move') {
            frame.x = Math.max(0, Math.min(canvas.width - frame.w, frameStart.x + dx));
            frame.y = Math.max(0, Math.min(canvas.height - frame.h, frameStart.y + dy));
        } else if (dragging === 'frame_tl') {
            const nx = Math.max(0, Math.min(frameStart.x + frameStart.w - MIN, frameStart.x + dx));
            const ny = Math.max(0, Math.min(frameStart.y + frameStart.h - MIN, frameStart.y + dy));
            frame.w = frameStart.x + frameStart.w - nx; frame.h = frameStart.y + frameStart.h - ny;
            frame.x = nx; frame.y = ny;
        } else if (dragging === 'frame_tr') {
            frame.w = Math.max(MIN, frameStart.w + dx);
            const ny = Math.max(0, Math.min(frameStart.y + frameStart.h - MIN, frameStart.y + dy));
            frame.h = frameStart.y + frameStart.h - ny; frame.y = ny;
        } else if (dragging === 'frame_bl') {
            const nx = Math.max(0, Math.min(frameStart.x + frameStart.w - MIN, frameStart.x + dx));
            frame.w = frameStart.x + frameStart.w - nx; frame.x = nx;
            frame.h = Math.max(MIN, frameStart.h + dy);
        } else if (dragging === 'frame_br') {
            frame.w = Math.max(MIN, frameStart.w + dx);
            frame.h = Math.max(MIN, frameStart.h + dy);
        }
        drawFrozenScene();
    }

    function onTouchEnd(e) { dragging = null; }

    function resetFrame() {
        const fw = canvas.width * 0.6, fh = canvas.height * 0.5;
        frame = { x: (canvas.width - fw) / 2, y: (canvas.height - fh) / 2, w: fw, h: fh };
        drawFrozenScene();
    }

    // ── ФИНАЛ ──
    function finishMeasurement() {
        canvas.removeEventListener('touchstart', onTouchStart);
        canvas.removeEventListener('touchmove', onTouchMove);
        canvas.removeEventListener('touchend', onTouchEnd);
        
        const scale = P1 / COIN_DIAMETER_MM;
        const widthM = (frame.w / scale / 1000);
        const heightM = (frame.h / scale / 1000);
        const area = widthM * heightM;
        
        document.getElementById('resWidth').textContent = widthM.toFixed(2) + ' м (' + (widthM*100).toFixed(1) + ' см)';
        document.getElementById('resHeight').textContent = heightM.toFixed(2) + ' м (' + (heightM*100).toFixed(1) + ' см)';
        document.getElementById('resArea').textContent = area.toFixed(3) + ' м²';
        document.getElementById('resLux').textContent = currentLux ? currentLux + ' люкс' : 'нет данных';
        document.getElementById('resRAL').textContent = 'RAL 9010 (похож)';
        document.getElementById('resTip').textContent = area > 5 ? '👍 Большая область.' : '⚠️ Компактная область.';
        
        resultsDiv.classList.add('visible');
        currentStep = 'done';
        dot1.className = 'step-dot done'; dot2.className = 'step-dot done';
        statusDiv.textContent = '✅ Измерение выполнено!';
        statusDiv.className = 'status-bar';
        actionArea.innerHTML = `<button class="btn secondary" id="actionBtn" onclick="handleAction()">Новое измерение</button>`;
        drawFrozenScene();
    }

    function resetAll() {
        if (liveFrameId) { cancelAnimationFrame(liveFrameId); liveFrameId = null; }
        canvas.removeEventListener('touchstart', onTouchStart);
        canvas.removeEventListener('touchmove', onTouchMove);
        canvas.removeEventListener('touchend', onTouchEnd);
        frozenImageData = null;
        frame = null;
        dragging = null;
        leftCaptured = false;
        rightCaptured = false;
        P1 = null; P2 = null;
        captureCountLeft = 0;
        captureCountRight = 0;
        resultsDiv.classList.remove('visible');
        currentStep = 'idle';
        startCamera();
    }

    window.addEventListener('beforeunload', () => {
        if (stream) stream.getTracks().forEach(t => t.stop());
        if (ambientSensor) ambientSensor.stop();
        if (liveFrameId) cancelAnimationFrame(liveFrameId);
    });
    document.addEventListener('dblclick', () => {
        if (document.fullscreenElement) document.exitFullscreen();
        else document.body.requestFullscreen().catch(() => {});
    });
</script>
</body>
</html>

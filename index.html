<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/freepdfshoot/manifest.json">
    <title>FreePDFShoot – Приватный скан документов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: system-ui, -apple-system, sans-serif; }
        body { touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        .viewfinder { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1; }
        .viewfinder canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 10; padding: 12px 16px 0; display: flex; align-items: center; justify-content: space-between; gap: 12px; pointer-events: none; }
        .top-bar > * { pointer-events: auto; }
        .header { text-align: center; flex: 1; }
        .header h1 { font-size: 1.1rem; font-weight: 600; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.7); margin: 0; }
        .page-counter { background: rgba(0,0,0,0.6); color: #fff; font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; white-space: nowrap; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.15); }
        .action-area { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding: 0 12px 16px; display: flex; gap: 6px; flex-wrap: wrap; background: rgba(0,0,0,0.5); }
        .action-area.transparent { background: rgba(0,0,0,0.3); }
        .btn { display: block; flex: 1; min-width: 55px; padding: 12px 10px; font-size: 0.75rem; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.3); transition: 0.2s; text-align: center; white-space: nowrap; }
        .btn:active { opacity: 0.85; }
        .btn:disabled { background: rgba(58,58,58,0.8); color: #999; cursor: not-allowed; }
        .btn.primary { background: #2a6df4; }
        .btn.secondary { background: rgba(51,51,51,0.85); color: #ccc; }
        .btn.danger { background: rgba(180,40,40,0.85); }
        .btn.save { background: #4caf50; }
        .progress-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 20; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .progress-overlay.visible { display: flex; }
        .progress-text { color: #fff; font-size: 1rem; margin-bottom: 12px; }
        .progress-bar { width: 200px; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: #2a6df4; transition: width 0.3s; }
    </style>
</head>
<body>
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
<div class="viewfinder"><canvas id="canvas"></canvas></div>
<div class="progress-overlay" id="progressOverlay">
    <div class="progress-text" id="progressText">Создаю PDF...</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>
<div class="top-bar">
    <div class="page-counter" id="pageCounter">Страниц: 0</div>
    <div class="header"><h1>FreePDFShoot</h1></div>
</div>
<div class="action-area" id="actionArea"><button class="btn primary" id="actionBtn">📸 Снять</button></div>

<script>
(function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const actionArea = document.getElementById('actionArea');
    const pageCounter = document.getElementById('pageCounter');
    const cameraInput = document.getElementById('cameraInput');
    const progressOverlay = document.getElementById('progressOverlay');
    const progressText = document.getElementById('progressText');
    const progressFill = document.getElementById('progressFill');

    let currentStep = 'ready';
    let savedPages = [];
    let frozenImageData = null;
    let corners = null;
    let draggingCorner = -1;
    const HANDLE_SIZE = 44;
    let originalImage = null;
    let displayScale = 1;

    // Навешиваем обработчики здесь, а не в HTML
    document.getElementById('actionBtn').addEventListener('click', handleAction);
    cameraInput.addEventListener('change', onSystemPhoto);

    function handleAction() {
        if (currentStep === 'saving' || currentStep === 'generating') return;
        switch (currentStep) {
            case 'ready': cameraInput.click(); break;
            case 'framing': cropAndSave(); break;
            case 'saved': cameraInput.click(); break;
        }
    }

    function onSystemPhoto(event) {
        const file = event.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
            URL.revokeObjectURL(url);
            originalImage = img;
            const MAX_DIM = 1500;
            displayScale = 1;
            if (img.naturalWidth > MAX_DIM || img.naturalHeight > MAX_DIM) {
                displayScale = MAX_DIM / Math.max(img.naturalWidth, img.naturalHeight);
            }
            canvas.width = Math.round(img.naturalWidth * displayScale);
            canvas.height = Math.round(img.naturalHeight * displayScale);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            frozenImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const mX = canvas.width * 0.1, mY = canvas.height * 0.1;
            corners = [
                {x:mX, y:mY}, {x:canvas.width - mX, y:mY},
                {x:canvas.width - mX, y:canvas.height - mY}, {x:mX, y:canvas.height - mY}
            ];
            draggingCorner = -1;
            currentStep = 'framing';
            updateUI();
            bindFramingEvents();
            drawFrozenScene();
        };
        img.src = url;
        cameraInput.value = '';
    }

    function resetToReady() {
        unbindFramingEvents();
        frozenImageData = null;
        if (originalImage) { originalImage.src = ''; originalImage = null; }
        corners = null;
        draggingCorner = -1;
        currentStep = 'ready';
        updateUI();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function updateUI() {
        actionArea.classList.remove('transparent');
        const btn = document.getElementById('actionBtn');
        // Снимаем старый обработчик
        btn.removeEventListener('click', handleAction);
        
        switch (currentStep) {
            case 'ready':
                actionArea.innerHTML = `
                    <button class="btn primary" id="actionBtn">📸 Снять</button>
                    ${savedPages.length > 0 ? `
                        <button class="btn secondary" id="shareBtn">📤 (${savedPages.length})</button>
                        <button class="btn save" id="saveBtn">💾</button>
                        <button class="btn danger" id="clearBtn">🗑</button>
                    ` : ''}
                `;
                break;
            case 'framing':
                actionArea.innerHTML = `
                    <button class="btn secondary" id="resetCropBtn">↺</button>
                    <button class="btn danger" id="resetReadyBtn">↩</button>
                    <button class="btn primary" id="actionBtn">✂️ Обрезать</button>
                `;
                break;
            case 'saving':
                actionArea.innerHTML = `<button class="btn primary" disabled>⏳</button>`;
                break;
            case 'saved':
                actionArea.innerHTML = `
                    <button class="btn primary" id="actionBtn">📸 Снять ещё</button>
                    <button class="btn danger" id="removeBtn">🗑</button>
                    <button class="btn save" id="saveBtn">💾</button>
                    <button class="btn secondary" id="shareBtn">📤 (${savedPages.length})</button>
                `;
                break;
            case 'generating':
                actionArea.innerHTML = `<button class="btn primary" disabled>⏳ PDF...</button>`;
                return; // Не навешиваем обработчики
        }
        
        // Навешиваем новый обработчик на главную кнопку
        const newBtn = document.getElementById('actionBtn');
        if (newBtn && !newBtn.disabled) {
            newBtn.addEventListener('click', handleAction);
        }
        // Навешиваем обработчики на дополнительные кнопки
        const shareBtn = document.getElementById('shareBtn');
        const saveBtn = document.getElementById('saveBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resetCropBtn = document.getElementById('resetCropBtn');
        const resetReadyBtn = document.getElementById('resetReadyBtn');
        const removeBtn = document.getElementById('removeBtn');
        
        if (shareBtn) shareBtn.addEventListener('click', sharePDF);
        if (saveBtn) saveBtn.addEventListener('click', savePDF);
        if (clearBtn) clearBtn.addEventListener('click', clearAllPages);
        if (resetCropBtn) resetCropBtn.addEventListener('click', resetCrop);
        if (resetReadyBtn) resetReadyBtn.addEventListener('click', resetToReady);
        if (removeBtn) removeBtn.addEventListener('click', removeLastPage);
    }

    function bindFramingEvents() {
        canvas.addEventListener('touchstart', onFramingTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onFramingTouchMove, { passive: false });
        canvas.addEventListener('touchend', onFramingTouchEnd);
        canvas.addEventListener('touchcancel', onFramingTouchEnd);
        canvas.addEventListener('mousedown', onFramingMouseDown);
        window.addEventListener('mousemove', onFramingMouseMove);
        window.addEventListener('mouseup', onFramingMouseUp);
    }

    function unbindFramingEvents() {
        canvas.removeEventListener('touchstart', onFramingTouchStart);
        canvas.removeEventListener('touchmove', onFramingTouchMove);
        canvas.removeEventListener('touchend', onFramingTouchEnd);
        canvas.removeEventListener('touchcancel', onFramingTouchEnd);
        canvas.removeEventListener('mousedown', onFramingMouseDown);
        window.removeEventListener('mousemove', onFramingMouseMove);
        window.removeEventListener('mouseup', onFramingMouseUp);
    }

    function toCanvasCoords(clientX, clientY) {
        var r = canvas.getBoundingClientRect();
        var scaleX = canvas.width / r.width;
        var scaleY = canvas.height / r.height;
        return {
            x: (clientX - r.left) * scaleX,
            y: (clientY - r.top) * scaleY
        };
    }

    function findCornerUnderFinger(cx, cy) {
        if (!corners) return -1;
        for (var i = 0; i < corners.length; i++) {
            var dx = cx - corners[i].x;
            var dy = cy - corners[i].y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < HANDLE_SIZE * 2) return i;
        }
        return -1;
    }

    function drawFrozenScene() {
        if (!frozenImageData) return;
        ctx.putImageData(frozenImageData, 0, 0);
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (!corners) return;
        const [TL, TR, BR, BL] = corners;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(TL.x, TL.y); ctx.lineTo(TR.x, TR.y);
        ctx.lineTo(BR.x, BR.y); ctx.lineTo(BL.x, BL.y);
        ctx.closePath(); ctx.clip();
        ctx.putImageData(frozenImageData, 0, 0);
        ctx.restore();
        ctx.strokeStyle = '#2a6df4'; ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(TL.x, TL.y); ctx.lineTo(TR.x, TR.y);
        ctx.lineTo(BR.x, BR.y); ctx.lineTo(BL.x, BL.y);
        ctx.closePath(); ctx.stroke();
        [TL, TR, BR, BL].forEach((c, i) => {
            ctx.fillStyle = '#2a6df4'; ctx.beginPath();
            ctx.arc(c.x, c.y, HANDLE_SIZE/2, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
            ctx.fillStyle = '#fff'; ctx.font = 'bold 12px system-ui';
            ctx.textAlign = 'center'; ctx.fillText(i+1, c.x, c.y+5);
        });
    }

    function onFramingTouchStart(e) {
        if (currentStep !== 'framing') return;
        e.preventDefault(); e.stopPropagation();
        var touch = e.touches[0];
        var coords = toCanvasCoords(touch.clientX, touch.clientY);
        draggingCorner = findCornerUnderFinger(coords.x, coords.y);
    }

    function onFramingTouchMove(e) {
        if (currentStep !== 'framing') return;
        e.preventDefault(); e.stopPropagation();
        if (draggingCorner < 0 || !corners) return;
        var touch = e.touches[0];
        var coords = toCanvasCoords(touch.clientX, touch.clientY);
        corners[draggingCorner].x = Math.max(0, Math.min(canvas.width, coords.x));
        corners[draggingCorner].y = Math.max(0, Math.min(canvas.height, coords.y));
        drawFrozenScene();
    }

    function onFramingTouchEnd(e) { draggingCorner = -1; }

    function onFramingMouseDown(e) {
        if (currentStep !== 'framing') return;
        e.preventDefault();
        var coords = toCanvasCoords(e.clientX, e.clientY);
        draggingCorner = findCornerUnderFinger(coords.x, coords.y);
    }

    function onFramingMouseMove(e) {
        if (draggingCorner < 0 || !corners) return;
        e.preventDefault();
        var coords = toCanvasCoords(e.clientX, e.clientY);
        corners[draggingCorner].x = Math.max(0, Math.min(canvas.width, coords.x));
        corners[draggingCorner].y = Math.max(0, Math.min(canvas.height, coords.y));
        drawFrozenScene();
    }

    function onFramingMouseUp(e) { draggingCorner = -1; }

    function resetCrop() {
        const mX = canvas.width * 0.1, mY = canvas.height * 0.1;
        corners = [
            {x:mX, y:mY}, {x:canvas.width - mX, y:mY},
            {x:canvas.width - mX, y:canvas.height - mY}, {x:mX, y:canvas.height - mY}
        ];
        drawFrozenScene();
    }

    function cropAndSave() {
        if (currentStep !== 'framing') return;
        currentStep = 'saving';
        updateUI();
        unbindFramingEvents();
        const [TL, TR, BR, BL] = corners;
        const minX = Math.max(0, Math.min(TL.x, BL.x));
        const maxX = Math.min(canvas.width, Math.max(TR.x, BR.x));
        const minY = Math.max(0, Math.min(TL.y, TR.y));
        const maxY = Math.min(canvas.height, Math.max(BL.y, BR.y));
        const cropW = maxX - minX;
        const cropH = maxY - minY;
        if (cropW < 10 || cropH < 10) {
            currentStep = 'framing';
            bindFramingEvents();
            updateUI();
            return;
        }
        const invScale = 1 / displayScale;
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = Math.round(cropW * invScale);
        tmpCanvas.height = Math.round(cropH * invScale);
        const tmpCtx = tmpCanvas.getContext('2d');
        tmpCtx.drawImage(originalImage, minX * invScale, minY * invScale, tmpCanvas.width, tmpCanvas.height, 0, 0, tmpCanvas.width, tmpCanvas.height);
        tmpCanvas.toBlob(blob => {
            if (!blob) {
                currentStep = 'framing';
                bindFramingEvents();
                updateUI();
                return;
            }
            const url = URL.createObjectURL(blob);
            savedPages.push({ url, blob });
            updatePageCounter();
            frozenImageData = null;
            if (originalImage) { originalImage.src = ''; originalImage = null; }
            corners = null;
            currentStep = 'saved';
            updateUI();
        }, 'image/jpeg', 0.92);
    }

    function updatePageCounter() { pageCounter.textContent = savedPages.length ? `Страниц: ${savedPages.length}` : 'Страниц: 0'; }

    function removeLastPage() {
        if (!savedPages.length) return;
        const item = savedPages.pop();
        URL.revokeObjectURL(item.url);
        updatePageCounter();
        if (!savedPages.length) resetToReady();
        else updateUI();
    }

    function clearAllPages() {
        if (!confirm('Удалить все страницы?')) return;
        savedPages.forEach(item => URL.revokeObjectURL(item.url));
        savedPages = [];
        updatePageCounter();
        resetToReady();
    }

    async function savePDF() {
        if (savedPages.length === 0) return;
        currentStep = 'generating';
        updateUI();
        progressOverlay.classList.add('visible');
        progressFill.style.width = '0%';
        try {
            const blobs = savedPages.map(p => p.blob);
            const blob = await generatePDFBlob(blobs);
            progressFill.style.width = '100%';
            await new Promise(r => setTimeout(r, 200));
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'FreePDFShoot.pdf';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } catch (err) { console.error(err); }
        finally {
            progressOverlay.classList.remove('visible');
            currentStep = 'saved';
            updateUI();
        }
    }

    async function sharePDF() {
        if (savedPages.length === 0) return;
        currentStep = 'generating';
        updateUI();
        progressOverlay.classList.add('visible');
        progressFill.style.width = '0%';
        try {
            const blobs = savedPages.map(p => p.blob);
            const blob = await generatePDFBlob(blobs);
            progressFill.style.width = '100%';
            await new Promise(r => setTimeout(r, 200));
            const file = new File([blob], 'FreePDFShoot.pdf', { type: 'application/pdf' });
            if (navigator.share) {
                await navigator.share({ title: 'FreePDFShoot', text: 'Документ', files: [file] });
            } else {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'FreePDFShoot.pdf';
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        } catch (err) { if (err.name !== 'AbortError') console.error(err); }
        finally {
            progressOverlay.classList.remove('visible');
            currentStep = 'saved';
            updateUI();
        }
    }

    async function generatePDFBlob(blobs) {
        const images = [];
        for (let i = 0; i < blobs.length; i++) {
            const buf = await blobs[i].arrayBuffer();
            images.push({ data: new Uint8Array(buf), dims: null });
        }
        for (let i = 0; i < images.length; i++) {
            progressText.textContent = `Страница ${i + 1} из ${images.length}`;
            progressFill.style.width = `${Math.round((i / images.length) * 100)}%`;
            images[i].dims = await getJPEGDimensionsFromBlob(blobs[i]);
        }
        const pageW = 595, pageH = 842;
        const parts = [], offsets = [];
        let objNum = 1;
        const imgObjNums = [], pageObjNums = [];
        function addText(str) { parts.push(new TextEncoder().encode(str)); }
        addText('%PDF-1.4\n');
        for (const img of images) {
            offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
            imgObjNums.push(objNum);
            addText(`${objNum} 0 obj\n<< /Type /XObject /Subtype /Image /Width ${img.dims.width} /Height ${img.dims.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter [/DCTDecode] /Length ${img.data.length} >>\nstream\n`);
            parts.push(img.data);
            addText('\nendstream\nendobj\n');
            objNum++;
        }
        const kids = [];
        for (let i = 0; i < images.length; i++) {
            const img = images[i];
            const scale = Math.min((pageW - 40) / img.dims.width, (pageH - 40) / img.dims.height);
            const w = img.dims.width * scale, h = img.dims.height * scale;
            const x = (pageW - w) / 2, y = (pageH - h) / 2;
            const cont = `q ${w} 0 0 ${h} ${x} ${pageH - y - h} cm /Im${imgObjNums[i]} Do Q`;
            offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
            pageObjNums.push(objNum);
            addText(`${objNum} 0 obj\n<< /Type /Page /Parent ${objNum + 2} 0 R /MediaBox [0 0 ${pageW} ${pageH}] /Contents ${objNum + 1} 0 R /Resources << /XObject << /Im${imgObjNums[i]} ${imgObjNums[i]} 0 R >> >> >>\nendobj\n`);
            objNum++;
            offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
            addText(`${objNum} 0 obj\n<< /Length ${cont.length} >>\nstream\n${cont}\nendstream\nendobj\n`);
            objNum++;
            kids.push(pageObjNums[i]);
        }
        const kidsStr = kids.map(k => `${k} 0 R`).join(' ');
        offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
        const pagesObjNum = objNum;
        addText(`${objNum} 0 obj\n<< /Type /Pages /Kids [${kidsStr}] /Count ${kids.length} >>\nendobj\n`);
        objNum++;
        offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
        const catalogObjNum = objNum;
        addText(`${objNum} 0 obj\n<< /Type /Catalog /Pages ${pagesObjNum} 0 R >>\nendobj\n`);
        objNum++;
        const xrefPos = parts.reduce((acc, p) => acc + p.length, 0);
        addText(`xref\n0 ${objNum}\n0000000000 65535 f \n`);
        for (const off of offsets) addText(`${String(off).padStart(10, '0')} 00000 n \n`);
        addText(`trailer\n<< /Size ${objNum} /Root ${catalogObjNum} 0 R >>\nstartxref\n${xrefPos}\n%%EOF`);
        const totalLength = parts.reduce((acc, p) => acc + p.length, 0);
        const result = new Uint8Array(totalLength);
        let offset = 0;
        for (const part of parts) { result.set(part, offset); offset += part.length; }
        return new Blob([result], { type: 'application/pdf' });
    }

    async function getJPEGDimensionsFromBlob(blob) {
        try {
            const img = await createImageBitmap(blob);
            const dims = { width: img.width, height: img.height };
            img.close();
            return dims;
        } catch(e) { return { width: 800, height: 600 }; }
    }

    window.addEventListener('beforeunload', () => {
        savedPages.forEach(item => URL.revokeObjectURL(item.url));
        savedPages = [];
        if (originalImage) { originalImage.src = ''; originalImage = null; }
        frozenImageData = null;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.width = 0; canvas.height = 0;
    });

    // Инициализация
    updateUI();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>FreePDFShoot – Приватный PDF-сканер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: system-ui, -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        .viewfinder { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1; }
        .viewfinder video, .viewfinder canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .viewfinder canvas { z-index: 2; }
        .ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; }
        .ui-overlay > * { pointer-events: auto; }
        .header { position: absolute; top: 12px; left: 0; right: 0; text-align: center; z-index: 11; }
        .header h1 { font-size: 1.2rem; font-weight: 600; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.7); margin: 0; }
        .header .sub { font-size: 0.7rem; color: rgba(255,255,255,0.7); text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
        .page-counter { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.6); color: #fff; font-size: 0.8rem; padding: 5px 12px; border-radius: 20px; z-index: 12; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.15); }
        .status-bar { text-align: center; padding: 0 20px 8px; font-size: 0.85rem; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); min-height: 24px; }
        .status-bar.ready { color: #4caf50; font-weight: 500; }
        .status-bar.error { color: #ff6b6b; font-weight: 500; }
        .action-area { padding: 0 16px 20px; display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { display: block; flex: 1; min-width: 70px; padding: 14px; font-size: 0.85rem; font-weight: 600; border: none; border-radius: 14px; cursor: pointer; background: #2a6df4; color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.3); transition: 0.2s; text-align: center; }
        .btn:active { opacity: 0.85; }
        .btn:disabled { background: rgba(58,58,58,0.8); color: #999; cursor: not-allowed; }
        .btn.secondary { background: rgba(51,51,51,0.85); color: #ccc; flex: 0.5; }
        .btn.danger { background: rgba(180,40,40,0.85); color: #fff; flex: 0.5; }
        .btn.accent { background: #8e44ad; color: #fff; flex: 0.5; }
        .results { padding: 12px 16px; display: none; background: rgba(20,20,20,0.9); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.1); border-radius: 16px 16px 0 0; margin: 0 8px; }
        .results.visible { display: block; }
        .results .tip { font-size: 0.85rem; color: #ddd; background: rgba(255,255,255,0.06); padding: 10px; border-radius: 8px; line-height: 1.4; text-align: center; }
    </style>
</head>
<body>

<div class="viewfinder" id="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<div class="ui-overlay">
    <div class="header"><h1>FreePDFShoot</h1><div class="sub">Бесплатный • Приватный • Без серверов</div></div>
    <div class="page-counter" id="pageCounter">Страниц: 0</div>
    <div class="status-bar" id="status">Нажмите «Включить камеру»</div>
    <div class="action-area" id="actionArea"><button class="btn" id="actionBtn" onclick="handleAction()">Включить камеру</button></div>
    <div class="results" id="results"><div class="tip" id="resTip"></div></div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('status');
    const actionArea = document.getElementById('actionArea');
    const resultsDiv = document.getElementById('results');
    const pageCounter = document.getElementById('pageCounter');

    let stream, currentStep = 'idle';
    let savedPages = [];
    let frozenImageData = null;
    let corners = null;
    let draggingCorner = -1;
    const HANDLE_SIZE = 44;

    // Лупа
    let lensActive = false, lensX = 0, lensY = 0;
    const LENS_RADIUS = 100;
    let lensMode = 'full';
    let longPressTimer = null, longPressTriggered = false;

    // Live Zoom
    let liveZoom = 1;
    let livePanX = 0, livePanY = 0;
    let lastPinchDist = 0;

    // Ч/Б режим
    let bwMode = false;

    function handleAction() {
        switch (currentStep) {
            case 'idle': startCamera(); break;
            case 'ready': freezeFrame(); break;
            case 'framing': savePage(); break;
            case 'saved': resetToNewFrame(); break;
        }
    }

    async function startCamera() {
        statusDiv.textContent = 'Запрашиваю камеру...';
        const configs = [
            { video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } },
            { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } },
            { video: { facingMode: 'environment' } }, { video: true }
        ];
        for (let c of configs) {
            try {
                stream = await navigator.mediaDevices.getUserMedia(c);
                video.srcObject = stream; await video.play();
                canvas.width = video.videoWidth || canvas.clientWidth;
                canvas.height = video.videoHeight || canvas.clientHeight;
                statusDiv.textContent = 'Наведите камеру. Pinch-to-zoom.';
                statusDiv.className = 'status-bar ready';
                actionArea.innerHTML = `
                    <button class="btn" onclick="toggleBW()">📄 ${bwMode ? 'Цвет' : 'Ч/Б'}</button>
                    <button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять</button>
                `;
                currentStep = 'ready'; updatePageCounter();
                startLiveView();
                return;
            } catch (err) { if (err.name === 'NotAllowedError') break; }
        }
        statusDiv.textContent = 'Ошибка доступа к камере.'; statusDiv.className = 'status-bar error';
        actionArea.innerHTML = `<button class="btn" onclick="handleAction()">Попробовать снова</button>`;
    }

    function toggleBW() { bwMode = !bwMode; updateLiveButtons(); }
    function updateLiveButtons() {
        actionArea.innerHTML = `
            <button class="btn" onclick="toggleBW()">📄 ${bwMode ? 'Цвет' : 'Ч/Б'}</button>
            <button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять</button>
        `;
    }

    function startLiveView() {
        const drawLive = () => {
            if (currentStep !== 'ready') return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.scale(liveZoom, liveZoom);
            ctx.translate(-canvas.width/2 + livePanX, -canvas.height/2 + livePanY);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();
            if (bwMode) {
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const gray = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
                    data[i] = data[i+1] = data[i+2] = gray;
                }
                ctx.putImageData(imgData, 0, 0);
            }
            requestAnimationFrame(drawLive);
        };
        drawLive();
        canvas.addEventListener('touchstart', onLiveTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onLiveTouchMove, { passive: false });
        canvas.addEventListener('touchend', onLiveTouchEnd);
    }

    function onLiveTouchStart(e) {
        if (e.touches.length === 2) {
            lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
    }
    function onLiveTouchMove(e) {
        if (e.touches.length === 2) {
            e.preventDefault();
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            if (lastPinchDist) {
                const scale = dist / lastPinchDist;
                liveZoom = Math.max(1, Math.min(5, liveZoom * scale));
                lastPinchDist = dist;
            }
            lastPinchDist = dist;
        }
    }
    function onLiveTouchEnd(e) { if (e.touches.length < 2) lastPinchDist = 0; }

    function freezeFrame() {
        canvas.removeEventListener('touchstart', onLiveTouchStart);
        canvas.removeEventListener('touchmove', onLiveTouchMove);
        canvas.removeEventListener('touchend', onLiveTouchEnd);
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(liveZoom, liveZoom);
        ctx.translate(-canvas.width/2 + livePanX, -canvas.height/2 + livePanY);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();
        if (bwMode) {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
                data[i] = data[i+1] = data[i+2] = gray;
            }
            ctx.putImageData(imgData, 0, 0);
        }
        frozenImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const marginX = canvas.width * 0.25, marginY = canvas.height * 0.25;
        corners = [
            { x: marginX, y: marginY }, { x: canvas.width - marginX, y: marginY },
            { x: canvas.width - marginX, y: canvas.height - marginY }, { x: marginX, y: canvas.height - marginY }
        ];
        lensActive = false; lensMode = 'full'; longPressTriggered = false; draggingCorner = -1;
        if (longPressTimer) clearTimeout(longPressTimer);
        currentStep = 'framing';
        statusDiv.textContent = '📐 Расставьте маркеры. Двойной тап — лупа.';
        statusDiv.className = 'status-bar ready';
        actionArea.innerHTML = `
            <button class="btn secondary" onclick="resetCorners()">↺ Сброс</button>
            <button class="btn accent" onclick="setFragmentMode()">🔍 Фрагмент</button>
            <button class="btn" id="actionBtn" onclick="handleAction()">✓ Сохранить</button>
        `;
        canvas.addEventListener('touchstart', onFramingTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onFramingTouchMove, { passive: false });
        canvas.addEventListener('touchend', onFramingTouchEnd);
        canvas.addEventListener('dblclick', onDoubleTap);
        drawFrozenScene();
    }

    function setFragmentMode() {
        lensMode = lensMode === 'full' ? 'fragment' : 'full';
        const btn = document.querySelector('.btn.accent');
        if (btn) btn.textContent = lensMode === 'full' ? '🔍 Фрагмент' : '📄 Весь документ';
    }

    function drawFrozenScene() {
        if (!frozenImageData) return;
        ctx.putImageData(frozenImageData, 0, 0);
        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (!corners) return;
        if (lensMode === 'full') {
            const [TL, TR, BR, BL] = corners;
            ctx.save(); ctx.beginPath();
            ctx.moveTo(TL.x, TL.y); ctx.lineTo(TR.x, TR.y);
            ctx.lineTo(BR.x, BR.y); ctx.lineTo(BL.x, BL.y); ctx.closePath();
            ctx.clip(); ctx.putImageData(frozenImageData, 0, 0); ctx.restore();
            ctx.strokeStyle = '#2a6df4'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(TL.x, TL.y); ctx.lineTo(TR.x, TR.y);
            ctx.lineTo(BR.x, BR.y); ctx.lineTo(BL.x, BL.y); ctx.closePath(); ctx.stroke();
            corners.forEach((c, i) => {
                ctx.fillStyle = '#2a6df4'; ctx.beginPath(); ctx.arc(c.x, c.y, HANDLE_SIZE/2, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.font = 'bold 12px system-ui'; ctx.textAlign = 'center'; ctx.fillText(i+1, c.x, c.y+5);
            });
        }
        if (lensActive) {
            ctx.save(); ctx.beginPath(); ctx.arc(lensX, lensY, LENS_RADIUS, 0, Math.PI*2); ctx.clip();
            const zoomFactor = 2.5; const srcW = LENS_RADIUS*2/zoomFactor, srcH = LENS_RADIUS*2/zoomFactor;
            ctx.drawImage(canvas, lensX-srcW/2, lensY-srcH/2, srcW, srcH, lensX-LENS_RADIUS, lensY-LENS_RADIUS, LENS_RADIUS*2, LENS_RADIUS*2);
            ctx.restore();
            ctx.beginPath(); ctx.arc(lensX, lensY, LENS_RADIUS, 0, Math.PI*2);
            ctx.strokeStyle = lensMode === 'fragment' ? '#8e44ad' : '#fff';
            ctx.lineWidth = 4; ctx.setLineDash(lensMode === 'fragment' ? [6,3] : []); ctx.stroke(); ctx.setLineDash([]);
        }
    }

    function onFramingTouchStart(e) {
        if (currentStep !== 'framing') return;
        e.preventDefault(); e.stopPropagation();
        const touch = e.touches[0]; const rect = canvas.getBoundingClientRect();
        const sx = (touch.clientX - rect.left) * (canvas.width / rect.width);
        const sy = (touch.clientY - rect.top) * (canvas.height / rect.height);
        longPressTriggered = false;
        if (longPressTimer) clearTimeout(longPressTimer);
        if (lensActive && corners) {
            for (let i = 0; i < corners.length; i++) {
                if (Math.hypot(sx - corners[i].x, sy - corners[i].y) < HANDLE_SIZE * 1.5) {
                    longPressTimer = setTimeout(() => { longPressTriggered = true; draggingCorner = i; }, 300);
                    return;
                }
            }
        }
        if (lensActive) { lensX = sx; lensY = sy; drawFrozenScene(); }
        else if (corners) {
            for (let i = 0; i < corners.length; i++) {
                if (Math.hypot(sx - corners[i].x, sy - corners[i].y) < HANDLE_SIZE * 1.3) { draggingCorner = i; return; }
            }
        }
    }

    function onFramingTouchMove(e) {
        if (currentStep !== 'framing') return;
        e.preventDefault(); e.stopPropagation();
        const touch = e.touches[0]; const rect = canvas.getBoundingClientRect();
        const cx = (touch.clientX - rect.left) * (canvas.width / rect.width);
        const cy = (touch.clientY - rect.top) * (canvas.height / rect.height);
        if (longPressTimer && !longPressTriggered) { clearTimeout(longPressTimer); longPressTimer = null; }
        if (lensActive && !longPressTriggered && draggingCorner < 0) { lensX = cx; lensY = cy; drawFrozenScene(); return; }
        if (draggingCorner >= 0 && corners) {
            corners[draggingCorner].x = Math.max(0, Math.min(canvas.width, cx));
            corners[draggingCorner].y = Math.max(0, Math.min(canvas.height, cy));
            drawFrozenScene();
        }
    }

    function onFramingTouchEnd(e) {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        draggingCorner = -1; longPressTriggered = false;
    }

    function onDoubleTap(e) {
        if (currentStep !== 'framing') return;
        e.preventDefault(); const rect = canvas.getBoundingClientRect();
        lensActive = !lensActive;
        if (lensActive) {
            lensX = (e.clientX - rect.left) * (canvas.width / rect.width);
            lensY = (e.clientY - rect.top) * (canvas.height / rect.height);
            statusDiv.textContent = '🔍 Лупа. Удерживайте маркер для захвата.';
        } else { statusDiv.textContent = '📐 Лупа выключена.'; }
        drawFrozenScene();
    }

    function resetCorners() {
        const marginX = canvas.width * 0.25, marginY = canvas.height * 0.25;
        corners = [
            { x: marginX, y: marginY }, { x: canvas.width - marginX, y: marginY },
            { x: canvas.width - marginX, y: canvas.height - marginY }, { x: marginX, y: canvas.height - marginY }
        ];
        lensActive = false; lensMode = 'full'; draggingCorner = -1; longPressTriggered = false;
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        const btn = document.querySelector('.btn.accent'); if (btn) btn.textContent = '🔍 Фрагмент';
        drawFrozenScene();
        statusDiv.textContent = '📐 Сброшено.';
    }

    function savePage() {
        if (currentStep !== 'framing') return;
        currentStep = 'saving';
        canvas.removeEventListener('touchstart', onFramingTouchStart);
        canvas.removeEventListener('touchmove', onFramingTouchMove);
        canvas.removeEventListener('touchend', onFramingTouchEnd);
        canvas.removeEventListener('dblclick', onDoubleTap);

        let srcCorners = (lensMode === 'fragment' && lensActive)
            ? [{x:lensX-LENS_RADIUS,y:lensY-LENS_RADIUS},{x:lensX+LENS_RADIUS,y:lensY-LENS_RADIUS},{x:lensX+LENS_RADIUS,y:lensY+LENS_RADIUS},{x:lensX-LENS_RADIUS,y:lensY+LENS_RADIUS}]
            : corners;
        if (!srcCorners) { statusDiv.textContent='Ошибка.'; currentStep='framing'; return; }

        const rectified = rectifyDocument(srcCorners, frozenImageData);
        if (!rectified) { statusDiv.textContent='Ошибка ракурса.'; statusDiv.className='status-bar error'; currentStep='framing'; return; }
        rectified.toBlob(blob => {
            savedPages.push(blob); updatePageCounter();
            currentStep = 'saved'; statusDiv.textContent='✅ Сохранено.'; statusDiv.className='status-bar ready';
            actionArea.innerHTML = `<button class="btn secondary" onclick="resetToNewFrame()">📸 Снять ещё</button><button class="btn danger" onclick="removeLastPage()">🗑</button><button class="btn" onclick="printAllPages()">🖨 PDF (${savedPages.length})</button>`;
            resultsDiv.classList.add('visible'); document.getElementById('resTip').textContent='Никуда не передаётся.';
        }, 'image/jpeg', 0.95);
    }

    function rectifyDocument(srcPoints, imageData) {
        const [TL,TR,BR,BL] = srcPoints;
        const topLen = Math.hypot(TR.x-TL.x, TR.y-TL.y), bottomLen = Math.hypot(BR.x-BL.x, BR.y-BL.y);
        const leftLen = Math.hypot(BL.x-TL.x, BL.y-TL.y), rightLen = Math.hypot(BR.x-TR.x, BR.y-TR.y);
        const outW = Math.round((topLen+bottomLen)/2), outH = Math.round((leftLen+rightLen)/2);
        if (outW<20||outH<20) return null;
        const maxDim=4000; let s=1; if (Math.max(outW,outH)>maxDim) s=maxDim/Math.max(outW,outH);
        const fW=Math.round(outW*s), fH=Math.round(outH*s);
        const dst=[{x:0,y:0},{x:fW,y:0},{x:fW,y:fH},{x:0,y:fH}];
        const H=computeHomography(srcPoints,dst); if (!H) return null;
        const Hi=invertHomography(H); if (!Hi) return null;
        const tmp=document.createElement('canvas'); tmp.width=fW; tmp.height=fH; const tctx=tmp.getContext('2d');
        const img=tctx.createImageData(fW,fH);
        for (let y=0;y<fH;y++) for (let x=0;x<fW;x++) {
            const p=applyHomography(Hi,x,y); const sx=Math.round(p.x), sy=Math.round(p.y);
            if (sx>=0&&sx<canvas.width&&sy>=0&&sy<canvas.height) {
                const si=(sy*canvas.width+sx)*4, di=(y*fW+x)*4;
                img.data[di]=imageData.data[si]; img.data[di+1]=imageData.data[si+1]; img.data[di+2]=imageData.data[si+2]; img.data[di+3]=255;
            }
        }
        tctx.putImageData(img,0,0);
        return bwMode ? toGray(tmp) : enhanceContrast(tmp);
    }

    function toGray(cvs) {
        const ctx=cvs.getContext('2d'), data=ctx.getImageData(0,0,cvs.width,cvs.height).data;
        for (let i=0;i<data.length;i+=4) {
            const gray=data[i]*0.299+data[i+1]*0.587+data[i+2]*0.114;
            data[i]=data[i+1]=data[i+2]=gray;
        }
        ctx.putImageData(new ImageData(data,cvs.width,cvs.height),0,0);
        return cvs;
    }

    function enhanceContrast(cvs) {
        const ctx=cvs.getContext('2d'), data=ctx.getImageData(0,0,cvs.width,cvs.height).data;
        let min=255,max=0;
        for (let i=0;i<data.length;i+=4) {
            if (data[i]===0&&data[i+1]===0&&data[i+2]===0) continue;
            const gray=data[i]*0.299+data[i+1]*0.587+data[i+2]*0.114;
            if (gray<min) min=gray; if (gray>max) max=gray;
        }
        if (max<=min) return cvs;
        const range=max-min;
        for (let i=0;i<data.length;i+=4) {
            if (data[i]===0&&data[i+1]===0&&data[i+2]===0) continue;
            const gray=data[i]*0.299+data[i+1]*0.587+data[i+2]*0.114;
            const factor=(gray-min)/range;
            const newGray=factor*255;
            const ratio=gray>1?newGray/gray:1;
            data[i]=Math.min(255,data[i]*ratio); data[i+1]=Math.min(255,data[i+1]*ratio); data[i+2]=Math.min(255,data[i+2]*ratio);
        }
        ctx.putImageData(new ImageData(data,cvs.width,cvs.height),0,0);
        return cvs;
    }

    function computeHomography(src,dst){const A=[],b=[];for(let i=0;i<4;i++){A.push([src[i].x,src[i].y,1,0,0,0,-dst[i].x*src[i].x,-dst[i].x*src[i].y]);b.push(dst[i].x);A.push([0,0,0,src[i].x,src[i].y,1,-dst[i].y*src[i].x,-dst[i].y*src[i].y]);b.push(dst[i].y);}const n=8,aug=A.map((r,i)=>[...r,b[i]]);for(let c=0;c<n;c++){let mr=c;for(let r=c+1;r<n;r++)if(Math.abs(aug[r][c])>Math.abs(aug[mr][c]))mr=r;[aug[c],aug[mr]]=[aug[mr],aug[c]];if(Math.abs(aug[c][c])<1e-12)return null;for(let j=c;j<=n;j++)aug[c][j]/=aug[c][c];for(let r=0;r<n;r++){if(r===c)continue;const f=aug[r][c];for(let j=c;j<=n;j++)aug[r][j]-=f*aug[c][j];}}const h=aug.map(r=>r[8]);return[h[0],h[1],h[2],h[3],h[4],h[5],h[6],h[7],1];}
    function invertHomography(H){const[a,b,c,d,e,f,g,h,i]=H,det=a*(e*i-f*h)-b*(d*i-f*g)+c*(d*h-e*g);if(Math.abs(det)<1e-12)return null;const id=1/det;return[(e*i-f*h)*id,(c*h-b*i)*id,(b*f-c*e)*id,(f*g-d*i)*id,(a*i-c*g)*id,(c*d-a*f)*id,(d*h-e*g)*id,(b*g-a*h)*id,(a*e-b*d)*id];}
    function applyHomography(H,x,y){const d=H[6]*x+H[7]*y+H[8];return{x:(H[0]*x+H[1]*y+H[2])/d,y:(H[3]*x+H[4]*y+H[5])/d};}

    function updatePageCounter(){pageCounter.textContent=`Страниц: ${savedPages.length}`;}
    function removeLastPage(){if(!savedPages.length)return;savedPages.pop();updatePageCounter();if(!savedPages.length){resultsDiv.classList.remove('visible');resetToNewFrame();}else{statusDiv.textContent='🗑 Удалено.';actionArea.innerHTML=`<button class="btn secondary" onclick="resetToNewFrame()">📸 Снять</button><button class="btn danger" onclick="removeLastPage()">🗑</button><button class="btn" onclick="printAllPages()">🖨 PDF (${savedPages.length})</button>`;}}
    function resetToNewFrame(){
        canvas.removeEventListener('touchstart',onFramingTouchStart);canvas.removeEventListener('touchmove',onFramingTouchMove);
        canvas.removeEventListener('touchend',onFramingTouchEnd);canvas.removeEventListener('dblclick',onDoubleTap);
        frozenImageData=null;corners=null;draggingCorner=-1;lensActive=false;lensMode='full';resultsDiv.classList.remove('visible');
        if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
        currentStep='ready';statusDiv.textContent='Наведите камеру.';statusDiv.className='status-bar ready';
        updateLiveButtons(); startLiveView();
    }
    function printAllPages(){
        if(!savedPages.length){statusDiv.textContent='Нет страниц.';return;}
        const w=window.open('','_blank','width=800,height=600');
        w.document.write(`<html><head><title>FreePDFShoot</title><style>body{margin:0;font-family:sans-serif}img{width:100%;max-height:100vh;object-fit:contain;page-break-after:always;display:block}img:last-child{page-break-after:auto}@media print{img{max-height:none;height:auto}}</style></head><body>${savedPages.map(b=>`<img src="${URL.createObjectURL(b)}">`).join('')}</body></html>`);
        w.document.close();setTimeout(()=>w.print(),500);
    }
    window.addEventListener('beforeunload',()=>{if(stream)stream.getTracks().forEach(t=>t.stop());savedPages.forEach(b=>URL.revokeObjectURL(b));});
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Глаз прораба</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        .viewfinder { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1; }
        .viewfinder video, .viewfinder canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .viewfinder canvas { z-index: 2; }
        .ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; }
        .ui-overlay > * { pointer-events: auto; }
        .header { position: absolute; top: 12px; left: 0; right: 0; text-align: center; z-index: 11; }
        .header h1 { font-size: 1.2rem; font-weight: 600; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.7); margin: 0; }
        .header .sub { font-size: 0.7rem; color: rgba(255,255,255,0.7); text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
        .lux-indicator { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); color: #ffd966; font-size: 0.7rem; padding: 5px 12px; border-radius: 20px; z-index: 12; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.15); }
        .step-indicator { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 13; }
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: 0.3s; }
        .step-dot.active { background: #2a6df4; box-shadow: 0 0 8px #2a6df4; }
        .step-dot.done { background: #4caf50; }
        .status-bar { text-align: center; padding: 0 20px 8px; font-size: 0.85rem; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); min-height: 24px; transition: color 0.3s; }
        .status-bar.ready { color: #4caf50; font-weight: 500; }
        .status-bar.error { color: #ff6b6b; font-weight: 500; }
        .action-area { padding: 0 16px 20px; display: flex; gap: 8px; }
        .btn { display: block; flex: 1; padding: 14px; font-size: 1rem; font-weight: 600; border: none; border-radius: 14px; cursor: pointer; background: #2a6df4; color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.3); transition: 0.2s; text-align: center; }
        .btn:active { opacity: 0.85; }
        .btn:disabled { background: rgba(58,58,58,0.8); color: #999; cursor: not-allowed; }
        .btn.secondary { background: rgba(51,51,51,0.85); color: #ccc; flex: 0.5; }
        .results { padding: 12px 16px; display: none; background: rgba(20,20,20,0.9); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.1); border-radius: 16px 16px 0 0; margin: 0 8px; }
        .results.visible { display: block; }
        .results .row { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 6px 0; color: #ccc; }
        .results .row span:last-child { font-weight: 600; color: #fff; font-size: 1rem; }
        .results .tip { margin-top: 8px; font-size: 0.85rem; color: #ddd; background: rgba(255,255,255,0.06); padding: 10px; border-radius: 8px; line-height: 1.4; }
        .marker-hint { position: absolute; color: #fff; font-size: 0.7rem; background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 10px; pointer-events: none; }
    </style>
</head>
<body>

<div class="viewfinder" id="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<div class="ui-overlay">
    <div class="header">
        <h1>Глаз прораба</h1>
        <div class="sub">Гомография • Измерение под любым углом</div>
    </div>
    <div class="step-indicator" id="stepDots">
        <div class="step-dot active" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
        <div class="step-dot" id="dot3"></div>
    </div>
    <div class="lux-indicator" id="luxDisplay">-- lx</div>
    <div class="status-bar" id="status">Нажмите «Включить камеру»</div>
    <div class="action-area" id="actionArea">
        <button class="btn" id="actionBtn" onclick="handleAction()">Включить камеру</button>
    </div>
    <div class="results" id="results">
        <div class="row"><span>Ширина:</span><span id="resWidth">—</span></div>
        <div class="row"><span>Высота:</span><span id="resHeight">—</span></div>
        <div class="row"><span>Площадь:</span><span id="resArea">—</span></div>
        <div class="row"><span>Освещённость:</span><span id="resLux">—</span></div>
        <div class="row"><span>Ближайший RAL:</span><span id="resRAL">—</span></div>
        <div class="tip" id="resTip"></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('status');
    const actionArea = document.getElementById('actionArea');
    const resultsDiv = document.getElementById('results');
    const luxDisplay = document.getElementById('luxDisplay');
    const dot1 = document.getElementById('dot1');
    const dot2 = document.getElementById('dot2');
    const dot3 = document.getElementById('dot3');

    let stream, currentStep = 'idle', currentLux = null, ambientSensor = null;
    const COIN_DIAMETER_MM = 25;
    
    // Стоп-кадр
    let frozenImageData = null;
    
    // Рамка монеты (круг)
    let coinFrame = null;
    let draggingCoin = false, coinDragStart = {}, coinFrameStart = {};
    let coinDiameterPx = null;
    
    // Рамка объекта (4 угла)
    let corners = null; // [{x, y}, {x, y}, {x, y}, {x, y}] — TL, TR, BR, BL
    let draggingCorner = -1;
    let cornerDragStart = {};
    const HANDLE_SIZE = 40;
    
    // Подэтапы на стоп-кадре: 'coin' | 'corners' | 'done'
    let framingSubStep = 'coin';

    function handleAction() {
        switch (currentStep) {
            case 'idle': startCamera(); break;
            case 'ready': freezeFrame(); break;
            case 'framing':
                if (framingSubStep === 'coin') confirmCoin();
                else if (framingSubStep === 'corners') finishMeasurement();
                break;
            case 'done': resetAll(); break;
        }
    }

    async function startCamera() {
        statusDiv.textContent = 'Запрашиваю камеру...';
        const configs = [
            { video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } },
            { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } },
            { video: { facingMode: 'environment' } },
            { video: true }
        ];
        for (let c of configs) {
            try {
                stream = await navigator.mediaDevices.getUserMedia(c);
                video.srcObject = stream;
                await video.play();
                canvas.width = video.videoWidth || canvas.clientWidth;
                canvas.height = video.videoHeight || canvas.clientHeight;
                
                statusDiv.textContent = 'Приложите монету к объекту и нажмите «Снять».';
                statusDiv.className = 'status-bar ready';
                actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять кадр</button>`;
                currentStep = 'ready';
                dot1.className = 'step-dot'; dot2.className = 'step-dot'; dot3.className = 'step-dot';
                startAmbientSensor();
                return;
            } catch (err) { if (err.name === 'NotAllowedError') break; }
        }
        statusDiv.textContent = 'Ошибка доступа к камере.';
        statusDiv.className = 'status-bar error';
        actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">Попробовать снова</button>`;
    }

    function startAmbientSensor() {
        if ('AmbientLightSensor' in window) {
            try {
                ambientSensor = new AmbientLightSensor();
                ambientSensor.onreading = () => { currentLux = Math.round(ambientSensor.illuminance); luxDisplay.textContent = currentLux + ' lx'; };
                ambientSensor.onerror = () => { luxDisplay.textContent = '-- lx'; };
                ambientSensor.start();
            } catch (e) { luxDisplay.textContent = '-- lx'; }
        } else { luxDisplay.textContent = '-- lx'; }
    }

    // ── СТОП-КАДР ──
    function freezeFrame() {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        frozenImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        // Круг монеты по центру
        const coinR = canvas.width * 0.06;
        coinFrame = { cx: canvas.width / 2, cy: canvas.height / 2, r: coinR };
        coinDiameterPx = null;
        
        // 4 угла объекта по краям
        const marginX = canvas.width * 0.2;
    const marginY = canvas.height * 0.2;
    corners = [
        { x: marginX, y: marginY },
        { x: canvas.width - marginX, y: marginY },
        { x: canvas.width - marginX, y: canvas.height - marginY },
        { x: marginX, y: canvas.height - marginY }
    ];
        
        currentStep = 'framing';
        framingSubStep = 'coin';
        updateUIForSubStep();
        
        canvas.addEventListener('touchstart', onTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onTouchMove, { passive: false });
        canvas.addEventListener('touchend', onTouchEnd);
        drawFrozenScene();
    }

    function updateUIForSubStep() {
        dot1.className = 'step-dot' + (framingSubStep === 'coin' ? ' active' : (coinDiameterPx ? ' done' : ''));
        dot2.className = 'step-dot' + (framingSubStep === 'corners' ? ' active' : '');
        dot3.className = 'step-dot';
        
        if (framingSubStep === 'coin') {
            statusDiv.textContent = '🔴 Обведите монету (тяните за красный маркер).';
            statusDiv.className = 'status-bar';
            actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">✓ Монета готова</button>`;
        } else if (framingSubStep === 'corners') {
            statusDiv.textContent = '🔵 Расставьте 4 маркера по углам объекта.';
            statusDiv.className = 'status-bar ready';
            actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">✓ Измерить</button>`;
        }
    }

    function confirmCoin() {
        if (!coinFrame || coinFrame.r < 5) return;
        coinDiameterPx = coinFrame.r * 2;
        framingSubStep = 'corners';
        updateUIForSubStep();
        drawFrozenScene();
    }

    // ── ГОМОГРАФИЯ ──
    function computeHomography(srcPoints, dstPoints) {
        // srcPoints и dstPoints — массивы из 4 точек {x, y}
        // Решает систему Ah = b для матрицы гомографии 3x3
        const A = [];
        const b = [];
        
        for (let i = 0; i < 4; i++) {
            const sx = srcPoints[i].x, sy = srcPoints[i].y;
            const dx = dstPoints[i].x, dy = dstPoints[i].y;
            
            A.push([sx, sy, 1, 0, 0, 0, -dx * sx, -dx * sy]);
            b.push(dx);
            A.push([0, 0, 0, sx, sy, 1, -dy * sx, -dy * sy]);
            b.push(dy);
        }
        
        // Решаем систему A * h = b методом Гаусса
        const n = 8;
        const aug = A.map((row, i) => [...row, b[i]]);
        
        for (let col = 0; col < n; col++) {
            let maxRow = col;
            for (let row = col + 1; row < n; row++) {
                if (Math.abs(aug[row][col]) > Math.abs(aug[maxRow][col])) maxRow = row;
            }
            [aug[col], aug[maxRow]] = [aug[maxRow], aug[col]];
            
            const pivot = aug[col][col];
            if (Math.abs(pivot) < 1e-12) return null;
            
            for (let j = col; j <= n; j++) aug[col][j] /= pivot;
            
            for (let row = 0; row < n; row++) {
                if (row === col) continue;
                const factor = aug[row][col];
                for (let j = col; j <= n; j++) aug[row][j] -= factor * aug[col][j];
            }
        }
        
        const h = aug.map(row => row[8]);
        return [
            h[0], h[1], h[2],
            h[3], h[4], h[5],
            h[6], h[7], 1
        ];
    }

    function applyHomography(H, x, y) {
        const denom = H[6] * x + H[7] * y + 1;
        return {
            x: (H[0] * x + H[1] * y + H[2]) / denom,
            y: (H[3] * x + H[4] * y + H[5]) / denom
        };
    }

    function measureRectified(corners, coinDiameterPx, frozenImageData) {
        // corners: TL, TR, BR, BL
        // Определяем размеры выпрямленного прямоугольника
        const TL = corners[0], TR = corners[1], BR = corners[2], BL = corners[3];
        
        const topLen = Math.hypot(TR.x - TL.x, TR.y - TL.y);
        const bottomLen = Math.hypot(BR.x - BL.x, BR.y - BL.y);
        const leftLen = Math.hypot(BL.x - TL.x, BL.y - TL.y);
        const rightLen = Math.hypot(BR.x - TR.x, BR.y - TR.y);
        
        const rectW = Math.round((topLen + bottomLen) / 2);
        const rectH = Math.round((leftLen + rightLen) / 2);
        
        // Целевые точки выпрямленного прямоугольника
        const dstPoints = [
            { x: 0, y: 0 },
            { x: rectW, y: 0 },
            { x: rectW, y: rectH },
            { x: 0, y: rectH }
        ];
        
        const H = computeHomography(corners, dstPoints);
        if (!H) return null;
        
        // Выпрямляем монету
        const coinCenter = applyHomography(H, coinFrame.cx, coinFrame.cy);
        const coinEdge = applyHomography(H, coinFrame.cx + coinFrame.r, coinFrame.cy);
        const coinDiameterRectified = Math.hypot(coinEdge.x - coinCenter.x, coinEdge.y - coinCenter.y) * 2;
        
        const scale = coinDiameterRectified / COIN_DIAMETER_MM; // px/mm в выпрямленном пространстве
        const realWidthMM = rectW / scale;
        const realHeightMM = rectH / scale;
        
        return {
            widthMM: realWidthMM,
            heightMM: realHeightMM,
            widthPx: rectW,
            heightPx: rectH,
            coinDiameterPx: coinDiameterRectified
        };
    }

    // ── ОТРИСОВКА ──
    function drawFrozenScene() {
        if (!frozenImageData) return;
        ctx.putImageData(frozenImageData, 0, 0);
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (framingSubStep === 'coin' && coinFrame) {
            // Затемнение вне круга
            ctx.save();
            ctx.beginPath();
            ctx.rect(0, 0, canvas.width, canvas.height);
            ctx.arc(coinFrame.cx, coinFrame.cy, coinFrame.r, 0, Math.PI * 2, true);
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fill();
            ctx.restore();
            
            // Круг
            ctx.beginPath();
            ctx.arc(coinFrame.cx, coinFrame.cy, coinFrame.r, 0, Math.PI * 2);
            ctx.strokeStyle = '#ff4444';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            // Маркер
            const mx = coinFrame.cx + coinFrame.r;
            const my = coinFrame.cy;
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(mx, my, 14, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px system-ui';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 6;
            ctx.fillText('Монета 5₽', coinFrame.cx, coinFrame.cy - coinFrame.r - 14);
            ctx.fillText('↔ Тяните', mx + 30, my + 5);
            ctx.shadowBlur = 0;
        }
        
        if (framingSubStep === 'corners' && corners) {
            const [TL, TR, BR, BL] = corners;
            
            // Затемнение вне четырёхугольника
            ctx.save();
            ctx.beginPath();
            ctx.rect(0, 0, canvas.width, canvas.height);
            ctx.moveTo(TL.x, TL.y);
            ctx.lineTo(TR.x, TR.y);
            ctx.lineTo(BR.x, BR.y);
            ctx.lineTo(BL.x, BL.y);
            ctx.closePath();
            ctx.fillStyle = 'rgba(0,0,0,0.45)';
            ctx.fill('evenodd');
            ctx.restore();
            
            // Линии четырёхугольника
            ctx.strokeStyle = '#2a6df4';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(TL.x, TL.y);
            ctx.lineTo(TR.x, TR.y);
            ctx.lineTo(BR.x, BR.y);
            ctx.lineTo(BL.x, BL.y);
            ctx.closePath();
            ctx.stroke();
            
            // Маркеры углов
            corners.forEach((c, i) => {
                ctx.fillStyle = '#2a6df4';
                ctx.beginPath();
                ctx.arc(c.x, c.y, HANDLE_SIZE / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText(i + 1, c.x, c.y + 4);
            });
            
            // Если монета тоже откалибрована — показываем предварительный расчёт
            if (coinDiameterPx && coinDiameterPx > 0) {
                const result = measureRectified(corners, coinDiameterPx, frozenImageData);
                if (result) {
                    const wCm = (result.widthMM / 10).toFixed(1);
                    const hCm = (result.heightMM / 10).toFixed(1);
                    const areaM2 = ((result.widthMM / 1000) * (result.heightMM / 1000)).toFixed(3);
                    
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 22px system-ui';
                    ctx.textAlign = 'center';
                    ctx.shadowColor = 'rgba(0,0,0,0.9)';
                    ctx.shadowBlur = 10;
                    
                    const cx = (TL.x + TR.x + BR.x + BL.x) / 4;
                    const cy = (TL.y + TR.y + BR.y + BL.y) / 4;
                    ctx.fillText(`${wCm} × ${hCm} см`, cx, cy - 6);
                    ctx.fillText(`${areaM2} м²`, cx, cy + 22);
                    ctx.shadowBlur = 0;
                }
            }
        }
    }

    // ── TOUCH ──
    function onTouchStart(e) {
        if (currentStep !== 'framing') return;
        e.preventDefault(); e.stopPropagation();
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const sx = (touch.clientX - rect.left) * (canvas.width / rect.width);
        const sy = (touch.clientY - rect.top) * (canvas.height / rect.height);
        
        // Режим монеты
        if (framingSubStep === 'coin' && coinFrame) {
            const distToMarker = Math.hypot(sx - (coinFrame.cx + coinFrame.r), sy - coinFrame.cy);
            if (distToMarker < 35) {
                draggingCoin = true;
                coinDragStart = { x: sx, y: sy, mode: 'resize' };
                coinFrameStart = { ...coinFrame };
                return;
            }
            const distToCenter = Math.hypot(sx - coinFrame.cx, sy - coinFrame.cy);
            if (distToCenter < coinFrame.r + 25) {
                draggingCoin = true;
                coinDragStart = { x: sx, y: sy, mode: 'move' };
                coinFrameStart = { ...coinFrame };
                return;
            }
        }
        
        // Режим углов — УВЕЛИЧЕННАЯ ЗОНА ЗАХВАТА
        if (framingSubStep === 'corners' && corners) {
            const GRAB_RADIUS = 50; // было HANDLE_SIZE (40), стало больше
            for (let i = 0; i < corners.length; i++) {
                if (Math.hypot(sx - corners[i].x, sy - corners[i].y) < GRAB_RADIUS) {
                    draggingCorner = i;
                    cornerDragStart = { x: sx, y: sy };
                    return;
                }
            }
        }
    }

    function onTouchMove(e) {
        if (!draggingCoin && draggingCorner < 0) return;
        e.preventDefault(); e.stopPropagation();
        
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const cx = (touch.clientX - rect.left) * (canvas.width / rect.width);
        const cy = (touch.clientY - rect.top) * (canvas.height / rect.height);
        
        if (draggingCoin && coinFrame) {
            if (coinDragStart.mode === 'move') {
                const dx = cx - coinDragStart.x;
                const dy = cy - coinDragStart.y;
                coinFrame.cx = Math.max(coinFrame.r, Math.min(canvas.width - coinFrame.r, coinFrameStart.cx + dx));
                coinFrame.cy = Math.max(coinFrame.r, Math.min(canvas.height - coinFrame.r, coinFrameStart.cy + dy));
            } else {
                const dx = cx - coinDragStart.x;
                coinFrame.r = Math.max(5, Math.min(canvas.width * 0.2, coinFrameStart.r + dx));
            }
            coinDiameterPx = coinFrame.r * 2;
            drawFrozenScene();
            return;
        }
        
        if (draggingCorner >= 0 && corners) {
            corners[draggingCorner].x = Math.max(0, Math.min(canvas.width, cx));
            corners[draggingCorner].y = Math.max(0, Math.min(canvas.height, cy));
            drawFrozenScene();
        }
    }

    function onTouchEnd(e) {
        draggingCoin = false;
        coinDragStart.mode = null;
        draggingCorner = -1;
    }

    // ── ФИНАЛ ──
    function finishMeasurement() {
        if (!coinDiameterPx || coinDiameterPx <= 0) return;
        
        canvas.removeEventListener('touchstart', onTouchStart);
        canvas.removeEventListener('touchmove', onTouchMove);
        canvas.removeEventListener('touchend', onTouchEnd);
        
        const result = measureRectified(corners, coinDiameterPx, frozenImageData);
        if (!result) {
            statusDiv.textContent = 'Ошибка вычисления. Попробуйте другой ракурс.';
            statusDiv.className = 'status-bar error';
            return;
        }
        
        const widthM = result.widthMM / 1000;
        const heightM = result.heightMM / 1000;
        const area = widthM * heightM;
        
        document.getElementById('resWidth').textContent = widthM.toFixed(2) + ' м (' + (result.widthMM / 10).toFixed(1) + ' см)';
        document.getElementById('resHeight').textContent = heightM.toFixed(2) + ' м (' + (result.heightMM / 10).toFixed(1) + ' см)';
        document.getElementById('resArea').textContent = area.toFixed(3) + ' м²';
        document.getElementById('resLux').textContent = currentLux ? currentLux + ' люкс' : 'нет данных';
        document.getElementById('resRAL').textContent = 'RAL 9010 (похож)';
        document.getElementById('resTip').textContent = area > 5 ? '👍 Большая область.' : '⚠️ Компактная область.';
        
        resultsDiv.classList.add('visible');
        currentStep = 'done';
        dot1.className = 'step-dot done'; dot2.className = 'step-dot done'; dot3.className = 'step-dot done';
        statusDiv.textContent = '✅ Измерение выполнено!';
        statusDiv.className = 'status-bar';
        actionArea.innerHTML = `<button class="btn secondary" id="actionBtn" onclick="handleAction()">Новое измерение</button>`;
        drawFrozenScene();
    }

    function resetAll() {
        canvas.removeEventListener('touchstart', onTouchStart);
        canvas.removeEventListener('touchmove', onTouchMove);
        canvas.removeEventListener('touchend', onTouchEnd);
        frozenImageData = null;
        coinFrame = null;
        coinDiameterPx = null;
        corners = null;
        draggingCoin = false;
        draggingCorner = -1;
        resultsDiv.classList.remove('visible');
        currentStep = 'ready';
        framingSubStep = 'coin';
        dot1.className = 'step-dot'; dot2.className = 'step-dot'; dot3.className = 'step-dot';
        statusDiv.textContent = 'Приложите монету к объекту и нажмите «Снять».';
        statusDiv.className = 'status-bar ready';
        actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять кадр</button>`;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (video.paused) video.play();
    }

    window.addEventListener('beforeunload', () => {
        if (stream) stream.getTracks().forEach(t => t.stop());
        if (ambientSensor) ambientSensor.stop();
    });
    document.addEventListener('dblclick', () => {
        if (document.fullscreenElement) document.exitFullscreen();
        else document.body.requestFullscreen().catch(() => {});
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Глаз прораба</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        .viewfinder { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1; }
        .viewfinder video, .viewfinder canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .viewfinder canvas { z-index: 2; }
        .ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; }
        .ui-overlay > * { pointer-events: auto; }
        .header { position: absolute; top: 12px; left: 0; right: 0; text-align: center; z-index: 11; }
        .header h1 { font-size: 1.2rem; font-weight: 600; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.7); margin: 0; }
        .header .sub { font-size: 0.7rem; color: rgba(255,255,255,0.7); text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
        .lux-indicator { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); color: #ffd966; font-size: 0.7rem; padding: 5px 12px; border-radius: 20px; z-index: 12; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.15); }
        .step-indicator { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 13; }
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: 0.3s; }
        .step-dot.active { background: #2a6df4; box-shadow: 0 0 8px #2a6df4; }
        .step-dot.done { background: #4caf50; }
        .status-bar { text-align: center; padding: 0 20px 8px; font-size: 0.85rem; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); min-height: 24px; transition: color 0.3s; }
        .status-bar.ready { color: #4caf50; font-weight: 500; }
        .status-bar.error { color: #ff6b6b; font-weight: 500; }
        .action-area { padding: 0 16px 20px; display: flex; gap: 8px; }
        .btn { display: block; flex: 1; padding: 14px; font-size: 1rem; font-weight: 600; border: none; border-radius: 14px; cursor: pointer; background: #2a6df4; color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.3); transition: 0.2s; text-align: center; }
        .btn:active { opacity: 0.85; }
        .btn:disabled { background: rgba(58,58,58,0.8); color: #999; cursor: not-allowed; }
        .btn.secondary { background: rgba(51,51,51,0.85); color: #ccc; flex: 0.5; }
        .results { padding: 12px 16px; display: none; background: rgba(20,20,20,0.9); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.1); border-radius: 16px 16px 0 0; margin: 0 8px; }
        .results.visible { display: block; }
        .results .row { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 6px 0; color: #ccc; }
        .results .row span:last-child { font-weight: 600; color: #fff; font-size: 1rem; }
        .results .tip { margin-top: 8px; font-size: 0.85rem; color: #ddd; background: rgba(255,255,255,0.06); padding: 10px; border-radius: 8px; line-height: 1.4; }
        .hint-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 0.8rem; text-align: center; text-shadow: 0 1px 4px rgba(0,0,0,0.8); z-index: 14; pointer-events: none; }
    </style>
</head>
<body>

<div class="viewfinder" id="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<div class="ui-overlay">
    <div class="header">
        <h1>Глаз прораба</h1>
        <div class="sub">Триангуляция по монете • Живая калибровка</div>
    </div>
    <div class="step-indicator" id="stepDots">
        <div class="step-dot active" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
        <div class="step-dot" id="dot3"></div>
    </div>
    <div class="lux-indicator" id="luxDisplay">-- lx</div>
    <div class="status-bar" id="status">Нажмите «Включить камеру»</div>
    <div class="action-area" id="actionArea">
        <button class="btn" id="actionBtn" onclick="handleAction()">Включить камеру</button>
    </div>
    <div class="results" id="results">
        <div class="row"><span>Ширина объекта:</span><span id="resWidth">—</span></div>
        <div class="row"><span>Высота объекта:</span><span id="resHeight">—</span></div>
        <div class="row"><span>Площадь:</span><span id="resArea">—</span></div>
        <div class="row"><span>Освещённость:</span><span id="resLux">—</span></div>
        <div class="row"><span>Ближайший RAL:</span><span id="resRAL">—</span></div>
        <div class="tip" id="resTip"></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('status');
    const actionArea = document.getElementById('actionArea');
    const resultsDiv = document.getElementById('results');
    const luxDisplay = document.getElementById('luxDisplay');
    const dot1 = document.getElementById('dot1');
    const dot2 = document.getElementById('dot2');
    const dot3 = document.getElementById('dot3');

    let stream, currentStep = 'idle', currentLux = null, ambientSensor = null;
    let F_px = null;           // фокусное расстояние камеры в пикселях
    const COIN_DIAMETER_MM = 25;
    const D1_MM = 100;         // расстояние до монеты на шаге 1 (10 см)
    const D2_MM = 200;         // расстояние до монеты на шаге 2 (20 см)
    
    // Живая калибровка
    let liveStep = null;       // 'step1' или 'step2'
    let liveFrameId = null;
    let captureCount = 0;
    const CAPTURE_THRESHOLD = 15;
    let P1 = null, P2 = null;
    
    // Стоп-кадр и измерение
    let frozenImageData = null;
    let frame = null, dragging = null, dragStart = {}, frameStart = {};
    const HANDLE_SIZE = 44;

    function handleAction() {
        switch (currentStep) {
            case 'idle': startCamera(); break;
            case 'ready': startLiveCalibration(); break;
            case 'step1_done': startLiveStep2(); break;
            case 'step2_done': freezeFrame(); break;
            case 'measuring': finishMeasurement(); break;
            case 'done': resetAll(); break;
        }
    }

    async function startCamera() {
        statusDiv.textContent = 'Запрашиваю камеру...';
        const configs = [
            { video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } },
            { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } },
            { video: { facingMode: 'environment' } },
            { video: true }
        ];
        for (let c of configs) {
            try {
                stream = await navigator.mediaDevices.getUserMedia(c);
                video.srcObject = stream;
                await video.play();
                canvas.width = video.videoWidth || canvas.clientWidth;
                canvas.height = video.videoHeight || canvas.clientHeight;
                
                // Проверяем localStorage
                const savedFpx = localStorage.getItem('camera_F_px');
                if (savedFpx) {
                    F_px = parseFloat(savedFpx);
                    statusDiv.textContent = 'Камера откалибрована. Наведите на объект.';
                    statusDiv.className = 'status-bar ready';
                    actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять объект</button>`;
                    currentStep = 'step2_done';
                    dot1.className = 'step-dot done';
                    dot2.className = 'step-dot done';
                    dot3.className = 'step-dot active';
                } else {
                    statusDiv.textContent = 'Нажмите «Калибровать» для начала.';
                    statusDiv.className = 'status-bar ready';
                    actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">🎯 Калибровать</button>`;
                    currentStep = 'ready';
                    dot1.className = 'step-dot active'; dot2.className = 'step-dot'; dot3.className = 'step-dot';
                }
                startAmbientSensor();
                return;
            } catch (err) { if (err.name === 'NotAllowedError') break; }
        }
        statusDiv.textContent = 'Ошибка доступа к камере.';
        statusDiv.className = 'status-bar error';
        actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">Попробовать снова</button>`;
    }

    function startAmbientSensor() {
        if ('AmbientLightSensor' in window) {
            try {
                ambientSensor = new AmbientLightSensor();
                ambientSensor.onreading = () => { currentLux = Math.round(ambientSensor.illuminance); luxDisplay.textContent = currentLux + ' lx'; };
                ambientSensor.onerror = () => { luxDisplay.textContent = '-- lx'; };
                ambientSensor.start();
            } catch (e) { luxDisplay.textContent = '-- lx'; }
        } else { luxDisplay.textContent = '-- lx'; }
    }

    // ── ЖИВАЯ КАЛИБРОВКА: ШАГ 1 (10 см) ──
    function startLiveCalibration() {
        currentStep = 'calibrating';
        liveStep = 'step1';
        captureCount = 0;
        P1 = null;
        P2 = null;
        
        statusDiv.textContent = '🔴 Шаг 1/3: Поднесите монету близко к камере (~10 см).';
        statusDiv.className = 'status-bar';
        actionArea.innerHTML = ``;
        dot1.className = 'step-dot active'; dot2.className = 'step-dot'; dot3.className = 'step-dot';
        
        liveLoop();
    }

    function startLiveStep2() {
        liveStep = 'step2';
        captureCount = 0;
        
        statusDiv.textContent = '🟠 Шаг 2/3: Отведите монету дальше (~20 см).';
        dot1.className = 'step-dot done'; dot2.className = 'step-dot active'; dot3.className = 'step-dot';
        
        liveLoop();
    }

    function liveLoop() {
        if (currentStep !== 'calibrating') return;
        
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Размер круга зависит от шага
        // Для шага 1 (10 см): монета близко → большой круг
        // Для шага 2 (20 см): монета дальше → круг в 2 раза меньше
        const baseRadius = canvas.width * 0.22;
        const radius = liveStep === 'step1' ? baseRadius : baseRadius / 2;
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const color = liveStep === 'step1' ? '#ff4444' : '#ff8800';
        
        // Анализ яркости внутри круга
        let innerSum = 0, innerCount = 0;
        let outerSum = 0, outerCount = 0;
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        for (let y = 0; y < canvas.height; y += 3) {
            for (let x = 0; x < canvas.width; x += 3) {
                const dist = Math.hypot(x - cx, y - cy);
                const idx = (y * canvas.width + x) * 4;
                const bright = (imageData.data[idx] + imageData.data[idx+1] + imageData.data[idx+2]) / 3;
                
                if (dist < radius * 0.8) {
                    innerSum += bright;
                    innerCount++;
                } else if (dist > radius * 1.15 && dist < radius * 1.5) {
                    outerSum += bright;
                    outerCount++;
                }
            }
        }
        
        const innerBright = innerSum / Math.max(innerCount, 1);
        const outerBright = outerSum / Math.max(outerCount, 1);
        const coinFills = innerBright > 130 && (innerBright - outerBright) > 30;
        
        // Затемнение вне круга
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, canvas.width, canvas.height);
        ctx.arc(cx, cy, radius, 0, Math.PI * 2, true);
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fill();

    // ── ЖИВАЯ КАЛИБРОВКА: ШАГ 1 (10 см) ──
    function startLiveCalibration() {
        currentStep = 'calibrating';
        liveStep = 'step1';
        captureCount = 0;
        P1 = null;
        P2 = null;
        
        statusDiv.textContent = '🔴 Шаг 1/3: Поднесите монету близко к камере (~10 см).';
        statusDiv.className = 'status-bar';
        actionArea.innerHTML = ``;
        dot1.className = 'step-dot active'; dot2.className = 'step-dot'; dot3.className = 'step-dot';
        
        liveLoop();
    }

    function startLiveStep2() {
        liveStep = 'step2';
        captureCount = 0;
        
        statusDiv.textContent = '🟠 Шаг 2/3: Отведите монету дальше (~20 см).';
        dot1.className = 'step-dot done'; dot2.className = 'step-dot active'; dot3.className = 'step-dot';
        
        liveLoop();
    }

    function liveLoop() {
        if (currentStep !== 'calibrating') return;
        
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Размер круга: шаг 1 = большой (10 см), шаг 2 = в 2 раза меньше (20 см)
        const baseRadius = canvas.width * 0.22;
        const radius = liveStep === 'step1' ? baseRadius : baseRadius / 2;
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const color = liveStep === 'step1' ? '#ff4444' : '#ff8800';
        
        // УЛУЧШЕННЫЙ ДЕТЕКТ: проверяем однородность внутри круга
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let innerSum = 0, innerCount = 0;
        let innerValues = [];
        
        for (let y = 0; y < canvas.height; y += 3) {
            for (let x = 0; x < canvas.width; x += 3) {
                const dist = Math.hypot(x - cx, y - cy);
                if (dist < radius * 0.75) {
                    const idx = (y * canvas.width + x) * 4;
                    const bright = (imageData.data[idx] + imageData.data[idx+1] + imageData.data[idx+2]) / 3;
                    innerSum += bright;
                    innerValues.push(bright);
                    innerCount++;
                }
            }
        }
        
        const innerBright = innerSum / Math.max(innerCount, 1);
        
        // Вычисляем дисперсию (однородность)
        let variance = 0;
        for (let v of innerValues) {
            variance += (v - innerBright) ** 2;
        }
        variance /= Math.max(innerValues.length, 1);
        const stdDev = Math.sqrt(variance);
        
        // Монета: яркая И однородная (низкая дисперсия)
        const coinFills = innerBright > 100 && stdDev < 40;
        
        // Затемнение вне круга
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, canvas.width, canvas.height);
        ctx.arc(cx, cy, radius, 0, Math.PI * 2, true);
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fill();
        ctx.restore();
        
        // Круг
        if (coinFills) {
            captureCount++;
            const progress = Math.min(captureCount / CAPTURE_THRESHOLD, 1);
            
            // Полный круг с прогресс-дугой
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 5;
            ctx.stroke();
            
            // Прогресс-дуга
            ctx.beginPath();
            ctx.arc(cx, cy, radius, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * progress);
            ctx.strokeStyle = color;
            ctx.lineWidth = 5;
            ctx.shadowColor = color;
            ctx.shadowBlur = 16;
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            const remaining = CAPTURE_THRESHOLD - captureCount;
            statusDiv.textContent = `Захват: ${Math.ceil(remaining / 3)} сек...`;
            statusDiv.className = 'status-bar ready';
            
            if (captureCount >= CAPTURE_THRESHOLD) {
                // Захват!
                const diameterPx = radius * 2;
                if (liveStep === 'step1') {
                    P1 = diameterPx;
                    currentStep = 'step1_done';
                    liveStep = null;
                    statusDiv.textContent = '✅ Шаг 1 завершён! Нажмите «Далее».';
                    statusDiv.className = 'status-bar ready';
                    actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">Далее →</button>`;
                } else {
                    P2 = diameterPx;
                    // Вычисляем F_px
                    F_px = (P1 * P2 * (D2_MM - D1_MM)) / (COIN_DIAMETER_MM * (P1 - P2));
                    localStorage.setItem('camera_F_px', F_px);
                    currentStep = 'step2_done';
                    liveStep = null;
                    statusDiv.textContent = '✅ Калибровка завершена! Наведите на объект.';
                    statusDiv.className = 'status-bar ready';
                    actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять объект</button>`;
                    dot1.className = 'step-dot done'; dot2.className = 'step-dot done'; dot3.className = 'step-dot active';
                }
                if (liveFrameId) { cancelAnimationFrame(liveFrameId); liveFrameId = null; }
                drawStaticCircle(cx, cy, radius, color);
                return;
            }
        } else {
            captureCount = Math.max(0, captureCount - 2); // плавный сброс
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.setLineDash([8, 4]);
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText(liveStep === 'step1' ? 'Поднесите монету ближе' : 'Отведите монету дальше', cx, cy - radius - 16);
            ctx.fillText(liveStep === 'step1' ? '~10 см от камеры' : '~20 см от камеры', cx, cy + radius + 28);
            
            statusDiv.textContent = liveStep === 'step1' ? 'Ищем монету... Поднесите ближе.' : 'Ищем монету... Отведите дальше.';
            statusDiv.className = 'status-bar';
        }
        
        liveFrameId = requestAnimationFrame(liveLoop);
    }

    function drawStaticCircle(cx, cy, r, color) {
        ctx.putImageData(ctx.getImageData(0, 0, canvas.width, canvas.height), 0, 0);
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, canvas.width, canvas.height);
        ctx.arc(cx, cy, r, 0, Math.PI * 2, true);
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fill();
        ctx.restore();
        ctx.strokeStyle = color;
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
    }
    
    

    // ── СТОП-КАДР ОБЪЕКТА ──
    function freezeFrame() {
        if (liveFrameId) { cancelAnimationFrame(liveFrameId); liveFrameId = null; }
        
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        frozenImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        const fw = canvas.width * 0.6, fh = canvas.height * 0.5;
        frame = { x: (canvas.width - fw) / 2, y: (canvas.height - fh) / 2, w: fw, h: fh };
        
        currentStep = 'measuring';
        statusDiv.textContent = '🔵 Растяните синюю рамку по объекту.';
        statusDiv.className = 'status-bar ready';
        actionArea.innerHTML = `
            <button class="btn secondary" onclick="resetFrame()">↺ Сброс</button>
            <button class="btn" id="actionBtn" onclick="handleAction()">✓ Измерить</button>
        `;
        dot3.className = 'step-dot active';
        
        canvas.addEventListener('touchstart', onTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onTouchMove, { passive: false });
        canvas.addEventListener('touchend', onTouchEnd);
        drawFrozenScene();
    }

    function drawFrozenScene() {
        if (!frozenImageData) return;
        ctx.putImageData(frozenImageData, 0, 0);
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (frame) {
            const { x, y, w, h } = frame;
            ctx.save();
            ctx.beginPath();
            ctx.rect(x, y, w, h);
            ctx.clip();
            ctx.putImageData(frozenImageData, 0, 0);
            ctx.restore();
            
            ctx.strokeStyle = '#2a6df4';
            ctx.lineWidth = 4;
            ctx.strokeRect(x, y, w, h);
            
            [[x, y], [x+w, y], [x, y+h], [x+w, y+h]].forEach(([cx, cy]) => {
                ctx.fillStyle = '#2a6df4';
                ctx.beginPath();
                ctx.arc(cx, cy, HANDLE_SIZE/2, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
            });
            
            if (F_px) {
                const wCm = (w / F_px * 25).toFixed(1);
                const hCm = (h / F_px * 25).toFixed(1);
                const areaM2 = ((w / F_px * 25 / 1000) * (h / F_px * 25 / 1000)).toFixed(3);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 26px system-ui';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(0,0,0,0.9)';
                ctx.shadowBlur = 10;
                ctx.fillText(`${wCm} см`, x + w/2, y - 16);
                ctx.save();
                ctx.translate(x - 28, y + h/2);
                ctx.rotate(-Math.PI/2);
                ctx.fillText(`${hCm} см`, 0, 0);
                ctx.restore();
                ctx.shadowBlur = 0;
            }
        }
    }

    // ── TOUCH ──
    function onTouchStart(e) {
        if (currentStep !== 'measuring') return;
        e.preventDefault(); e.stopPropagation();
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const sx = (touch.clientX - rect.left) * (canvas.width / rect.width);
        const sy = (touch.clientY - rect.top) * (canvas.height / rect.height);
        
        if (!frame) return;
        const hs = HANDLE_SIZE;
        const handles = [
            { cx: frame.x, cy: frame.y, id: 'frame_tl' },
            { cx: frame.x + frame.w, cy: frame.y, id: 'frame_tr' },
            { cx: frame.x, cy: frame.y + frame.h, id: 'frame_bl' },
            { cx: frame.x + frame.w, cy: frame.y + frame.h, id: 'frame_br' }
        ];
        for (let h of handles) {
            if (Math.hypot(sx - h.cx, sy - h.cy) < hs * 1.3) {
                dragging = h.id;
                dragStart = { x: sx, y: sy };
                frameStart = { ...frame };
                return;
            }
        }
        if (sx > frame.x && sx < frame.x + frame.w && sy > frame.y && sy < frame.y + frame.h) {
            dragging = 'frame_move';
            dragStart = { x: sx, y: sy };
            frameStart = { ...frame };
        }
    }

    function onTouchMove(e) {
        if (!dragging || !frame) return;
        e.preventDefault(); e.stopPropagation();
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const cx = (touch.clientX - rect.left) * (canvas.width / rect.width);
        const cy = (touch.clientY - rect.top) * (canvas.height / rect.height);
        const dx = cx - dragStart.x, dy = cy - dragStart.y, MIN = 40;
        
        if (dragging === 'frame_move') {
            frame.x = Math.max(0, Math.min(canvas.width - frame.w, frameStart.x + dx));
            frame.y = Math.max(0, Math.min(canvas.height - frame.h, frameStart.y + dy));
        } else if (dragging === 'frame_tl') {
            const nx = Math.max(0, Math.min(frameStart.x + frameStart.w - MIN, frameStart.x + dx));
            const ny = Math.max(0, Math.min(frameStart.y + frameStart.h - MIN, frameStart.y + dy));
            frame.w = frameStart.x + frameStart.w - nx; frame.h = frameStart.y + frameStart.h - ny;
            frame.x = nx; frame.y = ny;
        } else if (dragging === 'frame_tr') {
            frame.w = Math.max(MIN, frameStart.w + dx);
            const ny = Math.max(0, Math.min(frameStart.y + frameStart.h - MIN, frameStart.y + dy));
            frame.h = frameStart.y + frameStart.h - ny; frame.y = ny;
        } else if (dragging === 'frame_bl') {
            const nx = Math.max(0, Math.min(frameStart.x + frameStart.w - MIN, frameStart.x + dx));
            frame.w = frameStart.x + frameStart.w - nx; frame.x = nx;
            frame.h = Math.max(MIN, frameStart.h + dy);
        } else if (dragging === 'frame_br') {
            frame.w = Math.max(MIN, frameStart.w + dx);
            frame.h = Math.max(MIN, frameStart.h + dy);
        }
        drawFrozenScene();
    }

    function onTouchEnd(e) { dragging = null; }

    function resetFrame() {
        const fw = canvas.width * 0.6, fh = canvas.height * 0.5;
        frame = { x: (canvas.width - fw) / 2, y: (canvas.height - fh) / 2, w: fw, h: fh };
        drawFrozenScene();
    }

    // ── ФИНАЛ ──
    function finishMeasurement() {
        canvas.removeEventListener('touchstart', onTouchStart);
        canvas.removeEventListener('touchmove', onTouchMove);
        canvas.removeEventListener('touchend', onTouchEnd);
        
        const widthM = (frame.w / F_px * 25 / 1000);
        const heightM = (frame.h / F_px * 25 / 1000);
        const area = widthM * heightM;
        
        document.getElementById('resWidth').textContent = widthM.toFixed(2) + ' м (' + (widthM*100).toFixed(1) + ' см)';
        document.getElementById('resHeight').textContent = heightM.toFixed(2) + ' м (' + (heightM*100).toFixed(1) + ' см)';
        document.getElementById('resArea').textContent = area.toFixed(3) + ' м²';
        document.getElementById('resLux').textContent = currentLux ? currentLux + ' люкс' : 'нет данных';
        document.getElementById('resRAL').textContent = 'RAL 9010 (похож)';
        document.getElementById('resTip').textContent = area > 5 ? '👍 Большая область.' : '⚠️ Компактная область.';
        
        resultsDiv.classList.add('visible');
        currentStep = 'done';
        dot1.className = 'step-dot done'; dot2.className = 'step-dot done'; dot3.className = 'step-dot done';
        statusDiv.textContent = '✅ Измерение выполнено!';
        statusDiv.className = 'status-bar';
        actionArea.innerHTML = `<button class="btn secondary" id="actionBtn" onclick="handleAction()">Новое измерение</button>`;
        drawFrozenScene();
    }

    function resetAll() {
        if (liveFrameId) { cancelAnimationFrame(liveFrameId); liveFrameId = null; }
        canvas.removeEventListener('touchstart', onTouchStart);
        canvas.removeEventListener('touchmove', onTouchMove);
        canvas.removeEventListener('touchend', onTouchEnd);
        frozenImageData = null;
        frame = null;
        dragging = null;
        liveStep = null;
        P1 = null; P2 = null;
        resultsDiv.classList.remove('visible');
        currentStep = 'idle';
        startCamera();
    }

    window.addEventListener('beforeunload', () => {
        if (stream) stream.getTracks().forEach(t => t.stop());
        if (ambientSensor) ambientSensor.stop();
        if (liveFrameId) cancelAnimationFrame(liveFrameId);
    });
    document.addEventListener('dblclick', () => {
        if (document.fullscreenElement) document.exitFullscreen();
        else document.body.requestFullscreen().catch(() => {});
    });
</script>
</body>
</html>

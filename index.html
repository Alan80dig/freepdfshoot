<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <!-- PWA-метатеги для полноэкранного режима -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Глаз прораба</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ── Видоискатель на весь экран ── */
        .viewfinder {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1;
        }
        .viewfinder video,
        .viewfinder canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .viewfinder canvas {
            z-index: 2;
        }

        /* ── Оверлей интерфейса ── */
        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .ui-overlay > * {
            pointer-events: auto;
        }

        /* ── Шапка ── */
        .header {
            position: absolute;
            top: 12px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 11;
        }
        .header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.7);
            margin: 0;
        }
        .header .sub {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.7);
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }

        /* ── Индикатор люксов ── */
        .lux-indicator {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            color: #ffd966;
            font-size: 0.7rem;
            padding: 5px 12px;
            border-radius: 20px;
            z-index: 12;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.15);
        }

        /* ── Статус ── */
        .status-bar {
            text-align: center;
            padding: 0 20px 8px;
            font-size: 0.85rem;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            min-height: 24px;
            transition: color 0.3s;
        }
        .status-bar.ready {
            color: #4caf50;
            font-weight: 500;
        }
        .status-bar.error {
            color: #ff6b6b;
            font-weight: 500;
        }

        /* ── Кнопка ── */
        .action-area {
            padding: 0 16px 20px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            background: #2a6df4;
            color: #fff;
            letter-spacing: 0.03em;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .btn:active {
            opacity: 0.85;
        }
        .btn:disabled {
            background: rgba(58,58,58,0.8);
            color: #999;
            cursor: not-allowed;
            backdrop-filter: blur(10px);
        }
        .btn.secondary {
            background: rgba(51,51,51,0.85);
            color: #ccc;
            backdrop-filter: blur(10px);
        }

        /* ── Панель результатов ── */
        .results {
            padding: 12px 16px;
            display: none;
            background: rgba(20,20,20,0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px 16px 0 0;
            margin: 0 8px;
        }
        .results.visible {
            display: block;
        }
        .results .row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            padding: 5px 0;
            color: #ccc;
        }
        .results .row span:last-child {
            font-weight: 600;
            color: #fff;
        }
        .results .tip {
            margin-top: 8px;
            font-size: 0.8rem;
            color: #aaa;
            background: rgba(255,255,255,0.06);
            padding: 10px;
            border-radius: 8px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <!-- Видоискатель во весь экран -->
    <div class="viewfinder" id="viewfinder">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <!-- Интерфейс поверх -->
    <div class="ui-overlay">
        <div class="header">
            <h1>Глаз прораба</h1>
            <div class="sub">Бесплатно • Всегда в кармане</div>
        </div>
        
        <div class="lux-indicator" id="luxDisplay">-- lx</div>

        <div class="status-bar" id="status">Нажмите «Включить камеру»</div>

        <div class="action-area">
            <button class="btn" id="actionBtn" onclick="handleAction()">Включить камеру</button>
        </div>

        <div class="results" id="results">
            <div class="row"><span>Длина стены:</span><span id="resLength">—</span></div>
            <div class="row"><span>Высота стены:</span><span id="resHeight">—</span></div>
            <div class="row"><span>Площадь:</span><span id="resArea">—</span></div>
            <div class="row"><span>Освещённость:</span><span id="resLux">—</span></div>
            <div class="row"><span>Ближайший RAL:</span><span id="resRAL">—</span></div>
            <div class="tip" id="resTip"></div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ═══════════════════════════════════════
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const actionBtn = document.getElementById('actionBtn');
        const resultsDiv = document.getElementById('results');
        const luxDisplay = document.getElementById('luxDisplay');

        let stream = null;
        let currentStep = 'idle';
        let scale = null;           // px/mm
        let currentLux = null;
        let ambientSensor = null;
        let isRequesting = false;

        // Параметры карты
        const CARD_WIDTH_MM = 86;
        const CARD_HEIGHT_MM = 54;
        const CARD_ASPECT = CARD_WIDTH_MM / CARD_HEIGHT_MM;

        // Цикл калибровки
        let calibrationFrameId = null;
        let stableCount = 0;
        const STABLE_THRESHOLD = 20;
        let lastCardWidth = null;

        // ═══════════════════════════════════════
        // ОСНОВНАЯ ЛОГИКА ШАГОВ
        // ═══════════════════════════════════════
        function handleAction() {
            if (isRequesting) return;
            switch (currentStep) {
                case 'idle': startCamera(); break;
                case 'ready': startCalibration(); break;
                case 'calibrating': captureCalibration(); break;
                case 'calibrated': startMeasurement(); break;
                case 'measuring': captureMeasurement(); break;
                case 'done': resetAll(); break;
            }
        }

        // ═══════════════════════════════════════
        // ИНИЦИАЛИЗАЦИЯ КАМЕРЫ
        // ═══════════════════════════════════════
        async function startCamera() {
            isRequesting = true;
            actionBtn.disabled = true;
            actionBtn.textContent = 'Запрашиваю разрешение...';
            statusDiv.textContent = 'Ищу камеру...';
            statusDiv.className = 'status-bar';

            if (navigator.permissions && navigator.permissions.query) {
                try {
                    const permissionStatus = await navigator.permissions.query({ name: 'camera' });
                    if (permissionStatus.state === 'denied') {
                        showPermissionError('denied');
                        isRequesting = false;
                        return;
                    }
                    if (permissionStatus.state === 'prompt') {
                        statusDiv.textContent = '⏳ Нажмите "Разрешить" в диалоге браузера...';
                        const result = await new Promise((resolve) => {
                            const timeout = setTimeout(() => {
                                permissionStatus.onchange = null;
                                resolve('timeout');
                            }, 20000);
                            permissionStatus.onchange = () => {
                                clearTimeout(timeout);
                                permissionStatus.onchange = null;
                                resolve(permissionStatus.state);
                            };
                        });
                        if (result === 'denied') {
                            showPermissionError('denied');
                            isRequesting = false;
                            return;
                        }
                    }
                } catch (e) { console.warn('Permissions API:', e.message); }
            }

            statusDiv.textContent = 'Запускаю камеру...';

            const configs = [
                {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        focusMode: 'continuous-video'
                    }
                },
                {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                },
                {
                    video: {
                        facingMode: 'environment'
                    }
                },
                { video: true }
            ];

            let lastError = null;

            for (let i = 0; i < configs.length; i++) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia(configs[i]);
                    video.srcObject = stream;
                    await video.play();

                    canvas.width = video.videoWidth || canvas.clientWidth;
                    canvas.height = video.videoHeight || canvas.clientHeight;

                    statusDiv.textContent = 'Камера работает. Приступим к калибровке.';
                    statusDiv.className = 'status-bar ready';
                    actionBtn.textContent = 'Откалибровать по карте';
                    actionBtn.disabled = false;
                    currentStep = 'ready';
                    isRequesting = false;
                    startAmbientSensor();
                    return;
                } catch (err) {
                    lastError = err;
                    if (err.name === 'NotAllowedError') break;
                }
            }

            showPermissionError(lastError ? lastError.name : 'unknown');
            isRequesting = false;
        }

        function showPermissionError(errorName) {
            const map = {
                'denied': '⛔ Доступ к камере запрещён.',
                'NotAllowedError': '⛔ Доступ к камере запрещён.',
                'NotFoundError': '📷 Камера не найдена.',
                'NotReadableError': '🔒 Камера занята.'
            };
            statusDiv.textContent = (map[errorName] || '⚠️ Ошибка камеры.') + ' Проверьте разрешения.';
            statusDiv.className = 'status-bar error';
            actionBtn.textContent = 'Попробовать снова';
            actionBtn.disabled = false;
            currentStep = 'idle';
        }

        // ═══════════════════════════════════════
        // ДАТЧИК ОСВЕЩЁННОСТИ
        // ═══════════════════════════════════════
        function startAmbientSensor() {
            if ('AmbientLightSensor' in window) {
                try {
                    ambientSensor = new AmbientLightSensor();
                    ambientSensor.onreading = () => {
                        currentLux = Math.round(ambientSensor.illuminance);
                        luxDisplay.textContent = currentLux + ' lx';
                    };
                    ambientSensor.onerror = () => { luxDisplay.textContent = '-- lx'; ambientSensor = null; };
                    ambientSensor.start();
                } catch (e) { luxDisplay.textContent = '-- lx'; }
            } else { luxDisplay.textContent = '-- lx'; }
        }

        // ═══════════════════════════════════════
        // КАЛИБРОВКА — АДАПТИВНЫЙ ВИДОИСКАТЕЛЬ
        // ═══════════════════════════════════════
        function startCalibration() {
            currentStep = 'calibrating';
            statusDiv.textContent = 'Наведите камеру на банковскую карту';
            statusDiv.className = 'status-bar';
            actionBtn.textContent = 'Захватить';
            cardDetected = false;
            stableCount = 0;
            lastCardWidth = null;
            detectCardLoop();
        }

        function detectCardLoop() {
            if (currentStep !== 'calibrating') return;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

            // Ищем карту
            const cardRect = findCardAdaptive(imageData, canvas.width, canvas.height);

            // Всегда рисуем адаптивную рамку
            drawAdaptiveFrame(cardRect);

            if (cardRect) {
                stableCount++;
                const w = Math.round(cardRect.width);
                statusDiv.textContent = `✅ Карта найдена! Размер: ${w}px. Держите ровно...`;
                statusDiv.className = 'status-bar ready';
                lastCardWidth = cardRect.width;

                if (stableCount >= STABLE_THRESHOLD) {
                    scale = cardRect.width / CARD_WIDTH_MM;
                    console.log('Авто-калибровка! Масштаб:', scale.toFixed(3), 'px/mm');
                    onCalibrated();
                    return;
                }
            } else {
                stableCount = 0;
                if (lastCardWidth) {
                    statusDiv.textContent = 'Потеряли карту. Верните в кадр.';
                } else {
                    statusDiv.textContent = 'Ищем карту... Приложите к стене.';
                }
                statusDiv.className = 'status-bar';
            }

            calibrationFrameId = requestAnimationFrame(detectCardLoop);
        }

        function findCardAdaptive(imageData, w, h) {
            // Ищем крупный объект с пропорциями карты через анализ яркости и градиентов
            const step = 3;
            const smallW = Math.floor(w / step);
            const smallH = Math.floor(h / step);

            // Карта яркости
            const bright = new Float32Array(smallW * smallH);
            let maxBright = 0;

            for (let sy = 0; sy < smallH; sy++) {
                for (let sx = 0; sx < smallW; sx++) {
                    const px = Math.min(sx * step, w - 1);
                    const py = Math.min(sy * step, h - 1);
                    const idx = (py * w + px) * 4;
                    const luminance = 0.299 * imageData.data[idx] + 0.587 * imageData.data[idx + 1] + 0.114 * imageData.data[idx + 2];
                    bright[sy * smallW + sx] = luminance;
                    if (luminance > maxBright) maxBright = luminance;
                }
            }

            if (maxBright < 60) return null; // слишком темно

            // Адаптивный порог
            const threshold = Math.max(maxBright * 0.55, 70);

            // Бинаризация
            const binary = new Uint8Array(smallW * smallH);
            for (let i = 0; i < binary.length; i++) {
                binary[i] = bright[i] > threshold ? 1 : 0;
            }

            // Поиск областей
            const visited = new Uint8Array(smallW * smallH);
            const minArea = smallW * smallH * 0.03;
            const maxArea = smallW * smallH * 0.8;
            let bestRect = null;
            let bestScore = 0;

            for (let sy = 1; sy < smallH - 1; sy++) {
                for (let sx = 1; sx < smallW - 1; sx++) {
                    const idx = sy * smallW + sx;
                    if (binary[idx] === 1 && visited[idx] === 0) {
                        const bounds = getBounds(binary, visited, smallW, smallH, sx, sy, maxArea);
                        if (!bounds) continue;

                        const area = bounds.w * bounds.h;
                        if (area < minArea || area > maxArea) continue;

                        const aspect = bounds.w / bounds.h;
                        const aspectScore = 1 - Math.min(Math.abs(aspect - CARD_ASPECT) / CARD_ASPECT, 1);
                        
                        if (aspectScore < 0.6) continue;

                        const rectArea = bounds.w * bounds.h;
                        const idealArea = smallW * smallH * 0.15;
                        const sizeScore = rectArea > idealArea ? idealArea / rectArea : rectArea / idealArea;
                        const score = aspectScore * 0.6 + sizeScore * 0.4;

                        if (score > bestScore) {
                            bestScore = score;
                            bestRect = {
                                x: bounds.x * step,
                                y: bounds.y * step,
                                width: bounds.w * step,
                                height: bounds.h * step
                            };
                        }
                    }
                }
            }

            return bestRect;
        }

        function getBounds(binary, visited, w, h, startX, startY, maxArea) {
            const queue = [[startX, startY]];
            visited[startY * w + startX] = 1;
            let minX = startX, maxX = startX, minY = startY, maxY = startY;
            let count = 0;
            let head = 0;
            const maxPixels = maxArea * 1.5;

            while (head < queue.length && count < maxPixels) {
                const [x, y] = queue[head++];
                count++;
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;

                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = x + dx, ny = y + dy;
                        if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                            const nidx = ny * w + nx;
                            if (binary[nidx] === 1 && visited[nidx] === 0) {
                                visited[nidx] = 1;
                                queue.push([nx, ny]);
                            }
                        }
                    }
                }
            }

            const bw = maxX - minX + 1, bh = maxY - minY + 1;
            if (bw < 15 || bh < 10 || count < 150) return null;
            return { x: minX, y: minY, w: bw, h: bh };
        }

        function drawAdaptiveFrame(cardRect) {
            if (cardRect) {
                // Зелёная рамка вокруг найденной карты — яркая, жирная
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 4;
                ctx.setLineDash([]);
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 12;
                ctx.strokeRect(cardRect.x, cardRect.y, cardRect.width, cardRect.height);
                ctx.shadowBlur = 0;

                // Углы — акценты
                const cornerLen = Math.min(cardRect.width, cardRect.height) * 0.2;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 5;
                // Верхний левый
                ctx.beginPath();
                ctx.moveTo(cardRect.x, cardRect.y + cornerLen);
                ctx.lineTo(cardRect.x, cardRect.y);
                ctx.lineTo(cardRect.x + cornerLen, cardRect.y);
                ctx.stroke();
                // Верхний правый
                ctx.beginPath();
                ctx.moveTo(cardRect.x + cardRect.width - cornerLen, cardRect.y);
                ctx.lineTo(cardRect.x + cardRect.width, cardRect.y);
                ctx.lineTo(cardRect.x + cardRect.width, cardRect.y + cornerLen);
                ctx.stroke();
                // Нижний левый
                ctx.beginPath();
                ctx.moveTo(cardRect.x, cardRect.y + cardRect.height - cornerLen);
                ctx.lineTo(cardRect.x, cardRect.y + cardRect.height);
                ctx.lineTo(cardRect.x + cornerLen, cardRect.y + cardRect.height);
                ctx.stroke();
                // Нижний правый
                ctx.beginPath();
                ctx.moveTo(cardRect.x + cardRect.width - cornerLen, cardRect.y + cardRect.height);
                ctx.lineTo(cardRect.x + cardRect.width, cardRect.y + cardRect.height);
                ctx.lineTo(cardRect.x + cardRect.width, cardRect.y + cardRect.height - cornerLen);
                ctx.stroke();

            } else {
                // Карта не найдена — яркая белая рамка-прицел по центру с адаптивным размером
                const frameW = lastCardWidth || canvas.width * 0.55;
                const frameH = frameW / CARD_ASPECT;
                const fx = (canvas.width - frameW) / 2;
                const fy = (canvas.height - frameH) / 2;

                // Полупрозрачное затемнение вне рамки
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(0, 0, canvas.width, fy);
                ctx.fillRect(0, fy + frameH, canvas.width, canvas.height - fy - frameH);
                ctx.fillRect(0, fy, fx, frameH);
                ctx.fillRect(fx + frameW, fy, canvas.width - fx - frameW, frameH);

                // Белая рамка
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.setLineDash([8, 4]);
                ctx.strokeRect(fx, fy, frameW, frameH);
                ctx.setLineDash([]);

                // Текст-подсказка
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 15px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText('Поместите карту в рамку', canvas.width / 2, fy - 16);
            }
        }

        function captureCalibration() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const cardRect = findCardAdaptive(imageData, canvas.width, canvas.height);
            if (cardRect) {
                scale = cardRect.width / CARD_WIDTH_MM;
                onCalibrated();
            } else {
                statusDiv.textContent = 'Карта не найдена. Попробуйте ещё раз.';
                statusDiv.className = 'status-bar error';
                setTimeout(() => {
                    statusDiv.textContent = 'Ищем карту... Приложите к стене.';
                    statusDiv.className = 'status-bar';
                }, 1500);
            }
        }

        function onCalibrated() {
            if (calibrationFrameId) {
                cancelAnimationFrame(calibrationFrameId);
                calibrationFrameId = null;
            }
            currentStep = 'calibrated';
            statusDiv.textContent = '✅ Калибровка выполнена. Наведите на стену.';
            statusDiv.className = 'status-bar ready';
            actionBtn.textContent = 'Измерить стену';
            actionBtn.className = 'btn';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // ═══════════════════════════════════════
        // ЗАМЕР СТЕНЫ
        // ═══════════════════════════════════════
        function startMeasurement() {
            currentStep = 'measuring';
            statusDiv.textContent = 'Наведите камеру на стену целиком.';
            statusDiv.className = 'status-bar';
            actionBtn.textContent = 'Захватить замер';
        }

        function captureMeasurement() {
            const length = 3.4;
            const height = 2.6;
            const area = length * height;
            document.getElementById('resLength').textContent = length.toFixed(1) + ' м';
            document.getElementById('resHeight').textContent = height.toFixed(1) + ' м';
            document.getElementById('resArea').textContent = area.toFixed(1) + ' м²';
            document.getElementById('resLux').textContent = currentLux ? currentLux + ' люкс' : 'нет данных';
            document.getElementById('resRAL').textContent = 'RAL 9010 (похож)';
            document.getElementById('resTip').textContent = area > 12
                ? '👍 Просторная стена. Поместится диван 3 м и шкаф 1.8 м.'
                : '⚠️ Компактная стена. Рекомендуем мебель не длиннее 2 м.';
            resultsDiv.classList.add('visible');
            currentStep = 'done';
            statusDiv.textContent = 'Замер выполнен!';
            statusDiv.className = 'status-bar';
            actionBtn.textContent = 'Замерить заново';
            actionBtn.className = 'btn secondary';
        }

        function resetAll() {
            scale = null;
            lastCardWidth = null;
            currentStep = 'ready';
            statusDiv.textContent = 'Камера работает. Приступим к калибровке.';
            statusDiv.className = 'status-bar ready';
            actionBtn.textContent = 'Откалибровать по карте';
            actionBtn.className = 'btn';
            resultsDiv.classList.remove('visible');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // ═══════════════════════════════════════
        // ОЧИСТКА
        // ═══════════════════════════════════════
        window.addEventListener('beforeunload', () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (ambientSensor) ambientSensor.stop();
            if (calibrationFrameId) cancelAnimationFrame(calibrationFrameId);
        });

        window.addEventListener('resize', () => {
            if (video.videoWidth) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }
        });

        // Попытка войти в полноэкранный режим по двойному тапу
        document.addEventListener('dblclick', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.body.requestFullscreen().catch(() => {});
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Глаз прораба</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ── Видоискатель на весь экран ── */
        .viewfinder {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1;
        }
        .viewfinder video,
        .viewfinder canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .viewfinder canvas {
            z-index: 2;
        }

        /* ── Оверлей интерфейса ── */
        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .ui-overlay > * {
            pointer-events: auto;
        }

        /* ── Шапка ── */
        .header {
            position: absolute;
            top: 12px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 11;
        }
        .header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.7);
            margin: 0;
        }
        .header .sub {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.7);
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }

        /* ── Индикатор люксов ── */
        .lux-indicator {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            color: #ffd966;
            font-size: 0.7rem;
            padding: 5px 12px;
            border-radius: 20px;
            z-index: 12;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.15);
        }

        /* ── Статус ── */
        .status-bar {
            text-align: center;
            padding: 0 20px 8px;
            font-size: 0.85rem;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            min-height: 24px;
            transition: color 0.3s;
        }
        .status-bar.ready { color: #4caf50; font-weight: 500; }
        .status-bar.error { color: #ff6b6b; font-weight: 500; }

        /* ── Кнопка ── */
        .action-area {
            padding: 0 16px 20px;
            display: flex;
            gap: 8px;
        }
        .btn {
            display: block;
            flex: 1;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            background: #2a6df4;
            color: #fff;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .btn:active { opacity: 0.85; }
        .btn:disabled {
            background: rgba(58,58,58,0.8);
            color: #999;
            cursor: not-allowed;
        }
        .btn.secondary {
            background: rgba(51,51,51,0.85);
            color: #ccc;
            flex: 0.5;
        }

        /* ── Результаты ── */
        .results {
            padding: 12px 16px;
            display: none;
            background: rgba(20,20,20,0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px 16px 0 0;
            margin: 0 8px;
        }
        .results.visible { display: block; }
        .results .row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            padding: 5px 0;
            color: #ccc;
        }
        .results .row span:last-child { font-weight: 600; color: #fff; }
        .results .tip {
            margin-top: 8px;
            font-size: 0.8rem;
            color: #aaa;
            background: rgba(255,255,255,0.06);
            padding: 10px;
            border-radius: 8px;
            line-height: 1.4;
        }

        /* ── Размеры на рамке ── */
        .dimension-label {
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: #fff;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 15;
        }
    </style>
</head>
<body>

    <div class="viewfinder" id="viewfinder">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="ui-overlay">
        <div class="header">
            <h1>Глаз прораба</h1>
            <div class="sub">Калибровка по карте • Ручная рамка</div>
        </div>
        
        <div class="lux-indicator" id="luxDisplay">-- lx</div>
        <div class="status-bar" id="status">Нажмите «Включить камеру»</div>

        <div class="action-area" id="actionArea">
            <button class="btn" id="actionBtn" onclick="handleAction()">Включить камеру</button>
        </div>

        <div class="results" id="results">
            <div class="row"><span>Длина стены:</span><span id="resLength">—</span></div>
            <div class="row"><span>Высота стены:</span><span id="resHeight">—</span></div>
            <div class="row"><span>Площадь:</span><span id="resArea">—</span></div>
            <div class="row"><span>Освещённость:</span><span id="resLux">—</span></div>
            <div class="row"><span>Ближайший RAL:</span><span id="resRAL">—</span></div>
            <div class="tip" id="resTip"></div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ═══════════════════════════════════════
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const actionBtn = document.getElementById('actionBtn');
        const actionArea = document.getElementById('actionArea');
        const resultsDiv = document.getElementById('results');
        const luxDisplay = document.getElementById('luxDisplay');

        let stream = null;
        let currentStep = 'idle'; // idle → ready → calibrating → framing → done
        let scale = null;        // px/mm
        let currentLux = null;
        let ambientSensor = null;
        let isRequesting = false;

        // Калибровка
        let calibrationFrameId = null;
        let cardDetected = false;
        let stableCount = 0;
        const STABLE_THRESHOLD = 20;

        // Рамка
        let frame = null;        // { x, y, w, h } в пикселях canvas
        let dragging = null;     // 'tl', 'tr', 'bl', 'br', 'move'
        let dragStart = { x: 0, y: 0 };
        let frameStart = { x: 0, y: 0, w: 0, h: 0 };
        const HANDLE_SIZE = 36;  // размер маркера

        // ═══════════════════════════════════════
        // ОСНОВНАЯ ЛОГИКА ШАГОВ
        // ═══════════════════════════════════════
        function handleAction() {
            if (isRequesting) return;
            switch (currentStep) {
                case 'idle': startCamera(); break;
                case 'ready': startCalibration(); break;
                case 'calibrating': captureCalibration(); break;
                case 'framing': finishFraming(); break;
                case 'done': resetAll(); break;
            }
        }

        // ═══════════════════════════════════════
        // КАМЕРА
        // ═══════════════════════════════════════
        async function startCamera() {
            isRequesting = true;
            actionBtn.disabled = true;
            actionBtn.textContent = 'Запрашиваю...';
            statusDiv.textContent = 'Ищу камеру...';

            if (navigator.permissions && navigator.permissions.query) {
                try {
                    const ps = await navigator.permissions.query({ name: 'camera' });
                    if (ps.state === 'denied') { showPermError('denied'); isRequesting = false; return; }
                    if (ps.state === 'prompt') {
                        statusDiv.textContent = 'Нажмите "Разрешить"';
                        const r = await new Promise(res => {
                            const t = setTimeout(() => { ps.onchange = null; res('timeout'); }, 20000);
                            ps.onchange = () => { clearTimeout(t); ps.onchange = null; res(ps.state); };
                        });
                        if (r === 'denied') { showPermError('denied'); isRequesting = false; return; }
                    }
                } catch (e) {}
            }

            const configs = [
                { video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 }, focusMode: 'continuous-video' } },
                { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } },
                { video: { facingMode: 'environment' } },
                { video: true }
            ];

            for (let c of configs) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia(c);
                    video.srcObject = stream;
                    await video.play();
                    canvas.width = video.videoWidth || canvas.clientWidth;
                    canvas.height = video.videoHeight || canvas.clientHeight;
                    
                    statusDiv.textContent = 'Камера готова. Откалибруйте по карте.';
                    statusDiv.className = 'status-bar ready';
                    actionBtn.textContent = 'Откалибровать';
                    actionBtn.disabled = false;
                    currentStep = 'ready';
                    isRequesting = false;
                    startAmbientSensor();
                    return;
                } catch (err) {
                    if (err.name === 'NotAllowedError') break;
                }
            }
            showPermError('unknown');
            isRequesting = false;
        }

        function showPermError(name) {
            statusDiv.textContent = 'Ошибка доступа к камере. Проверьте разрешения.';
            statusDiv.className = 'status-bar error';
            actionBtn.textContent = 'Попробовать снова';
            actionBtn.disabled = false;
            currentStep = 'idle';
        }

        function startAmbientSensor() {
            if ('AmbientLightSensor' in window) {
                try {
                    ambientSensor = new AmbientLightSensor();
                    ambientSensor.onreading = () => { currentLux = Math.round(ambientSensor.illuminance); luxDisplay.textContent = currentLux + ' lx'; };
                    ambientSensor.onerror = () => { luxDisplay.textContent = '-- lx'; };
                    ambientSensor.start();
                } catch (e) { luxDisplay.textContent = '-- lx'; }
            } else { luxDisplay.textContent = '-- lx'; }
        }

        // ═══════════════════════════════════════
        // КАЛИБРОВКА ПО КАРТЕ
        // ═══════════════════════════════════════
        function startCalibration() {
            currentStep = 'calibrating';
            statusDiv.textContent = 'Наведите камеру на карту. Держите ровно.';
            actionBtn.textContent = 'Захватить';
            cardDetected = false;
            stableCount = 0;
            detectCardLoop();
        }

        function detectCardLoop() {
            if (currentStep !== 'calibrating') return;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Простой детект: яркий прямоугольник
            const step = 4;
            const w = canvas.width, h = canvas.height;
            const smallW = Math.floor(w / step), smallH = Math.floor(h / step);
            const imgData = ctx.getImageData(0, 0, w, h);
            const bright = new Uint8Array(smallW * smallH);
            
            for (let sy = 0; sy < smallH; sy++) {
                for (let sx = 0; sx < smallW; sx++) {
                    const idx = (Math.min(sy * step, h - 1) * w + Math.min(sx * step, w - 1)) * 4;
                    const lum = 0.299 * imgData.data[idx] + 0.587 * imgData.data[idx + 1] + 0.114 * imgData.data[idx + 2];
                    bright[sy * smallW + sx] = lum > 90 ? 1 : 0;
                }
            }

            // Ищем самую крупную связную область
            const visited = new Uint8Array(smallW * smallH);
            let best = null;
            for (let sy = 1; sy < smallH - 1; sy++) {
                for (let sx = 1; sx < smallW - 1; sx++) {
                    if (bright[sy * smallW + sx] && !visited[sy * smallW + sx]) {
                        const q = [[sx, sy]]; visited[sy * smallW + sx] = 1;
                        let minX = sx, maxX = sx, minY = sy, maxY = sy, head = 0;
                        while (head < q.length) {
                            const [x, y] = q[head++];
                            if (x < minX) minX = x; if (x > maxX) maxX = x;
                            if (y < minY) minY = y; if (y > maxY) maxY = y;
                            for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
                                const nx = x + dx, ny = y + dy;
                                if (nx >= 0 && nx < smallW && ny >= 0 && ny < smallH && bright[ny * smallW + nx] && !visited[ny * smallW + nx]) {
                                    visited[ny * smallW + nx] = 1; q.push([nx, ny]);
                                }
                            }
                        }
                        const bw = maxX - minX + 1, bh = maxY - minY + 1;
                        const aspect = bw / bh;
                        if (bw > 20 && bh > 15 && Math.abs(aspect - 1.593) < 0.5) {
                            if (!best || (bw * bh > best.w * best.h)) best = { x: minX * step, y: minY * step, w: bw * step, h: bh * step };
                        }
                    }
                }
            }

            if (best) {
                stableCount++;
                ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 4; ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 12;
                ctx.strokeRect(best.x, best.y, best.w, best.h); ctx.shadowBlur = 0;
                statusDiv.textContent = '✅ Карта найдена!';
                if (stableCount >= STABLE_THRESHOLD) {
                    scale = best.w / 86; // 86 мм ширина карты
                    onCalibrated();
                    return;
                }
            } else {
                stableCount = 0;
                // Рамка-подсказка
                const fw = canvas.width * 0.5, fh = fw / 1.593;
                const fx = (canvas.width - fw) / 2, fy = (canvas.height - fh) / 2;
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0, 0, canvas.width, fy); ctx.fillRect(0, fy + fh, canvas.width, canvas.height - fy - fh);
                ctx.fillRect(0, fy, fx, fh); ctx.fillRect(fx + fw, fy, canvas.width - fx - fw, fh);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.setLineDash([8, 4]); ctx.strokeRect(fx, fy, fw, fh); ctx.setLineDash([]);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 14px system-ui'; ctx.textAlign = 'center';
                ctx.fillText('Поместите карту', canvas.width / 2, fy - 10);
                statusDiv.textContent = 'Поместите карту в рамку.';
            }
            calibrationFrameId = requestAnimationFrame(detectCardLoop);
        }

        function captureCalibration() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            scale = canvas.width / 500; // запасной вариант
            onCalibrated();
        }

        function onCalibrated() {
            if (calibrationFrameId) { cancelAnimationFrame(calibrationFrameId); calibrationFrameId = null; }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Создаём измерительную рамку по центру
            const fw = canvas.width * 0.6, fh = canvas.height * 0.5;
            frame = {
                x: (canvas.width - fw) / 2,
                y: (canvas.height - fh) / 2,
                w: fw,
                h: fh
            };
            
            currentStep = 'framing';
            statusDiv.textContent = '📐 Растяните рамку по углам стены.';
            statusDiv.className = 'status-bar ready';
            
            // Меняем кнопки: "Готово" и "Сброс"
            actionArea.innerHTML = `
                <button class="btn secondary" onclick="resetFrame()">↺ Сброс</button>
                <button class="btn" id="actionBtn" onclick="handleAction()">✓ Завершить</button>
            `;
            
            drawFrame();
            canvas.addEventListener('touchstart', onTouchStart, { passive: false });
            canvas.addEventListener('touchmove', onTouchMove, { passive: false });
            canvas.addEventListener('touchend', onTouchEnd);
        }

        // ═══════════════════════════════════════
        // ИЗМЕРИТЕЛЬНАЯ РАМКА
        // ═══════════════════════════════════════
        function drawFrame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!frame) return;
            
            const { x, y, w, h } = frame;
            
            // Затемнение
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0, 0, canvas.width, y);
            ctx.fillRect(0, y + h, canvas.width, canvas.height - y - h);
            ctx.fillRect(0, y, x, h);
            ctx.fillRect(x + w, y, canvas.width - x - w, h);
            
            // Рамка
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3; ctx.setLineDash([]);
            ctx.strokeRect(x, y, w, h);
            
            // Угловые маркеры
            const hs = HANDLE_SIZE;
            const handles = [
                { cx: x, cy: y, id: 'tl' },
                { cx: x + w, cy: y, id: 'tr' },
                { cx: x, cy: y + h, id: 'bl' },
                { cx: x + w, cy: y + h, id: 'br' }
            ];
            
            handles.forEach(h => {
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(h.cx, h.cy, hs / 2, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
            });
            
            // Размеры в реальном времени
            if (scale) {
                const widthCm = (w / scale / 10).toFixed(1);
                const heightCm = (h / scale / 10).toFixed(1);
                const areaM2 = ((w / scale / 1000) * (h / scale / 1000)).toFixed(2);
                
                ctx.fillStyle = '#fff'; ctx.font = 'bold 14px system-ui'; ctx.textAlign = 'center';
                ctx.fillText(`${widthCm} см`, x + w / 2, y - 8);
                ctx.fillText(`${heightCm} см`, x - 10, y + h / 2);
                
                // Площадь в центре рамки
                ctx.fillStyle = 'rgba(0,0,0,0.7)'; 
                const textW = ctx.measureText(`${areaM2} м²`).width + 16;
                ctx.fillRect(x + w / 2 - textW / 2, y + h / 2 - 12, textW, 24);
                ctx.fillStyle = '#fff';
                ctx.fillText(`${areaM2} м²`, x + w / 2, y + h / 2 + 6);
            }
        }

        function getHandle(x, y) {
            if (!frame) return null;
            const hs = HANDLE_SIZE;
            const handles = [
                { cx: frame.x, cy: frame.y, id: 'tl' },
                { cx: frame.x + frame.w, cy: frame.y, id: 'tr' },
                { cx: frame.x, cy: frame.y + frame.h, id: 'bl' },
                { cx: frame.x + frame.w, cy: frame.y + frame.h, id: 'br' }
            ];
            for (let h of handles) {
                if (Math.hypot(x - h.cx, y - h.cy) < hs) return h.id;
            }
            if (x > frame.x && x < frame.x + frame.w && y > frame.y && y < frame.y + frame.h) return 'move';
            return null;
        }

        function onTouchStart(e) {
            e.preventDefault();
            if (!frame || currentStep !== 'framing') return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const sx = touch.clientX - rect.left;
            const sy = touch.clientY - rect.top;
            dragging = getHandle(sx, sy);
            if (dragging) {
                dragStart = { x: sx, y: sy };
                frameStart = { ...frame };
            }
        }

        function onTouchMove(e) {
            e.preventDefault();
            if (!dragging || !frame) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const cx = touch.clientX - rect.left;
            const cy = touch.clientY - rect.top;
            const dx = cx - dragStart.x;
            const dy = cy - dragStart.y;
            
            const MIN_SIZE = 80;
            
            if (dragging === 'move') {
                frame.x = Math.max(0, Math.min(canvas.width - frame.w, frameStart.x + dx));
                frame.y = Math.max(0, Math.min(canvas.height - frame.h, frameStart.y + dy));
            } else if (dragging === 'tl') {
                frame.x = Math.max(0, Math.min(frameStart.x + frameStart.w - MIN_SIZE, frameStart.x + dx));
                frame.y = Math.max(0, Math.min(frameStart.y + frameStart.h - MIN_SIZE, frameStart.y + dy));
                frame.w = frameStart.x + frameStart.w - frame.x;
                frame.h = frameStart.y + frameStart.h - frame.y;
            } else if (dragging === 'tr') {
                frame.w = Math.max(MIN_SIZE, frameStart.w + dx);
                frame.y = Math.max(0, Math.min(frameStart.y + frameStart.h - MIN_SIZE, frameStart.y + dy));
                frame.h = frameStart.y + frameStart.h - frame.y;
            } else if (dragging === 'bl') {
                frame.x = Math.max(0, Math.min(frameStart.x + frameStart.w - MIN_SIZE, frameStart.x + dx));
                frame.w = frameStart.x + frameStart.w - frame.x;
                frame.h = Math.max(MIN_SIZE, frameStart.h + dy);
            } else if (dragging === 'br') {
                frame.w = Math.max(MIN_SIZE, frameStart.w + dx);
                frame.h = Math.max(MIN_SIZE, frameStart.h + dy);
            }
            drawFrame();
        }

        function onTouchEnd(e) {
            e.preventDefault();
            dragging = null;
        }

        function resetFrame() {
            const fw = canvas.width * 0.6, fh = canvas.height * 0.5;
            frame = {
                x: (canvas.width - fw) / 2,
                y: (canvas.height - fh) / 2,
                w: fw,
                h: fh
            };
            drawFrame();
        }

        function finishFraming() {
            canvas.removeEventListener('touchstart', onTouchStart);
            canvas.removeEventListener('touchmove', onTouchMove);
            canvas.removeEventListener('touchend', onTouchEnd);
            
            // Расчёт реальных размеров
            const lengthM = (frame.w / scale / 1000);
            const heightM = (frame.h / scale / 1000);
            const area = lengthM * heightM;
            
            document.getElementById('resLength').textContent = lengthM.toFixed(2) + ' м';
            document.getElementById('resHeight').textContent = heightM.toFixed(2) + ' м';
            document.getElementById('resArea').textContent = area.toFixed(2) + ' м²';
            document.getElementById('resLux').textContent = currentLux ? currentLux + ' люкс' : 'нет данных';
            document.getElementById('resRAL').textContent = 'RAL 9010 (похож)';
            document.getElementById('resTip').textContent = area > 12
                ? '👍 Просторная стена. Поместится диван 3 м и шкаф 1.8 м.'
                : '⚠️ Компактная стена. Рекомендуем мебель не длиннее 2 м.';
            
            resultsDiv.classList.add('visible');
            currentStep = 'done';
            statusDiv.textContent = 'Замер выполнен!';
            statusDiv.className = 'status-bar';
            actionArea.innerHTML = `<button class="btn secondary" id="actionBtn" onclick="handleAction()">Замерить заново</button>`;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function resetAll() {
            if (calibrationFrameId) { cancelAnimationFrame(calibrationFrameId); calibrationFrameId = null; }
            canvas.removeEventListener('touchstart', onTouchStart);
            canvas.removeEventListener('touchmove', onTouchMove);
            canvas.removeEventListener('touchend', onTouchEnd);
            scale = null; frame = null; dragging = null;
            currentStep = 'ready';
            statusDiv.textContent = 'Камера готова. Откалибруйте по карте.';
            statusDiv.className = 'status-bar ready';
            actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">Откалибровать</button>`;
            resultsDiv.classList.remove('visible');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // ═══════════════════════════════════════
        // ОЧИСТКА
        // ═══════════════════════════════════════
        window.addEventListener('beforeunload', () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (ambientSensor) ambientSensor.stop();
            if (calibrationFrameId) cancelAnimationFrame(calibrationFrameId);
        });

        document.addEventListener('dblclick', () => {
            if (document.fullscreenElement) document.exitFullscreen();
            else document.body.requestFullscreen().catch(() => {});
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>FreePDFShoot – Приватный PDF-сканер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        .viewfinder { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1; }
        .viewfinder video, .viewfinder canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .viewfinder canvas { z-index: 2; }
        .ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; }
        .ui-overlay > * { pointer-events: auto; }
        .header { position: absolute; top: 12px; left: 0; right: 0; text-align: center; z-index: 11; }
        .header h1 { font-size: 1.2rem; font-weight: 600; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.7); margin: 0; }
        .header .sub { font-size: 0.7rem; color: rgba(255,255,255,0.7); text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
        .page-counter { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.6); color: #fff; font-size: 0.8rem; padding: 5px 12px; border-radius: 20px; z-index: 12; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.15); }
        .status-bar { text-align: center; padding: 0 20px 8px; font-size: 0.85rem; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); min-height: 24px; transition: color 0.3s; }
        .status-bar.ready { color: #4caf50; font-weight: 500; }
        .status-bar.error { color: #ff6b6b; font-weight: 500; }
        .action-area { padding: 0 16px 20px; display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { display: block; flex: 1; min-width: 80px; padding: 14px; font-size: 0.9rem; font-weight: 600; border: none; border-radius: 14px; cursor: pointer; background: #2a6df4; color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.3); transition: 0.2s; text-align: center; }
        .btn:active { opacity: 0.85; }
        .btn:disabled { background: rgba(58,58,58,0.8); color: #999; cursor: not-allowed; }
        .btn.secondary { background: rgba(51,51,51,0.85); color: #ccc; flex: 0.5; }
        .btn.danger { background: rgba(180,40,40,0.85); color: #fff; flex: 0.5; }
        .btn.accent { background: #8e44ad; color: #fff; flex: 0.5; }
        .results { padding: 12px 16px; display: none; background: rgba(20,20,20,0.9); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.1); border-radius: 16px 16px 0 0; margin: 0 8px; }
        .results.visible { display: block; }
        .results .tip { font-size: 0.85rem; color: #ddd; background: rgba(255,255,255,0.06); padding: 10px; border-radius: 8px; line-height: 1.4; text-align: center; }
    </style>
</head>
<body>

<div class="viewfinder" id="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<div class="ui-overlay">
    <div class="header">
        <h1>FreePDFShoot</h1>
        <div class="sub">Бесплатный • Приватный • Без серверов</div>
    </div>
    <div class="page-counter" id="pageCounter">Страниц: 0</div>
    <div class="status-bar" id="status">Нажмите «Включить камеру»</div>
    <div class="action-area" id="actionArea">
        <button class="btn" id="actionBtn" onclick="handleAction()">Включить камеру</button>
    </div>
    <div class="results" id="results">
        <div class="tip" id="resTip"></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('status');
    const actionArea = document.getElementById('actionArea');
    const resultsDiv = document.getElementById('results');
    const pageCounter = document.getElementById('pageCounter');

    let stream, currentStep = 'idle';
    let savedPages = [];
    
    let frozenImageData = null;
    let corners = null;
    let draggingCorner = -1;
    const HANDLE_SIZE = 44;

    // Зум-линза
    let lensActive = false;
    let lensX = 0, lensY = 0;
    const LENS_RADIUS = 100;
    let lensMode = 'full'; // 'full' (весь документ) или 'fragment' (фрагмент)

    function handleAction() {
        switch (currentStep) {
            case 'idle': startCamera(); break;
            case 'ready': freezeFrame(); break;
            case 'framing': savePage(); break;
            case 'saved': resetToNewFrame(); break;
        }
    }

    async function startCamera() {
        statusDiv.textContent = 'Запрашиваю камеру...';
        const configs = [
            { video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } },
            { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } },
            { video: { facingMode: 'environment' } },
            { video: true }
        ];
        for (let c of configs) {
            try {
                stream = await navigator.mediaDevices.getUserMedia(c);
                video.srcObject = stream;
                await video.play();
                canvas.width = video.videoWidth || canvas.clientWidth;
                canvas.height = video.videoHeight || canvas.clientHeight;
                
                statusDiv.textContent = 'Наведите камеру на документ и нажмите «Снять».';
                statusDiv.className = 'status-bar ready';
                actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять документ</button>`;
                currentStep = 'ready';
                updatePageCounter();
                return;
            } catch (err) { if (err.name === 'NotAllowedError') break; }
        }
        statusDiv.textContent = 'Ошибка доступа к камере.';
        statusDiv.className = 'status-bar error';
        actionArea.innerHTML = `<button class="btn" id="actionBtn" onclick="handleAction()">Попробовать снова</button>`;
    }

    function freezeFrame() {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        frozenImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        const marginX = canvas.width * 0.15;
        const marginY = canvas.height * 0.15;
        corners = [
            { x: marginX, y: marginY },
            { x: canvas.width - marginX, y: marginY },
            { x: canvas.width - marginX, y: canvas.height - marginY },
            { x: marginX, y: canvas.height - marginY }
        ];
        
        lensActive = false;
        lensMode = 'full';
        
        currentStep = 'framing';
        statusDiv.textContent = '📐 Расставьте маркеры. Двойной тап — лупа.';
        statusDiv.className = 'status-bar ready';
        actionArea.innerHTML = `
            <button class="btn secondary" onclick="resetCorners()">↺ Сброс</button>
            <button class="btn accent" onclick="setFragmentMode()">🔍 Фрагмент</button>
            <button class="btn" id="actionBtn" onclick="handleAction()">✓ Сохранить</button>
        `;
        
        canvas.addEventListener('touchstart', onTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onTouchMove, { passive: false });
        canvas.addEventListener('touchend', onTouchEnd);
        canvas.addEventListener('dblclick', onDoubleTap);
        drawFrozenScene();
    }

    function setFragmentMode() {
        lensMode = lensMode === 'full' ? 'fragment' : 'full';
        const btn = document.querySelector('.btn.accent');
        if (btn) btn.textContent = lensMode === 'full' ? '🔍 Фрагмент' : '📄 Весь документ';
        statusDiv.textContent = lensMode === 'full' 
            ? '📐 Режим: весь документ.' 
            : '🔍 Режим: фрагмент. Наведите лупу и сохраните.';
    }

    function drawFrozenScene() {
        if (!frozenImageData) return;
        ctx.putImageData(frozenImageData, 0, 0);
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (!corners) return;
        
        if (lensMode === 'full') {
            const [TL, TR, BR, BL] = corners;
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(TL.x, TL.y);
            ctx.lineTo(TR.x, TR.y);
            ctx.lineTo(BR.x, BR.y);
            ctx.lineTo(BL.x, BL.y);
            ctx.closePath();
            ctx.clip();
            ctx.putImageData(frozenImageData, 0, 0);
            ctx.restore();
            
            ctx.strokeStyle = '#2a6df4';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(TL.x, TL.y);
            ctx.lineTo(TR.x, TR.y);
            ctx.lineTo(BR.x, BR.y);
            ctx.lineTo(BL.x, BL.y);
            ctx.closePath();
            ctx.stroke();
            
            corners.forEach((c, i) => {
                ctx.fillStyle = '#2a6df4';
                ctx.beginPath();
                ctx.arc(c.x, c.y, HANDLE_SIZE / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText(i + 1, c.x, c.y + 5);
            });
        }
        
        if (lensActive) {
            // Рисуем линзу
            ctx.save();
            ctx.beginPath();
            ctx.arc(lensX, lensY, LENS_RADIUS, 0, Math.PI * 2);
            ctx.clip();
            // Увеличенное изображение под линзой
            const zoomFactor = 2.5;
            const srcW = LENS_RADIUS * 2 / zoomFactor;
            const srcH = LENS_RADIUS * 2 / zoomFactor;
            ctx.drawImage(
                canvas,
                lensX - srcW / 2, lensY - srcH / 2, srcW, srcH,
                lensX - LENS_RADIUS, lensY - LENS_RADIUS, LENS_RADIUS * 2, LENS_RADIUS * 2
            );
            ctx.restore();
            
            // Ободок линзы
            ctx.beginPath();
            ctx.arc(lensX, lensY, LENS_RADIUS, 0, Math.PI * 2);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            // Если режим фрагмента — подсветка
            if (lensMode === 'fragment') {
                ctx.strokeStyle = '#8e44ad';
                ctx.lineWidth = 4;
                ctx.setLineDash([6, 3]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }
    }

    // ── TOUCH ──
    function onTouchStart(e) {
        if (currentStep !== 'framing') return;
        e.preventDefault(); e.stopPropagation();
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const sx = (touch.clientX - rect.left) * (canvas.width / rect.width);
        const sy = (touch.clientY - rect.top) * (canvas.height / rect.height);
        
        // Если лупа активна — обновляем её позицию
        if (lensActive) {
            lensX = sx;
            lensY = sy;
            drawFrozenScene();
            return;
        }
        
        if (!corners) return;
        for (let i = 0; i < corners.length; i++) {
            if (Math.hypot(sx - corners[i].x, sy - corners[i].y) < HANDLE_SIZE * 1.2) {
                draggingCorner = i;
                return;
            }
        }
    }

    function onTouchMove(e) {
        if (currentStep !== 'framing') return;
        e.preventDefault(); e.stopPropagation();
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const cx = (touch.clientX - rect.left) * (canvas.width / rect.width);
        const cy = (touch.clientY - rect.top) * (canvas.height / rect.height);
        
        if (lensActive) {
            lensX = cx;
            lensY = cy;
            drawFrozenScene();
            return;
        }
        
        if (draggingCorner < 0 || !corners) return;
        corners[draggingCorner].x = Math.max(0, Math.min(canvas.width, cx));
        corners[draggingCorner].y = Math.max(0, Math.min(canvas.height, cy));
        drawFrozenScene();
    }

    function onTouchEnd(e) { draggingCorner = -1; }

    function onDoubleTap(e) {
        if (currentStep !== 'framing') return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const sx = (e.clientX - rect.left) * (canvas.width / rect.width);
        const sy = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        lensActive = !lensActive;
        if (lensActive) {
            lensX = sx;
            lensY = sy;
            statusDiv.textContent = '🔍 Лупа активна. Двигайте пальцем. Двойной тап — выключить.';
        } else {
            statusDiv.textContent = '📐 Лупа выключена.';
        }
        drawFrozenScene();
    }

    function resetCorners() {
        const marginX = canvas.width * 0.15;
        const marginY = canvas.height * 0.15;
        corners = [
            { x: marginX, y: marginY },
            { x: canvas.width - marginX, y: marginY },
            { x: canvas.width - marginX, y: canvas.height - marginY },
            { x: marginX, y: canvas.height - marginY }
        ];
        lensActive = false;
        lensMode = 'full';
        drawFrozenScene();
    }

    // ── СОХРАНЕНИЕ ──
    function savePage() {
        if (currentStep !== 'framing') return;
        currentStep = 'saving';
        
        canvas.removeEventListener('touchstart', onTouchStart);
        canvas.removeEventListener('touchmove', onTouchMove);
        canvas.removeEventListener('touchend', onTouchEnd);
        canvas.removeEventListener('dblclick', onDoubleTap);
        
        let rectified;
        
        if (lensMode === 'fragment' && lensActive) {
            // Сохраняем фрагмент вокруг линзы
            const fragCorners = [
                { x: lensX - LENS_RADIUS, y: lensY - LENS_RADIUS },
                { x: lensX + LENS_RADIUS, y: lensY - LENS_RADIUS },
                { x: lensX + LENS_RADIUS, y: lensY + LENS_RADIUS },
                { x: lensX - LENS_RADIUS, y: lensY + LENS_RADIUS }
            ];
            rectified = rectifyDocument(fragCorners, frozenImageData);
        } else {
            rectified = rectifyDocument(corners, frozenImageData);
        }
        
        if (!rectified) {
            statusDiv.textContent = 'Ошибка обработки. Попробуйте другой ракурс.';
            statusDiv.className = 'status-bar error';
            currentStep = 'framing';
            return;
        }
        
        rectified.toBlob(blob => {
            savedPages.push(blob);
            updatePageCounter();
            
            currentStep = 'saved';
            statusDiv.textContent = '✅ Страница сохранена!';
            statusDiv.className = 'status-bar ready';
            
            actionArea.innerHTML = `
                <button class="btn secondary" onclick="resetToNewFrame()">📸 Снять ещё</button>
                <button class="btn danger" onclick="removeLastPage()">🗑 Удалить посл.</button>
                <button class="btn" onclick="printAllPages()">🖨 PDF (${savedPages.length} стр.)</button>
            `;
            
            resultsDiv.classList.add('visible');
            document.getElementById('resTip').textContent = 
                'Страница выпрямлена и сохранена в памяти браузера. Никуда не передаётся.';
        }, 'image/jpeg', 0.95);
    }

    function rectifyDocument(corners, imageData) {
        const srcPoints = corners;
        const TL = corners[0], TR = corners[1], BR = corners[2], BL = corners[3];
        const topLen = Math.hypot(TR.x - TL.x, TR.y - TL.y);
        const bottomLen = Math.hypot(BR.x - BL.x, BR.y - BL.y);
        const leftLen = Math.hypot(BL.x - TL.x, BL.y - TL.y);
        const rightLen = Math.hypot(BR.x - TR.x, BR.y - TR.y);
        
        const outW = Math.round(Math.max(topLen, bottomLen));
        const outH = Math.round(Math.max(leftLen, rightLen));
        
        const maxDim = 4000;
        let scale = 1;
        if (Math.max(outW, outH) > maxDim) {
            scale = maxDim / Math.max(outW, outH);
        }
        
        const finalW = Math.round(outW * scale);
        const finalH = Math.round(outH * scale);
        
        const dstPoints = [
            { x: 0, y: 0 },
            { x: finalW, y: 0 },
            { x: finalW, y: finalH },
            { x: 0, y: finalH }
        ];
        
        const H = computeHomography(srcPoints, dstPoints);
        if (!H) return null;
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = finalW;
        tempCanvas.height = finalH;
        const tempCtx = tempCanvas.getContext('2d');
        
        const H_inv = invertHomography(H);
        if (!H_inv) return null;
        
        const imgData = tempCtx.createImageData(finalW, finalH);
        for (let y = 0; y < finalH; y++) {
            for (let x = 0; x < finalW; x++) {
                const src = applyHomography(H_inv, x, y);
                const sx = Math.round(src.x);
                const sy = Math.round(src.y);
                
                if (sx >= 0 && sx < canvas.width && sy >= 0 && sy < canvas.height) {
                    const srcIdx = (sy * canvas.width + sx) * 4;
                    const dstIdx = (y * finalW + x) * 4;
                    imgData.data[dstIdx] = imageData.data[srcIdx];
                    imgData.data[dstIdx + 1] = imageData.data[srcIdx + 1];
                    imgData.data[dstIdx + 2] = imageData.data[srcIdx + 2];
                    imgData.data[dstIdx + 3] = 255;
                }
            }
        }
        tempCtx.putImageData(imgData, 0, 0);
        
        return enhanceContrast(tempCanvas);
    }

    function enhanceContrast(canvas) {
        const ctx = canvas.getContext('2d');
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        
        let min = 255, max = 0;
        for (let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i+1], b = data[i+2];
            if (r === 0 && g === 0 && b === 0) continue;
            const gray = r * 0.299 + g * 0.587 + b * 0.114;
            if (gray < min) min = gray;
            if (gray > max) max = gray;
        }
        
        if (max <= min) return canvas;
        
        const range = max - min;
        const outMin = Math.max(0, min - range * 0.05);
        const outMax = Math.min(255, max + range * 0.05);
        const outRange = outMax - outMin;
        
        for (let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i+1], b = data[i+2];
            if (r === 0 && g === 0 && b === 0) continue;
            data[i] = ((r - min) / range) * outRange + outMin;
            data[i+1] = ((g - min) / range) * outRange + outMin;
            data[i+2] = ((b - min) / range) * outRange + outMin;
        }
        ctx.putImageData(imgData, 0, 0);
        
        return canvas;
    }

    // ── ГОМОГРАФИЯ ──
    function computeHomography(srcPoints, dstPoints) {
        const A = [];
        const b = [];
        for (let i = 0; i < 4; i++) {
            const sx = srcPoints[i].x, sy = srcPoints[i].y;
            const dx = dstPoints[i].x, dy = dstPoints[i].y;
            A.push([sx, sy, 1, 0, 0, 0, -dx * sx, -dx * sy]);
            b.push(dx);
            A.push([0, 0, 0, sx, sy, 1, -dy * sx, -dy * sy]);
            b.push(dy);
        }
        const n = 8;
        const aug = A.map((row, i) => [...row, b[i]]);
        for (let col = 0; col < n; col++) {
            let maxRow = col;
            for (let row = col + 1; row < n; row++)
                if (Math.abs(aug[row][col]) > Math.abs(aug[maxRow][col])) maxRow = row;
            [aug[col], aug[maxRow]] = [aug[maxRow], aug[col]];
            if (Math.abs(aug[col][col]) < 1e-12) return null;
            for (let j = col; j <= n; j++) aug[col][j] /= aug[col][col];
            for (let row = 0; row < n; row++) {
                if (row === col) continue;
                const factor = aug[row][col];
                for (let j = col; j <= n; j++) aug[row][j] -= factor * aug[col][j];
            }
        }
        const h = aug.map(row => row[8]);
        return [h[0], h[1], h[2], h[3], h[4], h[5], h[6], h[7], 1];
    }

    function invertHomography(H) {
        const [a, b, c, d, e, f, g, h, i] = H;
        const det = a * (e * i - f * h) - b * (d * i - f * g) + c * (d * h - e * g);
        if (Math.abs(det) < 1e-12) return null;
        const invDet = 1 / det;
        return [
            (e * i - f * h) * invDet, (c * h - b * i) * invDet, (b * f - c * e) * invDet,
            (f * g - d * i) * invDet, (a * i - c * g) * invDet, (c * d - a * f) * invDet,
            (d * h - e * g) * invDet, (b * g - a * h) * invDet, (a * e - b * d) * invDet
        ];
    }

    function applyHomography(H, x, y) {
        const denom = H[6] * x + H[7] * y + H[8];
        return {
            x: (H[0] * x + H[1] * y + H[2]) / denom,
            y: (H[3] * x + H[4] * y + H[5]) / denom
        };
    }

    // ── МНОГОСТРАНИЧНОСТЬ ──
    function updatePageCounter() {
        pageCounter.textContent = `Страниц: ${savedPages.length}`;
    }

    function removeLastPage() {
        if (savedPages.length === 0) return;
        savedPages.pop();
        updatePageCounter();
        if (savedPages.length === 0) { resultsDiv.classList.remove('visible'); resetToNewFrame(); }
        else {
            statusDiv.textContent = '🗑 Последняя страница удалена.';
            actionArea.innerHTML = `
                <button class="btn secondary" onclick="resetToNewFrame()">📸 Снять ещё</button>
                <button class="btn danger" onclick="removeLastPage()">🗑 Удалить посл.</button>
                <button class="btn" onclick="printAllPages()">🖨 PDF (${savedPages.length} стр.)</button>
            `;
        }
    }

    function resetToNewFrame() {
        canvas.removeEventListener('touchstart', onTouchStart);
        canvas.removeEventListener('touchmove', onTouchMove);
        canvas.removeEventListener('touchend', onTouchEnd);
        canvas.removeEventListener('dblclick', onDoubleTap);
        frozenImageData = null;
        corners = null;
        draggingCorner = -1;
        lensActive = false;
        lensMode = 'full';
        resultsDiv.classList.remove('visible');
        currentStep = 'ready';
        statusDiv.textContent = 'Наведите камеру на документ и нажмите «Снять».';
        statusDiv.className = 'status-bar ready';
        actionArea.innerHTML = `
            <button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять документ</button>
            ${savedPages.length > 0 ? `<button class="btn secondary" onclick="printAllPages()">🖨 PDF (${savedPages.length})</button>` : ''}
        `;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (video.paused) video.play();
    }

    function printAllPages() {
        if (savedPages.length === 0) {
            statusDiv.textContent = 'Нет сохранённых страниц.';
            statusDiv.className = 'status-bar error';
            return;
        }
        const printWindow = window.open('', '_blank', 'width=800,height=600');
        printWindow.document.write(`
            <html><head><title>FreePDFShoot – Документ</title>
            <style>
                body { margin: 0; padding: 0; font-family: sans-serif; }
                img { width: 100%; max-height: 100vh; object-fit: contain; page-break-after: always; display: block; }
                img:last-child { page-break-after: auto; }
                @media print { img { max-height: none; height: auto; } }
            </style></head>
            <body>${savedPages.map(blob => `<img src="${URL.createObjectURL(blob)}">`).join('\n')}</body></html>
        `);
        printWindow.document.close();
        setTimeout(() => printWindow.print(), 500);
        statusDiv.textContent = '🖨 Документ отправлен на печать.';
        statusDiv.className = 'status-bar ready';
    }

    window.addEventListener('beforeunload', () => {
        if (stream) stream.getTracks().forEach(t => t.stop());
        savedPages.forEach(blob => URL.revokeObjectURL(blob));
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/freepdfshoot/manifest.json">
    <title>FreePDFShoot – Приватный скан документов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: system-ui, -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        .viewfinder { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1; display: flex; align-items: center; justify-content: center; }
        .viewfinder canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        .ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; }
        .ui-overlay > * { pointer-events: auto; }
        .header { position: absolute; top: 12px; left: 0; right: 0; text-align: center; z-index: 11; }
        .header h1 { font-size: 1.2rem; font-weight: 600; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.7); margin: 0; }
        .header .sub { font-size: 0.7rem; color: rgba(255,255,255,0.7); text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
        .page-counter { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.6); color: #fff; font-size: 0.8rem; padding: 5px 12px; border-radius: 20px; z-index: 12; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.15); }
        .status-bar { text-align: center; padding: 0 20px 8px; font-size: 0.85rem; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); min-height: 24px; }
        .status-bar.ready { color: #4caf50; font-weight: 500; }
        .status-bar.error { color: #ff6b6b; font-weight: 500; }
        .status-bar.hidden { display: none; }
        .action-area { position: fixed; bottom: 0; left: 0; right: 0; z-index: 15; padding: 0 16px 20px; display: flex; gap: 8px; flex-wrap: wrap; pointer-events: auto; background: rgba(0,0,0,0.5); }
        .action-area.transparent { background: rgba(0,0,0,0.3); }
        .btn { display: block; flex: 1; min-width: 55px; padding: 12px; font-size: 0.8rem; font-weight: 600; border: none; border-radius: 14px; cursor: pointer; background: #2a6df4; color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.3); transition: 0.2s; text-align: center; }
        .btn:active { opacity: 0.85; }
        .btn:disabled { background: rgba(58,58,58,0.8); color: #999; cursor: not-allowed; }
        .btn.secondary { background: rgba(51,51,51,0.85); color: #ccc; flex: 0.5; }
        .btn.danger { background: rgba(180,40,40,0.85); color: #fff; flex: 0.5; }
        .btn.save { background: #4caf50; color: #fff; flex: 0.5; }
        .results { padding: 12px 16px; display: none; background: rgba(20,20,20,0.9); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.1); border-radius: 16px 16px 0 0; margin: 0 8px; }
        .results.visible { display: block; }
        .results .tip { font-size: 0.85rem; color: #ddd; background: rgba(255,255,255,0.06); padding: 10px; border-radius: 8px; line-height: 1.4; text-align: center; }
        .progress-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 20; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .progress-overlay.visible { display: flex; }
        .progress-text { color: #fff; font-size: 1rem; margin-bottom: 12px; }
        .progress-bar { width: 200px; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: #2a6df4; transition: width 0.3s; }
    </style>
</head>
<body>
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" onchange="onSystemPhoto(event)">
<div class="viewfinder"><canvas id="canvas"></canvas></div>
<div class="progress-overlay" id="progressOverlay">
    <div class="progress-text" id="progressText">Создаю PDF...</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>
<div class="ui-overlay">
    <div class="header"><h1>FreePDFShoot</h1><div class="sub">Бесплатный • Приватный • Без серверов</div></div>
    <div class="page-counter" id="pageCounter">Страниц: 0</div>
    <div class="status-bar" id="status">Нажмите «Снять» для запуска камеры</div>
    <div class="results" id="results"><div class="tip" id="resTip"></div></div>
</div>
<div class="action-area" id="actionArea"><button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять</button></div>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('status');
    const actionArea = document.getElementById('actionArea');
    const resultsDiv = document.getElementById('results');
    const pageCounter = document.getElementById('pageCounter');
    const cameraInput = document.getElementById('cameraInput');
    const progressOverlay = document.getElementById('progressOverlay');
    const progressText = document.getElementById('progressText');
    const progressFill = document.getElementById('progressFill');

    let currentStep = 'ready';
    let savedPages = [];
    let frozenImageData = null;
    let corners = null;
    let draggingCorner = -1;
    const HANDLE_SIZE = 44;
    let originalImage = null;
    let displayScale = 1;
    let framingZoom = 1;
    let framingPanX = 0, framingPanY = 0;
    let lastPinchDist = 0;
    let lastPinchMidX = 0, lastPinchMidY = 0;

    function handleAction() {
        if (currentStep === 'saving' || currentStep === 'generating') return;
        switch (currentStep) {
            case 'ready': cameraInput.click(); break;
            case 'framing': cropAndSave(); break;
            case 'saved': cameraInput.click(); break;
        }
    }

    function onSystemPhoto(event) {
        const file = event.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
            URL.revokeObjectURL(url);
            originalImage = img;
            const MAX_DIM = 1500;
            displayScale = 1;
            if (img.naturalWidth > MAX_DIM || img.naturalHeight > MAX_DIM) {
                displayScale = MAX_DIM / Math.max(img.naturalWidth, img.naturalHeight);
            }
            canvas.width = Math.round(img.naturalWidth * displayScale);
            canvas.height = Math.round(img.naturalHeight * displayScale);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            frozenImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const mX = canvas.width * 0.1, mY = canvas.height * 0.1;
            corners = [
                {x:mX, y:mY}, {x:canvas.width - mX, y:mY},
                {x:canvas.width - mX, y:canvas.height - mY}, {x:mX, y:canvas.height - mY}
            ];
            draggingCorner = -1;
            framingZoom = 1; framingPanX = 0; framingPanY = 0;
            currentStep = 'framing';
            statusDiv.classList.add('hidden');
            updateUI();
            bindFramingEvents();
            drawFrozenScene();
        };
        img.src = url;
        cameraInput.value = '';
    }

    function resetToReady() {
        unbindFramingEvents();
        frozenImageData = null;
        originalImage = null;
        corners = null;
        draggingCorner = -1;
        framingZoom = 1; framingPanX = 0; framingPanY = 0;
        resultsDiv.classList.remove('visible');
        currentStep = 'ready';
        statusDiv.textContent = 'Нажмите «Снять» для запуска камеры';
        statusDiv.className = 'status-bar ready';
        statusDiv.classList.remove('hidden');
        updateUI();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function updateUI() {
        actionArea.classList.remove('transparent');
        switch (currentStep) {
            case 'ready':
                statusDiv.classList.remove('hidden');
                actionArea.innerHTML = `
                    <button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять</button>
                    ${savedPages.length > 0 ? `
                        <button class="btn secondary" onclick="sharePDF()">📤 Отправить (${savedPages.length})</button>
                        <button class="btn save" onclick="savePDF()">💾 Сохранить</button>
                        <button class="btn danger" onclick="clearAllPages()">🗑 Всё</button>
                    ` : ''}
                `;
                break;
            case 'framing':
                statusDiv.classList.add('hidden');
                actionArea.classList.add('transparent');
                actionArea.innerHTML = `
                    <button class="btn secondary" onclick="resetCrop()">↺ Сброс</button>
                    <button class="btn" id="actionBtn" onclick="handleAction()">✂️ Обрезать</button>
                `;
                break;
            case 'saving':
                statusDiv.classList.remove('hidden');
                statusDiv.textContent = '⏳ Сохраняю...';
                actionArea.innerHTML = `<button class="btn" disabled>⏳ Сохраняю...</button>`;
                break;
            case 'saved':
                statusDiv.classList.remove('hidden');
                statusDiv.textContent = '✅ Страница сохранена!';
                statusDiv.className = 'status-bar ready';
                actionArea.innerHTML = `
                    <button class="btn" id="actionBtn" onclick="handleAction()">📸 Снять ещё</button>
                    <button class="btn danger" onclick="removeLastPage()">🗑</button>
                    <button class="btn save" onclick="savePDF()">💾 Сохранить</button>
                    <button class="btn secondary" onclick="sharePDF()">📤 Отправить (${savedPages.length})</button>
                `;
                break;
            case 'generating':
                statusDiv.classList.remove('hidden');
                statusDiv.textContent = '⏳ Создаю PDF...';
                actionArea.innerHTML = `<button class="btn" disabled>⏳ Создаю PDF...</button>`;
                break;
        }
    }

    function bindFramingEvents() {
        canvas.style.touchAction = 'none';
        canvas.addEventListener('touchstart', onFramingTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onFramingTouchMove, { passive: false });
        canvas.addEventListener('touchend', onFramingTouchEnd);
    }
    function unbindFramingEvents() {
        canvas.style.touchAction = '';
        canvas.removeEventListener('touchstart', onFramingTouchStart);
        canvas.removeEventListener('touchmove', onFramingTouchMove);
        canvas.removeEventListener('touchend', onFramingTouchEnd);
    }

    function drawFrozenScene() {
        if (!frozenImageData) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(canvas.width/2 + framingPanX, canvas.height/2 + framingPanY);
        ctx.scale(framingZoom, framingZoom);
        ctx.translate(-canvas.width/2, -canvas.height/2);
        ctx.putImageData(frozenImageData, 0, 0);
        ctx.restore();
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (!corners) return;
        const [TL, TR, BR, BL] = corners;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(TL.x, TL.y); ctx.lineTo(TR.x, TR.y);
        ctx.lineTo(BR.x, BR.y); ctx.lineTo(BL.x, BL.y);
        ctx.closePath(); ctx.clip();
        ctx.save();
        ctx.translate(canvas.width/2 + framingPanX, canvas.height/2 + framingPanY);
        ctx.scale(framingZoom, framingZoom);
        ctx.translate(-canvas.width/2, -canvas.height/2);
        ctx.putImageData(frozenImageData, 0, 0);
        ctx.restore(); ctx.restore();
        ctx.strokeStyle = '#2a6df4'; ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(TL.x, TL.y); ctx.lineTo(TR.x, TR.y);
        ctx.lineTo(BR.x, BR.y); ctx.lineTo(BL.x, BL.y);
        ctx.closePath(); ctx.stroke();
        [TL, TR, BR, BL].forEach((c, i) => {
            ctx.fillStyle = '#2a6df4'; ctx.beginPath();
            ctx.arc(c.x, c.y, HANDLE_SIZE/2, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
            ctx.fillStyle = '#fff'; ctx.font = 'bold 12px system-ui';
            ctx.textAlign = 'center'; ctx.fillText(i+1, c.x, c.y+5);
        });
    }

    function onFramingTouchStart(e) {
        if (currentStep !== 'framing') return;
        if (e.touches.length === 2) {
            const r = canvas.getBoundingClientRect();
            const x1 = (e.touches[0].clientX - r.left) * (canvas.width / r.width);
            const y1 = (e.touches[0].clientY - r.top) * (canvas.height / r.height);
            const x2 = (e.touches[1].clientX - r.left) * (canvas.width / r.width);
            const y2 = (e.touches[1].clientY - r.top) * (canvas.height / r.height);
            lastPinchDist = Math.hypot(x2 - x1, y2 - y1);
            lastPinchMidX = (x1 + x2) / 2;
            lastPinchMidY = (y1 + y2) / 2;
            return;
        }
        e.preventDefault(); e.stopPropagation();
        const t = e.touches[0], r = canvas.getBoundingClientRect();
        const sx = (t.clientX - r.left) * (canvas.width / r.width);
        const sy = (t.clientY - r.top) * (canvas.height / r.height);
        if (corners) {
            for (let i = 0; i < corners.length; i++) {
                if (Math.hypot(sx - corners[i].x, sy - corners[i].y) < HANDLE_SIZE * 1.5) {
                    draggingCorner = i; return;
                }
            }
        }
    }
    function onFramingTouchMove(e) {
        if (currentStep !== 'framing') return;
        if (e.touches.length === 2) {
            e.preventDefault();
            const r = canvas.getBoundingClientRect();
            const x1 = (e.touches[0].clientX - r.left) * (canvas.width / r.width);
            const y1 = (e.touches[0].clientY - r.top) * (canvas.height / r.height);
            const x2 = (e.touches[1].clientX - r.left) * (canvas.width / r.width);
            const y2 = (e.touches[1].clientY - r.top) * (canvas.height / r.height);
            const dist = Math.hypot(x2 - x1, y2 - y1);
            const midX = (x1 + x2) / 2;
            const midY = (y1 + y2) / 2;
            if (lastPinchDist && lastPinchMidX) {
                const scale = dist / lastPinchDist;
                const newZoom = Math.max(1, Math.min(5, framingZoom * scale));
                framingPanX += (midX - lastPinchMidX);
                framingPanY += (midY - lastPinchMidY);
                const maxPan = canvas.width * (newZoom - 1) / 2;
                framingPanX = Math.max(-maxPan, Math.min(maxPan, framingPanX));
                framingPanY = Math.max(-maxPan, Math.min(maxPan, framingPanY));
                framingZoom = newZoom;
            }
            lastPinchDist = dist;
            lastPinchMidX = midX;
            lastPinchMidY = midY;
            drawFrozenScene();
            return;
        }
        if (draggingCorner < 0 || !corners) return;
        e.preventDefault(); e.stopPropagation();
        const t = e.touches[0], r = canvas.getBoundingClientRect();
        const sx = (t.clientX - r.left) * (canvas.width / r.width);
        const sy = (t.clientY - r.top) * (canvas.height / r.height);
        corners[draggingCorner].x = Math.max(0, Math.min(canvas.width, sx));
        corners[draggingCorner].y = Math.max(0, Math.min(canvas.height, sy));
        drawFrozenScene();
    }
    function onFramingTouchEnd(e) {
        if (e.touches.length < 2) { lastPinchDist = 0; lastPinchMidX = 0; lastPinchMidY = 0; }
        draggingCorner = -1;
    }

    function resetCrop() {
        framingZoom = 1; framingPanX = 0; framingPanY = 0;
        lastPinchDist = 0; lastPinchMidX = 0; lastPinchMidY = 0;
        const mX = canvas.width * 0.1, mY = canvas.height * 0.1;
        corners = [
            {x:mX, y:mY}, {x:canvas.width - mX, y:mY},
            {x:canvas.width - mX, y:canvas.height - mY}, {x:mX, y:canvas.height - mY}
        ];
        drawFrozenScene();
    }

    function cropAndSave() {
        if (currentStep !== 'framing') return;
        currentStep = 'saving';
        updateUI();
        unbindFramingEvents();
        const [TL, TR, BR, BL] = corners;
        const minX = Math.max(0, Math.min(TL.x, BL.x));
        const maxX = Math.min(canvas.width, Math.max(TR.x, BR.x));
        const minY = Math.max(0, Math.min(TL.y, TR.y));
        const maxY = Math.min(canvas.height, Math.max(BL.y, BR.y));
        const cropW = maxX - minX;
        const cropH = maxY - minY;
        if (cropW < 10 || cropH < 10) {
            statusDiv.textContent = 'Область слишком мала.';
            statusDiv.className = 'status-bar error';
            statusDiv.classList.remove('hidden');
            currentStep = 'framing';
            bindFramingEvents();
            updateUI();
            return;
        }
        
        // Вычисляем угол наклона верхней границы
        const angle = Math.atan2(TR.y - TL.y, TR.x - TL.x);
        
        const invScale = 1 / displayScale;
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = Math.round(cropW * invScale);
        tmpCanvas.height = Math.round(cropH * invScale);
        const tmpCtx = tmpCanvas.getContext('2d');
        tmpCtx.drawImage(originalImage, minX * invScale, minY * invScale, tmpCanvas.width, tmpCanvas.height, 0, 0, tmpCanvas.width, tmpCanvas.height);
        
        // Если есть наклон — поворачиваем
        if (Math.abs(angle) > 0.01) {
            const rotatedCanvas = document.createElement('canvas');
            const w = tmpCanvas.width, h = tmpCanvas.height;
            const diag = Math.ceil(Math.sqrt(w * w + h * h));
            rotatedCanvas.width = diag;
            rotatedCanvas.height = diag;
            const rctx = rotatedCanvas.getContext('2d');
            rctx.translate(diag / 2, diag / 2);
            rctx.rotate(-angle);
            rctx.drawImage(tmpCanvas, -w / 2, -h / 2);
            
            rotatedCanvas.toBlob(blob => {
                if (!blob) {
                    statusDiv.textContent = 'Ошибка обработки.';
                    statusDiv.className = 'status-bar error';
                    statusDiv.classList.remove('hidden');
                    currentStep = 'framing';
                    bindFramingEvents();
                    updateUI();
                    return;
                }
                const url = URL.createObjectURL(blob);
                savedPages.push({ url, blob });
                updatePageCounter();
                frozenImageData = null;
                originalImage = null;
                corners = null;
                currentStep = 'saved';
                updateUI();
                resultsDiv.classList.add('visible');
                document.getElementById('resTip').textContent = `Готово страниц: ${savedPages.length}.`;
            }, 'image/jpeg', 0.92);
        } else {
            tmpCanvas.toBlob(blob => {
                if (!blob) {
                    statusDiv.textContent = 'Ошибка обработки.';
                    statusDiv.className = 'status-bar error';
                    statusDiv.classList.remove('hidden');
                    currentStep = 'framing';
                    bindFramingEvents();
                    updateUI();
                    return;
                }
                const url = URL.createObjectURL(blob);
                savedPages.push({ url, blob });
                updatePageCounter();
                frozenImageData = null;
                originalImage = null;
                corners = null;
                currentStep = 'saved';
                updateUI();
                resultsDiv.classList.add('visible');
                document.getElementById('resTip').textContent = `Готово страниц: ${savedPages.length}.`;
            }, 'image/jpeg', 0.92);
        }
    }

    function updatePageCounter() { pageCounter.textContent = `Страниц: ${savedPages.length}`; }

    function removeLastPage() {
        if (!savedPages.length) return;
        const item = savedPages.pop();
        URL.revokeObjectURL(item.url);
        updatePageCounter();
        if (!savedPages.length) {
            resultsDiv.classList.remove('visible');
            resetToReady();
        } else {
            statusDiv.textContent = '🗑 Последняя страница удалена.';
            updateUI();
        }
    }

    function clearAllPages() {
        if (!confirm('Удалить все страницы?')) return;
        savedPages.forEach(item => URL.revokeObjectURL(item.url));
        savedPages = [];
        updatePageCounter();
        resetToReady();
    }

    async function savePDF() {
        if (savedPages.length === 0) return;
        currentStep = 'generating';
        updateUI();
        progressOverlay.classList.add('visible');
        progressFill.style.width = '0%';
        try {
            const blobs = savedPages.map(p => p.blob);
            const blob = await generatePDFBlob(blobs);
            progressFill.style.width = '100%';
            await new Promise(r => setTimeout(r, 200));
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'FreePDFShoot.pdf';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
            statusDiv.textContent = '✅ PDF сохранён!';
            statusDiv.className = 'status-bar ready';
        } catch (err) {
            console.error(err);
            statusDiv.textContent = 'Ошибка создания PDF.';
            statusDiv.className = 'status-bar error';
        } finally {
            progressOverlay.classList.remove('visible');
            currentStep = 'saved';
            updateUI();
        }
    }

    async function sharePDF() {
        if (savedPages.length === 0) return;
        currentStep = 'generating';
        updateUI();
        progressOverlay.classList.add('visible');
        progressFill.style.width = '0%';
        try {
            const blobs = savedPages.map(p => p.blob);
            const blob = await generatePDFBlob(blobs);
            progressFill.style.width = '100%';
            await new Promise(r => setTimeout(r, 200));
            const file = new File([blob], 'FreePDFShoot.pdf', { type: 'application/pdf' });
            if (navigator.share) {
                await navigator.share({ title: 'FreePDFShoot', text: 'Документ', files: [file] });
            } else {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'FreePDFShoot.pdf';
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
            statusDiv.textContent = '✅ Отправлено!';
            statusDiv.className = 'status-bar ready';
        } catch (err) {
            if (err.name !== 'AbortError') {
                console.error(err);
                statusDiv.textContent = 'Ошибка создания PDF.';
                statusDiv.className = 'status-bar error';
            }
        } finally {
            progressOverlay.classList.remove('visible');
            currentStep = 'saved';
            updateUI();
        }
    }

    async function generatePDFBlob(blobs) {
        const images = [];
        for (let i = 0; i < blobs.length; i++) {
            const buf = await blobs[i].arrayBuffer();
            images.push({ data: new Uint8Array(buf), dims: null });
        }
        for (let i = 0; i < images.length; i++) {
            progressText.textContent = `Обрабатываю ${i + 1} из ${images.length}...`;
            progressFill.style.width = `${Math.round((i / images.length) * 100)}%`;
            images[i].dims = await getJPEGDimensionsFromBlob(blobs[i]);
        }
        const pageW = 595, pageH = 842;
        const parts = [], offsets = [];
        let objNum = 1;
        const imgObjNums = [], pageObjNums = [];
        function addText(str) { parts.push(new TextEncoder().encode(str)); }
        addText('%PDF-1.4\n');
        for (const img of images) {
            offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
            imgObjNums.push(objNum);
            addText(`${objNum} 0 obj\n<< /Type /XObject /Subtype /Image /Width ${img.dims.width} /Height ${img.dims.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter [/DCTDecode] /Length ${img.data.length} >>\nstream\n`);
            parts.push(img.data);
            addText('\nendstream\nendobj\n');
            objNum++;
        }
        const kids = [];
        for (let i = 0; i < images.length; i++) {
            const img = images[i];
            const scale = Math.min((pageW - 40) / img.dims.width, (pageH - 40) / img.dims.height);
            const w = img.dims.width * scale, h = img.dims.height * scale;
            const x = (pageW - w) / 2, y = (pageH - h) / 2;
            const cont = `q ${w} 0 0 ${h} ${x} ${pageH - y - h} cm /Im${imgObjNums[i]} Do Q`;
            offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
            pageObjNums.push(objNum);
            addText(`${objNum} 0 obj\n<< /Type /Page /Parent ${objNum + 2} 0 R /MediaBox [0 0 ${pageW} ${pageH}] /Contents ${objNum + 1} 0 R /Resources << /XObject << /Im${imgObjNums[i]} ${imgObjNums[i]} 0 R >> >> >>\nendobj\n`);
            objNum++;
            offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
            addText(`${objNum} 0 obj\n<< /Length ${cont.length} >>\nstream\n${cont}\nendstream\nendobj\n`);
            objNum++;
            kids.push(pageObjNums[i]);
        }
        const kidsStr = kids.map(k => `${k} 0 R`).join(' ');
        offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
        const pagesObjNum = objNum;
        addText(`${objNum} 0 obj\n<< /Type /Pages /Kids [${kidsStr}] /Count ${kids.length} >>\nendobj\n`);
        objNum++;
        offsets.push(parts.reduce((acc, p) => acc + p.length, 0));
        const catalogObjNum = objNum;
        addText(`${objNum} 0 obj\n<< /Type /Catalog /Pages ${pagesObjNum} 0 R >>\nendobj\n`);
        objNum++;
        const xrefPos = parts.reduce((acc, p) => acc + p.length, 0);
        addText(`xref\n0 ${objNum}\n0000000000 65535 f \n`);
        for (const off of offsets) addText(`${String(off).padStart(10, '0')} 00000 n \n`);
        addText(`trailer\n<< /Size ${objNum} /Root ${catalogObjNum} 0 R >>\nstartxref\n${xrefPos}\n%%EOF`);
        const totalLength = parts.reduce((acc, p) => acc + p.length, 0);
        const result = new Uint8Array(totalLength);
        let offset = 0;
        for (const part of parts) { result.set(part, offset); offset += part.length; }
        return new Blob([result], { type: 'application/pdf' });
    }

    async function getJPEGDimensionsFromBlob(blob) {
        try {
            const img = await createImageBitmap(blob);
            const dims = { width: img.width, height: img.height };
            img.close();
            return dims;
        } catch(e) {
            return { width: 800, height: 600 };
        }
    }

    window.addEventListener('beforeunload', () => {
        savedPages.forEach(item => URL.revokeObjectURL(item.url));
        savedPages = [];
        originalImage = null;
        frozenImageData = null;
    });
</script>
